<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoveChat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f172a; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .h { background: #1e293b; padding: 15px; text-align: center; color: #00ffcc; font-weight: bold; border-bottom: 1px solid #334155; }
        .ms { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 12px; border-radius: 15px; background: #334155; max-width: 85%; align-self: flex-start; }
        .my { align-self: flex-end; background: #00ffcc; color: #000; }
        .b { background: #1e293b; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
        button { padding: 10px 20px; background: #00ffcc; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="h">DoveChat 🕊️</div>
    <div class="ms" id="box"></div>
    <div class="b">
        <input type="text" id="i" placeholder="Сообщение..." autocomplete="off">
        <button onclick="s()">➜</button>
    </div>
    <script>
        const u = localStorage.getItem('du') || 'Аноним';
        const socket = io('https://my-chat-swart-two.vercel.app');

        socket.on('history', (h) => {
            document.getElementById('box').innerHTML = '';
            h.forEach(m => add(m));
        });

        socket.on('msg', (m) => add(m));

        function add(d) {
            const v = document.createElement('div');
            v.className = `m ${d.u === u ? 'my' : ''}`;
            v.innerHTML = `<small style="font-size:10px;display:block;opacity:0.7">${d.u}</small>${d.c}`;
            document.getElementById('box').appendChild(v);
            document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
        }

        function s() {
            const inp = document.getElementById('i');
            if(inp.value.trim()) {
                socket.emit('msg', { u, c: inp.value });
                inp.value = '';
            }
        }
        document.getElementById('i').onkeypress = (e) => { if(e.key === 'Enter') s() };
    </script>
</body>
</html>
