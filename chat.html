<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; color: #fff; }

        .h { padding: 20px; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 20px; background: #000; }
        #box { flex: 1; overflow-y: auto; padding: 25px 20px; display: flex; flex-direction: column; gap: 20px; }

        /* Текст чорний на білому */
        .msg { align-self: flex-end; max-width: 85%; background: #fff; color: #000; padding: 15px 20px; border-radius: 25px 25px 5px 25px; box-shadow: 0 5px 15px rgba(255,255,255,0.05); }
        .msg b { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .msg p { font-size: 16px; font-weight: 500; }
        .msg img { width: 100%; border-radius: 15px; margin-top: 10px; }

        /* Реакції */
        .re-box { display: flex; gap: 10px; margin-top: 8px; justify-content: flex-end; }
        .re { cursor: pointer; font-size: 18px; filter: grayscale(1); opacity: 0.5; transition: 0.2s; }
        .re:hover { filter: grayscale(0); opacity: 1; transform: scale(1.3); }

        .f { padding: 20px; border-top: 1px solid #111; display: flex; align-items: center; gap: 15px; background: #000; }
        #i { flex: 1; padding: 15px 25px; border-radius: 30px; background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; outline: none; }
    </style>
</head>
<body>

<div class="h">
    <i class="fas fa-arrow-left" onclick="location.href='index.html'" style="cursor:pointer"></i>
    <div>
        <h3 style="font-size: 18px;">Глобальное ядро</h3>
        <small style="color: #4ade80;">● Online</small>
    </div>
</div>

<div id="box"></div>

<div class="f">
    <input type="file" id="media" hidden accept="image/*" onchange="img(this)">
    <i class="fas fa-plus-circle" onclick="document.getElementById('media').click()" style="font-size:24px; color:#333; cursor:pointer"></i>
    <input type="text" id="i" placeholder="Написать сообщение...">
    <i class="fas fa-paper-plane" style="font-size:22px; color:#3b82f6; cursor:pointer" onclick="send()"></i>
</div>

<script>
    const user = localStorage.getItem('dg_user') || 'Аноним';
    function send() {
        const v = document.getElementById('i').value;
        if(!v.trim()) return;
        render(v);
        document.getElementById('i').value = '';
    }
    function img(input) {
        if(input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => render('', e.target.result);
            r.readAsDataURL(input.files[0]);
        }
    }
    function render(t, im = null) {
        const d = document.createElement('div');
        d.className = 'msg';
        d.innerHTML = `<b>${user}</b> ${t ? `<p>${t}</p>` : ''} ${im ? `<img src="${im}">` : ''}
            <div class="re-box"><span class="re" onclick="this.style.filter='none';this.style.opacity='1'">💔</span><span class="re" onclick="this.style.filter='none';this.style.opacity='1'">❤️‍🔥</span><span class="re" onclick="this.style.filter='none';this.style.opacity='1'">❤️</span></div>`;
        document.getElementById('box').appendChild(d);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    }
    document.getElementById('i').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
