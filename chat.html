<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoveChat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0f19; color: #e2e8f0; height: 100vh; display: flex; overflow: hidden; }
        
        /* Звук */
        #au { display: none; }

        /* Бокове меню */
        #sideMenu { width: 300px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); position: fixed; left: -300px; top: 0; bottom: 0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; border-right: 1px solid rgba(255,255,255,0.05); padding: 25px; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        #sideMenu.open { left: 0; }
        .contact-item { padding: 14px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.02); transition: 0.2s; }
        .contact-item:hover { background: rgba(255,255,255,0.08); }
        .call-btn { color: #4facfe; cursor: pointer; font-size: 20px; padding: 5px; border-radius: 50%; background: rgba(79, 172, 254, 0.1); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }

        /* Головний екран */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: #0b0f19; background-image: radial-gradient(circle at top right, rgba(79, 172, 254, 0.1), transparent 400px); }
        .h { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); padding: 18px 25px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; z-index: 5; }
        .menu-toggle { font-size: 24px; cursor: pointer; color: #4facfe; display: flex; align-items: center; gap: 15px; }
        
        .ms { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Повідомлення */
        .m-wrap { display: flex; flex-direction: column; max-width: 80%; position: relative; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .s { align-self: flex-end; }
        .r { align-self: flex-start; }
        
        .m { padding: 12px 16px; border-radius: 18px; line-height: 1.5; position: relative; font-size: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .s .m { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #000; border-bottom-right-radius: 4px; }
        .r .m { background: #1e293b; color: #fff; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        
        .u-n { font-size: 12px; opacity: 0.7; font-weight: 600; margin-bottom: 4px; display: block; }
        .s .u-n { color: #000; }
        .im { max-width: 100%; border-radius: 12px; margin-top: 8px; }
        
        /* Кнопка видалення */
        .del-btn { position: absolute; top: -8px; right: -8px; background: #ff4757; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .m-wrap:hover .del-btn { display: flex; }

        /* Реакції */
        .react-bar { display: flex; gap: 5px; margin-top: 4px; }
        .rb { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 2px 8px; font-size: 12px; cursor: pointer; color: #8b9bb4; transition: 0.2s; }
        .s .rb { background: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.2); color: #000; }
        .rb:hover { transform: scale(1.1); }

        /* Ввід */
        .typing { font-size: 12px; color: #4facfe; padding: 0 25px; height: 20px; font-style: italic; }
        .b { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; gap: 12px; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        input[type="text"] { flex: 1; padding: 14px 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; outline: none; font-size: 15px; transition: 0.3s; }
        input[type="text"]:focus { border-color: #4facfe; }
        .ic { background: rgba(255,255,255,0.05); border: none; font-size: 20px; cursor: pointer; color: #8b9bb4; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .ic:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .ic.send { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #000; }
        .ic.send:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }

        /* Муляж дзвінка */
        #callOverlay { display: none; position: fixed; inset: 0; background: rgba(11, 15, 25, 0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .call-avatar { width: 120px; height: 120px; background: linear-gradient(135deg, #4facfe, #00f2fe); border-radius: 50%; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; font-size: 50px; box-shadow: 0 0 40px rgba(79,172,254,0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(79,172,254,0.4); } 70% { box-shadow: 0 0 0 30px rgba(79,172,254,0); } 100% { box-shadow: 0 0 0 0 rgba(79,172,254,0); } }
        .act-btn { padding: 16px 35px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; font-size: 16px; transition: 0.2s; color: white; }
    </style>
</head>
<body>
    <audio id="au" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div id="sideMenu">
        <h2 style="margin-bottom: 25px; color: #fff; font-weight: 600;">Контакти</h2>
        <div id="uList"></div>
        <button onclick="toggleMenu()" style="margin-top: 30px; background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; width: 100%;">Закрити меню</button>
    </div>

    <div id="callOverlay">
        <div style="text-align: center;">
            <div class="call-avatar">👤</div>
            <h1 id="callName" style="margin-bottom: 10px;">User</h1>
            <p style="color: #4facfe; margin-bottom: 40px; font-weight: 500;">Виклик...</p>
            <div style="display: flex; gap: 20px;">
                <button class="act-btn" style="background: #ef4444;" onclick="document.getElementById('callOverlay').style.display='none'">Скинути</button>
                <button class="act-btn" style="background: rgba(255,255,255,0.1);">Динамік</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="h">
            <div class="menu-toggle" onclick="toggleMenu()">
                <span style="font-size: 28px;">≡</span> 
                <span>DoveChat <span style="font-size: 12px; opacity: 0.5; font-weight: normal; margin-left: 5px;" id="onlineCount"></span></span>
            </div>
        </div>
        
        <div class="ms" id="box"></div>
        
        <div class="typing" id="typ"></div>

        <div class="b">
            <button class="ic" onclick="document.getElementById('fi').click()">📎</button>
            <input type="file" id="fi" hidden accept="image/*" onchange="si()">
            <input type="text" id="inp" placeholder="Напишіть повідомлення..." autocomplete="off" oninput="isTyping()">
            <button class="ic" title="Голосове (Муляж)" onclick="alert('У розробці 🎙️')">🎙️</button>
            <button class="ic send" onclick="sm()">➜</button>
        </div>
    </div>

    <script>
        const u = localStorage.getItem('du') || 'User';
        const socket = io();
        let typingTimer;

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }

        socket.on('connect', () => socket.emit('join', { u }));
        
        socket.on('userList', (list) => {
            document.getElementById('onlineCount').innerText = `${list.length} онлайн`;
            const c = document.getElementById('uList');
            c.innerHTML = '';
            list.forEach(n => {
                if(n !== u) c.innerHTML += `<div class="contact-item"><span>${n}</span><span class="call-btn" onclick="document.getElementById('callName').innerText='${n}'; document.getElementById('callOverlay').style.display='flex'">📞</span></div>`;
            });
        });

        socket.on('history', (h) => { document.getElementById('box').innerHTML = ''; h.forEach(m => drawMsg(m)); scroll(); });
        
        socket.on('msg', (m) => { 
            drawMsg(m); scroll(); 
            if(m.u !== u) document.getElementById('au').play().catch(()=>{}); // Звук
        });

        socket.on('typing', (data) => {
            const t = document.getElementById('typ');
            t.innerText = data.isTyping ? `${data.u} друкує...` : '';
        });

        socket.on('del', (id) => { const e = document.getElementById(id); if(e) e.remove(); });
        
        socket.on('updateMsg', (m) => {
            const el = document.getElementById(m.id);
            if(el) {
                const rBar = el.querySelector('.react-bar');
                rBar.innerHTML = `<button class="rb" onclick="react('${m.id}','👍')">👍 ${m.r['👍']||''}</button>
                                  <button class="rb" onclick="react('${m.id}','❤️')">❤️ ${m.r['❤️']||''}</button>
                                  <button class="rb" onclick="react('${m.id}','😂')">😂 ${m.r['😂']||''}</button>`;
            }
        });

        function drawMsg(d) {
            const w = document.createElement('div');
            w.className = `m-wrap ${d.u === u ? 's' : 'r'}`;
            w.id = d.id;
            
            let html = `<div class="m"><span class="u-n">${d.u}</span>`;
            if(d.u === u) html += `<button class="del-btn" onclick="socket.emit('del', '${d.id}')">×</button>`;
            if(d.t === 'img') html += `<img src="${d.c}" class="im">`; else html += `<div>${d.c}</div>`;
            html += `</div><div class="react-bar">
                <button class="rb" onclick="react('${d.id}','👍')">👍 ${d.r['👍']||''}</button>
                <button class="rb" onclick="react('${d.id}','❤️')">❤️ ${d.r['❤️']||''}</button>
                <button class="rb" onclick="react('${d.id}','😂')">😂 ${d.r['😂']||''}</button>
            </div>`;
            w.innerHTML = html;
            document.getElementById('box').appendChild(w);
        }

        function sm() {
            const i = document.getElementById('inp');
            if(i.value.trim()) { 
                socket.emit('msg', { u, t: 'txt', c: i.value }); 
                i.value = ''; 
                socket.emit('typing', false);
            }
        }

        function si() {
            const f = document.getElementById('fi').files[0];
            const r = new FileReader();
            r.onload = (e) => socket.emit('msg', { u, t: 'img', c: e.target.result });
            if(f) r.readAsDataURL(f);
        }

        function react(id, emoji) { socket.emit('react', { id, emoji }); }

        function isTyping() {
            socket.emit('typing', true);
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => socket.emit('typing', false), 2000);
        }

        function scroll() { const b = document.getElementById('box'); b.scrollTop = b.scrollHeight; }
        document.getElementById('inp').onkeypress = (e) => { if(e.key === 'Enter') sm(); };
    </script>
</body>
</html>
