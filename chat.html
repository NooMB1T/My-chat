<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoveChat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* Стилі залишаємо, вони не палять логіку */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0f19; color: #e2e8f0; height: 100vh; display: flex; overflow: hidden; }
        #sm { width: 300px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); position: fixed; left: -300px; top: 0; bottom: 0; transition: 0.4s; z-index: 10; padding: 25px; }
        #sm.o { left: 0; }
        .ci { padding: 14px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .cb { color: #4facfe; cursor: pointer; font-size: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .h { background: rgba(15,23,42,0.8); padding: 18px 25px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ms { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .mw { display: flex; flex-direction: column; max-width: 80%; position: relative; }
        .s { align-self: flex-end; } .r { align-self: flex-start; }
        .m { padding: 12px 16px; border-radius: 18px; font-size: 15px; }
        .s .m { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #000; border-bottom-right-radius: 4px; }
        .r .m { background: #1e293b; color: #fff; border-bottom-left-radius: 4px; }
        .db { position: absolute; top: -8px; right: -8px; background: #ff4757; color: #fff; border-radius: 50%; width: 20px; height: 20px; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; }
        .mw:hover .db { display: flex; }
        .rb { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 2px 6px; font-size: 12px; cursor: pointer; color: #8b9bb4; margin-right: 4px; }
        .b { padding: 15px 20px; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        input { flex: 1; padding: 12px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; outline: none; }
        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #1e293b; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <audio id="as" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
    <div id="sm">
        <h2 style="color:#fff; margin-bottom:20px;">Контакты</h2>
        <div id="ul"></div>
        <button onclick="tm()" style="width:100%; padding:10px; margin-top:20px;">Закрыть</button>
    </div>
    <div class="main">
        <div class="h"><div onclick="tm()" style="cursor:pointer; color:#4facfe;">☰ DoveChat <span id="oc" style="font-size:12px; opacity:0.5;"></span></div></div>
        <div class="ms" id="bx"></div>
        <div id="ty" style="font-size:12px; color:#4facfe; padding-left:20px; height:20px;"></div>
        <div class="b">
            <button class="btn" onclick="document.getElementById('fi').click()">📎</button>
            <input type="file" id="fi" hidden onchange="si()">
            <input type="text" id="in" placeholder="Сообщение..." oninput="it()">
            <button class="btn" style="background:#4facfe; color:#000;" onclick="sm()">➜</button>
        </div>
    </div>
    <script>
        const u = localStorage.getItem('du');
        const sc = io();
        let tt;
        function tm() { document.getElementById('sm').classList.toggle('o'); }
        sc.on('connect', () => sc.emit('join', { u }));
        sc.on('ul', (l) => {
            document.getElementById('oc').innerText = l.length + ' online';
            const c = document.getElementById('ul'); c.innerHTML = '';
            l.forEach(n => { if(n !== u) c.innerHTML += `<div class="ci"><span>${n}</span><span style="color:#4facfe; cursor:pointer;" onclick="alert('Вызов ${n}...')">📞</span></div>`; });
        });
        sc.on('hs', (h) => { document.getElementById('bx').innerHTML = ''; h.forEach(m => dr(m)); scrl(); });
        sc.on('m', (m) => { dr(m); scrl(); if(m.u !== u) document.getElementById('as').play().catch(()=>{}); });
        sc.on('t', (d) => { document.getElementById('ty').innerText = d.v ? d.u + ' печатает...' : ''; });
        sc.on('d', (i) => { const e = document.getElementById(i); if(e) e.remove(); });
        sc.on('up', (m) => {
            const e = document.getElementById(m.id);
            if(e) { e.querySelector('.rl').innerHTML = `<button class="rb" onclick="re('${m.id}','👍')">👍 ${m.r['👍']}</button><button class="rb" onclick="re('${m.id}','❤️')">❤️ ${m.r['❤️']}</button><button class="rb" onclick="re('${m.id}','😂')">😂 ${m.r['😂']}</button>`; }
        });
        function dr(d) {
            const w = document.createElement('div');
            w.className = `mw ${d.u === u ? 's' : 'r'}`; w.id = d.id;
            w.innerHTML = `<div class="m"><span style="font-size:10px; opacity:0.6; display:block;">${d.u}</span>${d.u === u ? `<button class="db" onclick="sc.emit('d', '${d.id}')">×</button>` : ''}${d.t === 'img' ? `<img src="${d.c}" style="max-width:100%; border-radius:10px;">` : d.c}</div><div class="rl"><button class="rb" onclick="re('${d.id}','👍')">👍 ${d.r['👍']}</button><button class="rb" onclick="re('${d.id}','❤️')">❤️ ${d.r['❤️']}</button><button class="rb" onclick="re('${d.id}','😂')">😂 ${d.r['😂']}</button></div>`;
            document.getElementById('bx').appendChild(w);
        }
        function sm() { const i = document.getElementById('in'); if(i.value.trim()){ sc.emit('m', { u, t: 'txt', c: i.value }); i.value = ''; sc.emit('t', false); } }
        function si() { const f = document.getElementById('fi').files[0]; const r = new FileReader(); r.onload = (e) => sc.emit('m', { u, t: 'img', c: e.target.result }); if(f) r.readAsDataURL(f); }
        function re(i, e) { sc.emit('re', { id: i, e: e }); }
        function it() { sc.emit('t', true); clearTimeout(tt); tt = setTimeout(() => sc.emit('t', false), 2000); }
        function scrl() { const b = document.getElementById('bx'); b.scrollTop = b.scrollHeight; }
        document.getElementById('in').onkeypress = (e) => { if(e.key === 'Enter') sm(); };
    </script>
</body>
</html>
