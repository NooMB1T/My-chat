<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram | Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; color: #fff; }

        .chat-h { padding: 18px; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 25px 20px; display: flex; flex-direction: column; gap: 20px; background: radial-gradient(circle at top right, #050505, #000); }

        /* Сообщения: Черный текст на Белом фоне */
        .msg-container { max-width: 85%; align-self: flex-end; animation: slideUp 0.3s ease; }
        .bubble { background: #fff; color: #000; padding: 14px 18px; border-radius: 22px 22px 4px 22px; position: relative; box-shadow: 0 4px 15px rgba(255,255,255,0.05); }
        .bubble b { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; color: #888; }
        .bubble p { font-size: 16px; line-height: 1.5; font-weight: 500; }
        .bubble img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; }

        /* Интерактив */
        .react-strip { display: flex; gap: 12px; margin-top: 8px; justify-content: flex-end; }
        .re-btn { font-size: 18px; cursor: pointer; transition: 0.2s; opacity: 0.4; filter: grayscale(1); }
        .re-btn:hover { opacity: 1; filter: grayscale(0); transform: scale(1.3); }

        .input-dock { padding: 20px; background: #000; display: flex; align-items: center; gap: 15px; border-top: 1px solid #111; }
        .msg-input { flex: 1; padding: 15px 25px; border-radius: 30px; background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; outline: none; font-size: 15px; transition: 0.3s; }
        .msg-input:focus { border-color: #3b82f6; background: #111; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="chat-h">
    <i class="fas fa-arrow-left" style="font-size: 20px; cursor:pointer;" onclick="location.href='index.html'"></i>
    <div>
        <h3 style="font-size: 18px;">Глобальное ядро</h3>
        <small style="color: #4ade80;">● 1 402 участника</small>
    </div>
</div>

<div id="chat-flow"></div>

<div class="input-dock">
    <input type="file" id="media-pick" hidden accept="image/*" onchange="handleMedia(this)">
    <i class="fas fa-plus-circle" style="font-size: 24px; color: #333; cursor:pointer;" onclick="document.getElementById('media-pick').click()"></i>
    <input type="text" id="main-in" class="msg-input" placeholder="Написать сообщение...">
    <i class="fas fa-paper-plane" style="font-size: 22px; color: #3b82f6; cursor:pointer;" onclick="pushMsg()"></i>
</div>

<script>
    const user = localStorage.getItem('dg_name') || 'Аноним';

    function pushMsg() {
        const inp = document.getElementById('main-in');
        if(!inp.value.trim()) return;
        render(inp.value);
        inp.value = '';
    }

    function handleMedia(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => render('', e.target.result);
            reader.readAsDataURL(input.files[0]);
        }
    }

    function render(text, image = null) {
        const container = document.createElement('div');
        container.className = 'msg-container';
        
        container.innerHTML = `
            <div class="bubble">
                <b>${user}</b>
                ${text ? `<p>${text}</p>` : ''}
                ${image ? `<img src="${image}">` : ''}
            </div>
            <div class="react-strip">
                <span class="re-btn" onclick="this.style.filter='none'; this.style.opacity='1'">💔</span>
                <span class="re-btn" onclick="this.style.filter='none'; this.style.opacity='1'">❤️‍🔥</span>
                <span class="re-btn" onclick="this.style.filter='none'; this.style.opacity='1'">❤️</span>
            </div>
        `;
        
        document.getElementById('chat-flow').appendChild(container);
        const flow = document.getElementById('chat-flow');
        flow.scrollTop = flow.scrollHeight;
    }

    document.getElementById('main-in').onkeypress = (e) => { if(e.key === 'Enter') pushMsg(); };
</script>
</body>
</html>
