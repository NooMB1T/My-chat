<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoveGram 4.1</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: #000; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        #s { width: 280px; border-right: 1px solid #333; background: #000; position: fixed; left: -280px; top: 0; bottom: 0; transition: 0.3s; z-index: 100; }
        #s.o { left: 0; }
        .h { height: 60px; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #bx { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .mw { max-width: 80%; padding: 10px; border: 1px solid #333; position: relative; }
        .mw.me { align-self: flex-end; border-color: #fff; }
        .mw.ad { border: 1px solid #fff; box-shadow: 0 0 5px #fff; }
        .u-n { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .av-s { width: 20px; height: 20px; border: 1px solid #fff; border-radius: 50%; object-fit: cover; }
        .db { color: #f00; cursor: pointer; font-size: 14px; position: absolute; right: -25px; top: 0; }
        .im { max-width: 100%; margin-top: 10px; border: 1px solid #333; }
        .b { border-top: 1px solid #333; padding: 15px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px; outline: none; }
        .btn { background: #fff; color: #000; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; }
        .u-l { padding: 15px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .u-l:hover { background: #111; }
        .rb { background: none; border: 1px solid #333; color: #888; padding: 2px 6px; font-size: 10px; cursor: pointer; margin-top: 8px; margin-right: 4px; }
        .rb.on { border-color: #fff; color: #fff; }
    </style>
</head>
<body>
    <div id="s">
        <div style="padding:20px; border-bottom:1px solid #333; text-align:center">КОНТАКТЫ</div>
        <div id="ul"></div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column;">
        <div class="h">
            <span onclick="tm()" style="cursor:pointer">☰ MENU</span>
            <div id="oc">0 ONLINE</div>
        </div>
        <div id="bx"></div>
        <div id="ty" style="font-size:10px; padding-left:20px; height:15px"></div>
        <div class="b">
            <span class="btn" onclick="document.getElementById('fi').click()">+</span>
            <input type="file" id="fi" hidden accept="image/*" onchange="si()">
            <input type="text" id="in" placeholder="ENTER MESSAGE..." autocomplete="off">
            <button class="btn" onclick="sm()">SEND</button>
        </div>
    </div>
    <script>
        const u = localStorage.getItem('du'), av = localStorage.getItem('da') || '';
        if(!u) window.location.href='index.html';
        const sc = io(); let to = null;

        function tm(){ document.getElementById('s').classList.toggle('o'); }
        function st(n){ to = n; document.getElementById('in').placeholder = n ? `PRIVATE TO ${n}...` : 'ENTER MESSAGE...'; if(n) tm(); }

        sc.on('connect', () => sc.emit('j', { u, av }));
        sc.on('ul', (l) => {
            const users = Object.keys(l);
            document.getElementById('oc').innerText = users.length + ' ONLINE';
            const c = document.getElementById('ul'); c.innerHTML = '';
            users.forEach(n => { if(n!==u) c.innerHTML += `<div class="u-l" onclick="st('${n}')"><img src="${l[n].av || ''}" class="av-s" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='"> ${n}</div>`; });
        });
        sc.on('hs', (h) => { document.getElementById('bx').innerHTML=''; h.forEach(m=>dr(m)); sl(); });
        sc.on('m', (m) => { dr(m); sl(); });
        sc.on('d', (i) => { const e=document.getElementById(i); if(e) e.remove(); });
        sc.on('up', (m) => {
            const e = document.getElementById(m.id);
            if(e) e.querySelector('.rl').innerHTML = `<button class="rb ${m.r['👍'].includes(u)?'on':''}" onclick="re('${m.id}','👍')">👍 ${m.r['👍'].length}</button><button class="rb ${m.r['❤️'].includes(u)?'on':''}" onclick="re('${m.id}','❤️')">❤️ ${m.r['❤️'].length}</button>`;
        });

        function dr(d) {
            const w = document.createElement('div');
            w.className = `mw ${d.u===u?'me':''} ${d.u==='NooMB1T'?'ad':''}`; w.id = d.id;
            const isAd = (u === 'NooMB1T' || d.u === u);
            w.innerHTML = `<div class="u-n"><img src="${d.av || ''}" class="av-s" onerror="this.style.display='none'"> ${d.u} ${d.u==='NooMB1T'?'[ADMIN]':''}</div>
                ${isAd ? `<span class="db" onclick="sc.emit('d','${d.id}')">×</span>` : ''}
                <div style="word-break:break-all">${d.t==='img' ? `<img src="${d.c}" class="im">` : d.c}</div>
                <div class="rl">
                    <button class="rb ${d.r['👍'].includes(u)?'on':''}" onclick="re('${d.id}','👍')">👍 ${d.r['👍'].length}</button>
                    <button class="rb ${d.r['❤️'].includes(u)?'on':''}" onclick="re('${d.id}','❤️')">❤️ ${d.r['❤️'].length}</button>
                </div>`;
            document.getElementById('bx').appendChild(w);
        }

        function sm() { const i=document.getElementById('in'); if(i.value.trim()){ sc.emit('m',{u, av, t:'txt', c:i.value, to}); i.value=''; st(null); } }
        function si() { const f=document.getElementById('fi').files[0]; const r=new FileReader(); r.onload=(e)=>sc.emit('m',{u, av, t:'img', c:e.target.result, to}); if(f) r.readAsDataURL(f); }
        function re(i, e) { sc.emit('re', { id: i, e: e }); }
        function sl() { const b=document.getElementById('bx'); b.scrollTop=b.scrollHeight; }
        document.getElementById('in').onkeypress=(e)=>{ if(e.key==='Enter') sm(); };
    </script>
</body>
</html>
