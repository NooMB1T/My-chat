<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; color: #fff; }

        .h { padding: 15px 20px; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 20px; background: #000; }
        .contact-info { display: flex; flex-direction: column; }
        
        #box { flex: 1; overflow-y: auto; padding: 25px 20px; display: flex; flex-direction: column; gap: 20px; }

        .msg { align-self: flex-end; max-width: 85%; background: #fff; color: #000; padding: 15px 20px; border-radius: 25px 25px 5px 25px; cursor: pointer; }
        .msg b { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        .msg p { font-size: 16px; font-weight: 500; color: #000; }
        
        .rep { font-size: 12px; color: #666; background: #f0f0f0; padding: 8px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid #3b82f6; }

        .re-btn { margin-top: 10px; font-size: 20px; cursor: pointer; opacity: 0.3; transition: 0.2s; filter: grayscale(1); }
        .re-btn.active { opacity: 1; filter: none; transform: scale(1.2); }

        .f { padding: 20px; border-top: 1px solid #111; background: #000; }
        .f-row { display: flex; align-items: center; gap: 15px; }
        #i { flex: 1; padding: 15px 25px; border-radius: 30px; background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; outline: none; }
    </style>
</head>
<body>

<div class="h">
    <i class="fas fa-chevron-left" style="font-size: 20px; cursor: pointer;" onclick="location.href='index.html'"></i>
    <div class="contact-info">
        <b id="c-name" style="font-size: 18px;">Завантаження...</b>
        <small id="c-id" style="color: #3b82f6;">---</small>
    </div>
</div>

<div id="box"></div>

<div class="f">
    <div id="rep-box" style="display:none; color:#555; font-size:12px; margin-bottom:5px;">Ответ на сообщение...</div>
    <div class="f-row">
        <input type="text" id="i" placeholder="Написати повідомлення...">
        <i class="fas fa-paper-plane" id="send" style="color:#3b82f6; font-size:22px; cursor: pointer;" onclick="send()"></i>
    </div>
</div>

<script>
    const user = localStorage.getItem('dg_u') || 'Аноним';
    const chatName = localStorage.getItem('dg_active_chat_name') || 'Невідомий';
    const chatId = localStorage.getItem('dg_active_chat_id') || '0000';
    
    // Унікальний ключ для історії конкретного чату
    const historyKey = 'dg_h_' + chatId; 
    let replyText = null;

    document.getElementById('c-name').innerText = chatName;
    document.getElementById('c-id').innerText = chatId;

    function send() {
        const v = document.getElementById('i').value;
        if(!v.trim()) return;
        const msg = { sender: user, text: v, rep: replyText, id: Date.now() };
        render(msg);
        save(msg);
        document.getElementById('i').value = '';
        replyText = null; document.getElementById('rep-box').style.display = 'none';
    }

    function render(m) {
        const d = document.createElement('div');
        d.className = 'msg';
        d.innerHTML = `
            ${m.rep ? `<div class="rep">Відповідь: ${m.rep}</div>` : ''}
            <p>${m.text}</p>
            <div class="re-btn" onclick="this.classList.toggle('active')">❤️</div>
        `;
        d.onclick = () => { replyText = m.text; document.getElementById('rep-box').style.display = 'block'; };
        document.getElementById('box').appendChild(d);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    }

    function save(m) {
        let h = JSON.parse(localStorage.getItem(historyKey) || '[]');
        h.push(m);
        localStorage.setItem(historyKey, JSON.stringify(h));
    }

    window.onload = () => {
        let h = JSON.parse(localStorage.getItem(historyKey) || '[]');
        h.forEach(m => render(m));
    };
    document.getElementById('i').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
