<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoveChat 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body { background: #080808; color: #00f2fe; height: 100vh; display: flex; }
        #s { width: 280px; background: #000; border-right: 1px solid #1a1a1a; padding: 20px; position: fixed; left: -280px; top: 0; bottom: 0; transition: 0.3s; z-index: 20; }
        #s.o { left: 0; }
        .u { padding: 10px; border: 1px solid #1a1a1a; margin-bottom: 10px; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .u:hover { border-color: #4facfe; background: #4facfe11; }
        .m-p { flex: 1; display: flex; flex-direction: column; }
        .h { padding: 20px; background: #000; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        #bx { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .mw { max-width: 85%; position: relative; padding: 12px; border: 1px solid #1a1a1a; background: #0a0a0a; border-radius: 2px; }
        .mw.me { align-self: flex-end; border-color: #4facfe66; background: #001a2e; }
        .mw.to { border-color: #f0f; box-shadow: 0 0 10px #f0f2; } /* Private */
        .db { position: absolute; right: 5px; top: 5px; color: #f00; cursor: pointer; background: none; border: none; font-size: 16px; }
        .rb { background: none; border: 1px solid #1a1a1a; color: #4facfe; padding: 3px 7px; font-size: 10px; cursor: pointer; margin-top: 10px; margin-right: 5px; }
        .b { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        #in { flex: 1; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; color: #fff; outline: none; }
        .bt { background: #4facfe; color: #000; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        #target { font-size: 10px; color: #f0f; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>
    <audio id="sd" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
    <div id="s">
        <h3 style="margin-bottom:20px">ONLINE</h3>
        <div id="ul"></div>
        <button onclick="tm()" style="width:100%; padding:10px; background:#1a1a1a; color:#fff; border:none; margin-top:20px; cursor:pointer">CLOSE</button>
    </div>
    <div class="m-p">
        <div class="h">
            <div onclick="tm()" style="cursor:pointer">☰ NEON_CHAT <span id="oc" style="font-size:10px; color:#4facfe"></span></div>
            <div id="cur-u" style="font-size:12px"></div>
        </div>
        <div id="bx"></div>
        <div id="ty" style="padding-left:20px; height:15px; font-size:10px"></div>
        <div class="b">
            <div style="display:flex; flex-direction:column; flex:1">
                <div id="target" onclick="st(null)">SENDING TO: <span id="tn"></span> [X]</div>
                <input type="text" id="in" placeholder="TYPE MESSAGE..." oninput="it()">
            </div>
            <button class="bt" onclick="sm()">SEND</button>
        </div>
    </div>
    <script>
        const u = localStorage.getItem('du');
        if(!u) window.location.href = 'index.html';
        document.getElementById('cur-u').innerText = 'USER: ' + u;
        const sc = io(); let tt, to = null;

        function tm() { document.getElementById('s').classList.toggle('o'); }
        function st(n) { to = n; const t = document.getElementById('target'); if(n){ t.style.display='block'; document.getElementById('tn').innerText=n; } else { t.style.display='none'; } }

        sc.on('connect', () => sc.emit('j', { u }));
        sc.on('ul', (l) => {
            document.getElementById('oc').innerText = l.length + ' ACTIVE';
            const c = document.getElementById('ul'); c.innerHTML = '';
            l.forEach(n => { if(n !== u) c.innerHTML += `<div class="u" onclick="st('${n}'); tm()">ID: ${n}</div>`; });
        });
        sc.on('hs', (h) => { document.getElementById('bx').innerHTML = ''; h.forEach(m => dr(m)); sl(); });
        sc.on('m', (m) => { dr(m); sl(); if(m.u !== u) document.getElementById('sd').play().catch(()=>{}); });
        sc.on('d', (i) => { const e = document.getElementById(i); if(e) e.remove(); });
        sc.on('up', (m) => {
            const e = document.getElementById(m.id);
            if(e) e.querySelector('.rl').innerHTML = `<button class="rb" onclick="re('${m.id}','👍')">👍 ${m.r['👍']}</button><button class="rb" onclick="re('${m.id}','❤️')">❤️ ${m.r['❤️']}</button><button class="rb" onclick="re('${m.id}','🔥')">🔥 ${m.r['🔥']}</button>`;
        });

        function dr(d) {
            const w = document.createElement('div');
            w.className = `mw ${d.u === u ? 'me' : ''} ${d.to ? 'to' : ''}`; w.id = d.id;
            w.innerHTML = `<span style="font-size:9px; color:#4facfe">${d.to ? '[PRIVATE FROM ' + d.u + ']' : d.u}</span>
                ${d.u === u ? `<button class="db" onclick="sc.emit('d', '${d.id}')">×</button>` : ''}
                <div style="margin-top:5px; color:#fff">${d.c}</div>
                <div class="rl">
                    <button class="rb" onclick="re('${d.id}','👍')">👍 ${d.r['👍']}</button>
                    <button class="rb" onclick="re('${d.id}','❤️')">❤️ ${d.r['❤️']}</button>
                    <button class="rb" onclick="re('${d.id}','🔥')">🔥 ${d.r['🔥']}</button>
                </div>`;
            document.getElementById('bx').appendChild(w);
        }
        function sm() { const i = document.getElementById('in'); if(i.value.trim()){ sc.emit('m', { u, c: i.value, to }); i.value = ''; st(null); } }
        function re(i, e) { sc.emit('re', { id: i, e: e }); }
        function it() { sc.emit('t', true); clearTimeout(tt); tt = setTimeout(() => sc.emit('t', false), 2000); }
        function sl() { const b = document.getElementById('bx'); b.scrollTop = b.scrollHeight; }
        document.getElementById('in').onkeypress = (e) => { if(e.key === 'Enter') sm(); };
    </script>
</body>
</html>
