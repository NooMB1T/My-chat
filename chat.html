<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <title>DoveGram</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #fff; display: flex; height: 100vh; overflow: hidden; }
        #s { width: 260px; background: #fff; border-right: 1px solid #eee; position: fixed; left: -260px; top: 0; bottom: 0; transition: 0.2s; z-index: 100; }
        #s.o { left: 0; }
        #ov { position: fixed; inset: 0; background: rgba(0,0,0,0.1); display: none; z-index: 90; }
        #ov.o { display: block; }
        .h { height: 50px; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 15px; background: #fff; width: 100%; }
        #bx { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .mw { max-width: 85%; padding: 10px; border-radius: 12px; background: #fff; border: 1px solid #eee; position: relative; }
        .mw.me { align-self: flex-end; background: #000; color: #fff; }
        .mw.ad { border: 2px solid #000; }
        .u-n { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .av-s { width: 20px; height: 20px; border-radius: 50%; }
        .db { color: #ff4d4d; cursor: pointer; float: right; }
        .b { padding: 10px; display: flex; gap: 10px; background: #fff; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid #eee; padding: 10px; border-radius: 20px; outline: none; }
        .btn { background: #000; color: #fff; border: none; padding: 0 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="ov" onclick="tm()"></div>
    <div id="s"><div id="ul"></div></div>
    <div style="flex:1; display:flex; flex-direction:column;">
        <div class="h"><span onclick="tm()" style="font-size:24px; cursor:pointer">☰</span><b style="margin-left:15px">DoveGram</b></div>
        <div id="bx"></div>
        <div class="b">
            <input type="text" id="in" placeholder="Сообщение..." autocomplete="off">
            <button class="btn" onclick="sm()">➔</button>
        </div>
    </div>
    <script>
        const u = localStorage.getItem('du'), av = localStorage.getItem('da') || '';
        if(!u) window.location.href='/';
        const sc = io(); let to = null;
        function tm(){ document.getElementById('s').classList.toggle('o'); document.getElementById('ov').classList.toggle('o'); }
        function st(n){ to = n; tm(); }
        sc.on('connect', () => sc.emit('j', { u, av }));
        sc.on('ul', (l) => {
            const c = document.getElementById('ul'); c.innerHTML = '';
            Object.keys(l).forEach(n => { if(n!==u) c.innerHTML += `<div style="padding:15px; border-bottom:1px solid #eee" onclick="st('${n}')">${n}</div>`; });
        });
        sc.on('hs', (h) => { document.getElementById('bx').innerHTML=''; h.forEach(m=>dr(m)); sl(); });
        sc.on('m', (m) => { dr(m); sl(); });
        sc.on('d', (i) => { const e=document.getElementById(i); if(e) e.remove(); });
        function dr(d) {
            const w = document.createElement('div'); w.id = d.id;
            w.className = `mw ${d.u===u?'me':''} ${d.u==='NooMB1T'?'ad':''}`;
            const canDel = (u === 'NooMB1T' || d.u === u);
            w.innerHTML = `<div class="u-n"><img src="${d.av}" class="av-s">${d.u} ${canDel ? `<span class="db" onclick="sc.emit('d','${d.id}')">×</span>` : ''}</div><div>${d.c}</div>`;
            document.getElementById('bx').appendChild(w);
        }
        function sm() { const i=document.getElementById('in'); if(i.value.trim()){ sc.emit('m',{u, av, c: i.value, to}); i.value=''; to=null; } }
        function sl() { const b=document.getElementById('bx'); b.scrollTop=b.scrollHeight; }
        document.getElementById('in').onkeypress=(e)=>{ if(e.key==='Enter') sm(); };
    </script>
</body>
</html>
