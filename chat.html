<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 4.9 Fast</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --text: #fff; --accent: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Панели */
        #s, #st { width: 300px; background: var(--card); position: fixed; top:0; bottom:0; transition: 0.2s; z-index: 100; border-right: 1px solid #222; }
        #s { left: -300px; } #st { right: -300px; padding: 20px; border-left: 1px solid #222; }
        #s.o { left: 0; } #st.o { right: 0; }
        #ov { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 90; backdrop-filter: blur(5px); }
        #ov.o { display: block; }

        /* Чат */
        .h { height: 60px; padding: 0 20px; display: flex; align-items: center; border-bottom: 1px solid #222; background: #000; justify-content: space-between; }
        #bx { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-size: cover; background-position: center; }
        
        .mw { max-width: 85%; padding: 10px 14px; border-radius: 15px; background: #1a1a1a; position: relative; border: 1px solid #222; }
        .mw.me { align-self: flex-end; background: #fff; color: #000; }
        .mw.ad { border: 1px solid #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        .st-ok { font-size: 10px; margin-left: 5px; opacity: 0.5; } /* Галочки */
        .img-msg { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }
        .av { width: 24px; height: 24px; border-radius: 50%; }

        .b { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #222; color: #fff; padding: 12px 20px; border-radius: 25px; outline: none; }
        .btn-up { width: 40px; height: 40px; background: #111; border: 1px solid #222; border-radius: 50%; color: #fff; cursor: pointer; }

        .u-item { padding: 12px 20px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; }
        .u-off { opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body>
    <div id="ov" onclick="closeAll()"></div>

    <div id="s">
        <div style="padding: 20px; font-weight: bold; border-bottom: 1px solid #222">ПОЛЬЗОВАТЕЛИ</div>
        <div id="ul"></div>
    </div>

    <div id="st">
        <h3>Настройки</h3><br>
        <label>Никнейм:</label><input type="text" id="set_u">
        <label>Фон (URL фото):</label><input type="text" id="set_bg" placeholder="http://..." oninput="changeBg(this.value)">
        <button onclick="save()" style="width:100%; padding:10px; background:#fff; color:#000; border:none; font-weight:bold">СОХРАНИТЬ</button>
    </div>

    <div style="flex:1; display:flex; flex-direction:column;">
        <div class="h">
            <span onclick="tm('s')">☰</span>
            <b id="chat_title">DoveGram 4.9</b>
            <span onclick="tm('st')">⚙</span>
        </div>
        <div id="bx"></div>
        <div id="ty" style="font-size:11px; color:#888; padding-left:20px; height:15px"></div>
        <div class="b">
            <button class="btn-up" onclick="document.getElementById('f_up').click()">+</button>
            <input type="file" id="f_up" hidden onchange="upImg(this)">
            <input type="text" id="in" placeholder="Сообщение..." oninput="isTyping()">
            <button onclick="sm()" style="background:#fff; border:none; padding:0 15px; border-radius:20px; font-weight:bold">↑</button>
        </div>
    </div>

    <script>
        let u = localStorage.getItem('du'), av = localStorage.getItem('da') || '', ph = localStorage.getItem('dp') || '';
        if(!u) window.location.href='/';
        
        const sc = io(); let to = null;
        let dbg = localStorage.getItem('dbg');
        if(dbg) document.getElementById('bx').style.backgroundImage = `url(${dbg})`;

        function tm(id){ document.getElementById(id).classList.toggle('o'); document.getElementById('ov').classList.toggle('o'); }
        function closeAll(){ document.getElementById('s').classList.remove('o'); document.getElementById('st').classList.remove('o'); document.getElementById('ov').classList.remove('o'); }
        
        // Typing
        function isTyping() { sc.emit('t', true); setTimeout(()=>sc.emit('t', false), 2000); }
        sc.on('t', d => { document.getElementById('ty').innerText = d.s ? `${d.u} пишет...` : ''; });

        sc.on('connect', () => sc.emit('j', { u, av, ph }));

        // Список всех пользователей
        sc.on('ul', d => {
            const c = document.getElementById('ul'); c.innerHTML = '';
            Object.keys(d.all).forEach(name => {
                const isOnline = d.online[name];
                c.innerHTML += `<div class="u-item ${!isOnline?'u-off':''}" onclick="st('${name}')">
                    <img src="${d.all[name].av}" class="av"> ${name} ${isOnline?'●':''}
                </div>`;
            });
        });

        sc.on('hs', h => { document.getElementById('bx').innerHTML=''; h.forEach(m=>dr(m)); sl(); });
        sc.on('m', m => { 
            dr(m); sl(); 
            if(m.u !== u) sc.emit('read', m.id); // Отправляем статус "прочитано"
        });
        sc.on('read_ok', id => { const e = document.getElementById('st_'+id); if(e) e.innerText = '✓✓'; });
        sc.on('d', i => document.getElementById(i)?.remove());

        function dr(d) {
            const w = document.createElement('div'); w.id = d.id;
            w.className = `mw ${d.u===u?'me':''} ${d.u==='NooMB1T'?'ad':''}`;
            const isAd = (u === 'NooMB1T' || d.u === u);
            w.innerHTML = `<div style="font-size:10px; font-weight:bold; margin-bottom:4px; display:flex; align-items:center; gap:5px">
                <img src="${d.av}" class="av">${d.u} ${isAd?`<span onclick="sc.emit('d','${d.id}')" style="color:red">×</span>`:''}</div>
                <div style="word-break:break-all">${d.t==='img' ? `<img src="${d.c}" class="img-msg" onclick="dl('${d.c}')">` : d.c}</div>
                <span class="st-ok" id="st_${d.id}">${d.u===u?'✓':''}</span>`;
            document.getElementById('bx').appendChild(w);
        }

        function sm() { 
            const i=document.getElementById('in'); 
            if(!i.value.trim()) return;
            const m = { u, av, c: i.value, t: 'txt', to, id: 'temp_'+Date.now() };
            dr(m); sl(); // МГНОВЕННОЕ ОТОБРАЖЕНИЕ
            sc.emit('m', m); 
            i.value=''; 
        }

        function upImg(input) {
            const r = new FileReader();
            r.onload = e => {
                const m = { u, av, c: e.target.result, t: 'img', to, id: 'temp_'+Date.now() };
                dr(m); sl();
                sc.emit('m', m);
            };
            r.readAsDataURL(input.files[0]);
        }

        function dl(url) { const a = document.createElement('a'); a.href = url; a.download = 'dovegram_photo.png'; a.click(); }
        function st(n){ to = n; document.getElementById('chat_title').innerText = n; closeAll(); }
        function sl(){ const b=document.getElementById('bx'); b.scrollTop=b.scrollHeight; }
        function changeBg(url){ document.getElementById('bx').style.backgroundImage = `url(${url})`; localStorage.setItem('dbg', url); }
        function save(){ localStorage.setItem('du', document.getElementById('set_u').value); location.reload(); }
        document.getElementById('in').onkeypress=e=>{ if(e.key==='Enter') sm(); };
    </script>
</body>
</html>
