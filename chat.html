<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 5.0 Infinity</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main: #000; --panel: #111; --accent: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--main); color: #fff; display: flex; height: 100vh; }
        
        /* Стили чата как на твоих скринах, но чище */
        #side { width: 300px; background: var(--panel); border-right: 1px solid #222; position: fixed; left: -300px; height: 100%; transition: 0.3s; z-index: 100; }
        #side.o { left: 0; }
        #ov { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 90; backdrop-filter: blur(10px); }
        #ov.o { display: block; }

        .h { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; background: #000; }
        #bx { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        
        /* Сообщения в стиле твоих скриншотов */
        .mw { max-width: 80%; padding: 12px; border-radius: 20px; background: #fff; color: #000; align-self: flex-start; position: relative; }
        .mw.me { align-self: flex-end; background: #222; color: #fff; border: 1px solid #333; }
        .mw.ad { border: 2px solid #ff4d4d; }
        
        .av { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .b { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px 20px; border-radius: 30px; outline: none; }
        
        .u-item { padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #222; cursor: pointer; }
        .u-item.off { opacity: 0.4; }
        
        /* Крутая фишка: Анимация при наборе */
        .typing { font-size: 10px; color: #888; padding: 5px 20px; }
    </style>
</head>
<body>
    <div id="ov" onclick="tm()"></div>
    
    <div id="side">
        <div style="padding:20px; font-weight:bold; font-size:18px">КОНТАКТЫ</div>
        <div id="ul"></div>
        <div style="padding:20px; position:absolute; bottom:0; width:100%">
            <button onclick="openProf()" style="width:100%; padding:10px; background:#fff; color:#000; border:none; border-radius:10px; font-weight:bold">МОЙ ПРОФИЛЬ</button>
        </div>
    </div>

    <div id="p_mod" style="display:none; position:fixed; inset:20px; background:#111; z-index:200; border-radius:20px; padding:20px; border:1px solid #333">
        <h2 style="margin-bottom:20px">Редактировать</h2>
        <center>
            <img id="p_av" style="width:100px; height:100px; border-radius:50%; border:2px solid #fff; cursor:pointer" onclick="document.getElementById('f_up').click()">
            <input type="file" id="f_up" hidden onchange="updAv(this)">
        </center>
        <br>
        <input type="text" id="p_u" placeholder="Никнейм">
        <input type="tel" id="p_ph" placeholder="Номер телефона">
        <button onclick="saveProf()" style="width:100%; padding:12px; background:#fff; color:#000; border:none; border-radius:10px; font-weight:bold">СОХРАНИТЬ</button>
        <button onclick="document.getElementById('p_mod').style.display='none'" style="width:100%; margin-top:10px; background:none; color:#fff; border:none">Отмена</button>
    </div>

    <div style="flex:1; display:flex; flex-direction:column;">
        <div class="h">
            <span onclick="tm()" style="font-size:24px; cursor:pointer">☰</span>
            <b id="c_t" style="margin-left:20px">DoveGram 5.0</b>
        </div>
        <div id="bx"></div>
        <div id="ty" class="typing"></div>
        <div class="b">
            <button onclick="document.getElementById('img_up').click()" style="background:#1a1a1a; border:none; color:#fff; width:40px; border-radius:50%">+</button>
            <input type="file" id="img_up" hidden onchange="upImg(this)">
            <input type="text" id="in" placeholder="Сообщение..." oninput="sc.emit('t', true)">
            <button onclick="sm()" style="background:#fff; border:none; padding:0 15px; border-radius:50%; width:45px; height:45px">↑</button>
        </div>
    </div>

    <script>
        const sc = io();
        let u = localStorage.getItem('du'), av = localStorage.getItem('da'), ph = localStorage.getItem('dp');
        let to = null;

        if(!u) window.location.href='/';

        function tm(){ document.getElementById('side').classList.toggle('o'); document.getElementById('ov').classList.toggle('o'); }
        
        sc.on('connect', () => sc.emit('j', { u, av, ph }));

        sc.on('ul', d => {
            const c = document.getElementById('ul'); c.innerHTML = '';
            // Синхронизация: Показываем всех, кто в базе
            Object.keys(d.all).forEach(name => {
                const online = d.online[name];
                c.innerHTML += `<div class="u-item ${!online?'off':''}" onclick="st('${name}')">
                    <img src="${d.all[name].av}" class="av">
                    <div>
                        <div style="font-weight:bold">${name}</div>
                        <div style="font-size:10px; color:#888">${d.all[name].ph}</div>
                    </div>
                </div>`;
            });
        });

        sc.on('hs', h => { document.getElementById('bx').innerHTML=''; h.forEach(m=>dr(m)); sl(); });
        sc.on('m', m => { dr(m); sl(); });
        sc.on('d', id => document.getElementById(id)?.remove());
        sc.on('t', d => { document.getElementById('ty').innerText = d.s ? `${d.u} печатает...` : ''; setTimeout(()=>document.getElementById('ty').innerText='', 3000); });

        function dr(d) {
            const w = document.createElement('div'); w.id = d.id;
            w.className = `mw ${d.u===u?'me':''} ${d.u==='NooMB1T'?'ad':''}`;
            const isAd = (u === 'NooMB1T' || d.u === u);
            w.innerHTML = `<div style="font-size:10px; font-weight:bold; margin-bottom:5px; display:flex; align-items:center; gap:5px">
                <img src="${d.av}" class="av">${d.u} ${isAd?`<span onclick="sc.emit('d','${d.id}')" style="color:red; margin-left:10px">×</span>`:''}</div>
                <div style="word-break:break-all">${d.t==='img'?`<img src="${d.c}" style="max-width:100%; border-radius:10px">`:d.c}</div>`;
            document.getElementById('bx').appendChild(w);
        }

        function sm() { 
            const i=document.getElementById('in'); 
            if(i.value.trim()){ sc.emit('m',{u, av, c: i.value, t:'txt', to}); i.value=''; } 
        }

        function upImg(el) {
            const r = new FileReader();
            r.onload = e => sc.emit('m', {u, av, c: e.target.result, t:'img', to});
            r.readAsDataURL(el.files[0]);
        }

        function openProf() {
            document.getElementById('p_u').value = u;
            document.getElementById('p_ph').value = ph;
            document.getElementById('p_av').src = av;
            document.getElementById('p_mod').style.display = 'block';
            tm();
        }

        function updAv(el) {
            const r = new FileReader();
            r.onload = e => { av = e.target.result; document.getElementById('p_av').src = av; };
            r.readAsDataURL(el.files[0]);
        }

        function saveProf() {
            u = document.getElementById('p_u').value;
            ph = document.getElementById('p_ph').value;
            localStorage.setItem('du', u);
            localStorage.setItem('da', av);
            localStorage.setItem('dp', ph);
            location.reload();
        }

        function st(n){ to = n; document.getElementById('c_t').innerText = n; tm(); }
        function sl(){ const b=document.getElementById('bx'); b.scrollTop=b.scrollHeight; }
        document.getElementById('in').onkeypress=e=>{ if(e.key==='Enter') sm(); };
    </script>
</body>
</html>
