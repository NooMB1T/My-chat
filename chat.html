<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; color: #fff; }

        .h { padding: 20px; border-bottom: 1px solid #111; display: flex; align-items: center; justify-content: space-between; background: #000; }
        #box { flex: 1; overflow-y: auto; padding: 25px 20px; display: flex; flex-direction: column; gap: 20px; }

        .msg { align-self: flex-end; max-width: 85%; background: #fff; color: #000; padding: 15px 20px; border-radius: 25px 25px 5px 25px; cursor: pointer; }
        .msg.reply-mode { border: 2px solid #3b82f6; }
        .msg b { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        .reply-text { font-size: 12px; color: #666; background: #f0f0f0; padding: 5px; border-radius: 5px; margin-bottom: 5px; }

        /* Только одна реакция */
        .re-btn { margin-top: 10px; font-size: 18px; cursor: pointer; opacity: 0.3; transition: 0.2s; }
        .re-btn.active { opacity: 1; filter: none; transform: scale(1.2); }

        .f { padding: 20px; background: #000; border-top: 1px solid #111; }
        .typing { font-size: 12px; color: #3b82f6; margin-bottom: 5px; height: 15px; }
        .input-row { display: flex; align-items: center; gap: 15px; }
        #i { flex: 1; padding: 15px 25px; border-radius: 30px; background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; outline: none; }
    </style>
</head>
<body>

<div class="h">
    <i class="fas fa-chevron-left" onclick="location.href='index.html'"></i>
    <div style="text-align: center;"><b>Глобальное ядро</b></div>
    <i class="fas fa-trash" onclick="clearHistory()" style="font-size: 14px; color: #222;"></i>
</div>

<div id="box"></div>

<div class="f">
    <div id="status" class="typing"></div>
    <div id="reply-box" style="display:none; color: #555; font-size: 12px; margin-bottom: 5px;">Ответ на сообщение... <i class="fas fa-times" onclick="cancelReply()"></i></div>
    <div class="input-row">
        <input type="text" id="i" placeholder="Сообщение..." oninput="handleTyping()">
        <i class="fas fa-paper-plane" style="color:#3b82f6;" onclick="send()"></i>
    </div>
</div>

<script>
    const user = localStorage.getItem('dg_user') || 'Аноним';
    let replyTo = null;

    function handleTyping() {
        const s = document.getElementById('status');
        if(document.getElementById('i').value.length > 0) {
            s.innerText = `${user} чирикает...`;
        } else {
            s.innerText = "";
        }
    }

    function send() {
        const v = document.getElementById('i').value;
        if(!v.trim()) return;
        
        const msgObj = {
            id: Date.now(),
            sender: user,
            text: v,
            reply: replyTo,
            reaction: null
        };

        saveMsg(msgObj);
        render(msgObj);
        cancelReply();
        document.getElementById('i').value = '';
        handleTyping();
    }

    function render(m) {
        const d = document.createElement('div');
        d.className = 'msg';
        d.innerHTML = `
            ${m.reply ? `<div class="reply-text">Ответ: ${m.reply}</div>` : ''}
            <b>${m.sender}</b>
            <p>${m.text}</p>
            <span class="re-btn ${m.reaction ? 'active' : ''}" onclick="toggleRe(this, ${m.id})">❤️</span>
        `;
        d.onclick = () => setReply(m.text);
        document.getElementById('box').appendChild(d);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    }

    function toggleRe(btn, id) {
        btn.classList.toggle('active');
        // Обновление в памяти (упрощенно)
    }

    function setReply(text) {
        replyTo = text;
        document.getElementById('reply-box').style.display = 'block';
    }

    function cancelReply() {
        replyTo = null;
        document.getElementById('reply-box').style.display = 'none';
    }

    function saveMsg(m) {
        let h = JSON.parse(localStorage.getItem('dg_history') || '[]');
        h.push(m);
        localStorage.setItem('dg_history', JSON.stringify(h));
    }

    function loadHistory() {
        let h = JSON.parse(localStorage.getItem('dg_history') || '[]');
        h.forEach(m => render(m));
    }

    function clearHistory() {
        if(confirm("Очистить чат?")) {
            localStorage.setItem('dg_history', '[]');
            location.reload();
        }
    }

    window.onload = loadHistory;
</script>
</body>
</html>
