<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --bg: #000; --accent: #ff4d4d; --glass: rgba(255,255,255,0.07); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; color: #fff; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; }

        /* Шапка чату */
        .chat-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #111;
            position: sticky; top: 0; z-index: 10;
        }
        .back-btn { font-size: 20px; cursor: pointer; color: #444; }
        .chat-info b { font-size: 18px; display: block; }
        .chat-info small { color: var(--accent); font-weight: bold; font-size: 11px; text-transform: uppercase; }

        /* Зона повідомлень */
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg-wrap { max-width: 85%; display: flex; flex-direction: column; gap: 5px; animation: pop 0.3s ease; }
        .msg-wrap.me { align-self: flex-end; align-items: flex-end; }

        .bubble { 
            padding: 12px 16px; 
            border-radius: 20px; 
            background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 15px;
            line-height: 1.4;
        }
        .me .bubble { background: #fff; color: #000; border: none; }

        /* Реакції (як ти хотів) */
        .react-row { display: flex; gap: 4px; margin-top: -12px; z-index: 2; }
        .react-btn { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 4px 8px; 
            border-radius: 12px; 
            font-size: 12px; 
            cursor: pointer;
            transition: 0.2s;
        }
        .react-btn:active { transform: scale(1.3); }

        /* Нижній бар */
        .input-box {
            padding: 15px;
            background: #000;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #111;
        }
        .input-field {
            flex: 1;
            background: var(--glass);
            border: 1px solid #222;
            padding: 12px 18px;
            border-radius: 25px;
            outline: none;
        }
        .icon-btn { font-size: 20px; color: #555; cursor: pointer; }
        .send-btn { color: #fff; transform: rotate(45deg); }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="chat-header">
        <i class="fas fa-chevron-left back-btn" onclick="location.href='index.html'"></i>
        <div class="chat-info">
            <b>Global Core Chat</b>
            <small>● Online</small>
        </div>
        <i class="fas fa-ellipsis-v" style="margin-left: auto; color: #333;"></i>
    </div>

    <div id="chat-flow">
        <div class="msg-wrap">
            <div class="bubble">Привіт! Це DoveGram 6.0 Core. Спробуй відправити фото або текст.</div>
            <div class="react-row">
                <div class="react-btn" onclick="this.innerHTML='🔥 1'">👍</div>
            </div>
        </div>
    </div>

    <div class="input-box">
        <input type="file" id="f-up" hidden onchange="upImg(this)">
        <i class="fas fa-plus-circle icon-btn" onclick="document.getElementById('f-up').click()"></i>
        <input type="text" id="m-in" class="input-field" placeholder="Повідомлення...">
        <i class="fas fa-paper-plane icon-btn send-btn" onclick="send()"></i>
    </div>

<script>
    function send() {
        const i = document.getElementById('m-in');
        if(!i.value.trim()) return;
        render(i.value, true);
        i.value = '';
    }

    function upImg(input) {
        if(input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => render('', true, e.target.result);
            r.readAsDataURL(input.files[0]);
        }
    }

    function render(txt, me, img = null) {
        const flow = document.getElementById('chat-flow');
        const wrap = document.createElement('div');
        wrap.className = `msg-wrap ${me ? 'me' : ''}`;
        
        wrap.innerHTML = `
            <div class="bubble">
                ${txt}
                ${img ? `<img src="${img}" style="width:100%; border-radius:10px; margin-top:8px;">` : ''}
            </div>
            <div class="react-row">
                <div class="react-btn" onclick="this.innerHTML='🔥 1'">👍</div>
            </div>
        `;
        
        flow.appendChild(wrap);
        flow.scrollTop = flow.scrollHeight;
    }

    document.getElementById('m-in').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
</body>
</html>
