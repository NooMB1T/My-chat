<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; color: #fff; }

        .h { padding: 20px; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 20px; background: #000; }
        #box { flex: 1; overflow-y: auto; padding: 25px 20px; display: flex; flex-direction: column; gap: 20px; }

        /* Твои сообщения: Черный текст на Белом фоне */
        .msg { align-self: flex-end; max-width: 85%; background: #fff; color: #000; padding: 15px 20px; border-radius: 25px 25px 5px 25px; cursor: pointer; }
        .msg b { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .msg p { font-size: 16px; font-weight: 500; color: #000; }
        
        .rep { font-size: 12px; color: #666; background: #f0f0f0; padding: 8px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid #3b82f6; }

        .re-btn { margin-top: 10px; font-size: 20px; cursor: pointer; opacity: 0.3; transition: 0.2s; filter: grayscale(1); }
        .re-btn.active { opacity: 1; filter: none; transform: scale(1.2); }

        .f { padding: 20px; border-top: 1px solid #111; background: #000; }
        .typing-bar { font-size: 12px; color: #3b82f6; height: 15px; margin-bottom: 5px; }
        .f-row { display: flex; align-items: center; gap: 15px; }
        #i { flex: 1; padding: 15px 25px; border-radius: 30px; background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; outline: none; }
        
        .mic-rec { color: #ff4d4d !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="h">
    <i class="fas fa-chevron-left" onclick="location.href='index.html'"></i>
    <b>Глобальное ядро</b>
</div>

<div id="box"></div>

<div class="f">
    <div id="status" class="typing-bar"></div>
    <div id="rep-box" style="display:none; color:#555; font-size:12px; margin-bottom:5px;">Ответ на сообщение...</div>
    <div class="f-row">
        <input type="text" id="i" placeholder="Сообщение..." oninput="isTyping()">
        <i class="fas fa-microphone" id="mic" style="font-size:22px; color:#333;" onclick="voice()"></i>
        <i class="fas fa-paper-plane" id="send" style="display:none; color:#3b82f6; font-size:22px;" onclick="send()"></i>
    </div>
</div>

<script>
    const user = localStorage.getItem('dg_u') || 'Аноним';
    let replyText = null;

    function isTyping() {
        const s = document.getElementById('status');
        const b = document.getElementById('send');
        const m = document.getElementById('mic');
        if(document.getElementById('i').value.length > 0) {
            s.innerText = `${user} чирикает...`;
            b.style.display = "block"; m.style.display = "none";
        } else {
            s.innerText = "";
            b.style.display = "none"; m.style.display = "block";
        }
    }

    function send() {
        const v = document.getElementById('i').value;
        if(!v.trim()) return;
        const msg = { sender: user, text: v, rep: replyText, id: Date.now() };
        render(msg);
        save(msg);
        document.getElementById('i').value = '';
        replyText = null; document.getElementById('rep-box').style.display = 'none';
        isTyping();
    }

    function render(m) {
        const d = document.createElement('div');
        d.className = 'msg';
        d.innerHTML = `
            ${m.rep ? `<div class="rep">Ответ: ${m.rep}</div>` : ''}
            <b>${m.sender}</b>
            <p>${m.text}</p>
            <div class="re-btn" onclick="this.classList.toggle('active')">❤️</div>
        `;
        d.onclick = () => { replyText = m.text; document.getElementById('rep-box').style.display = 'block'; };
        document.getElementById('box').appendChild(d);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    }

    function save(m) {
        let h = JSON.parse(localStorage.getItem('dg_h') || '[]');
        h.push(m);
        localStorage.setItem('dg_h', JSON.stringify(h));
    }

    // Голосовые (Имитация для демо, требует HTTPS)
    let rec = false;
    function voice() {
        const m = document.getElementById('mic');
        rec = !rec;
        if(rec) { m.classList.add('mic-rec'); }
        else {
            m.classList.remove('mic-rec');
            render({ sender: user, text: "🎤 Голосовое сообщение (0:05)" });
        }
    }

    window.onload = () => {
        let h = JSON.parse(localStorage.getItem('dg_h') || '[]');
        h.forEach(m => render(m));
    };
    document.getElementById('i').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
