<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DoveGram 0.21</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #3b82f6; --bg: #000; --panel: #0a0a0a; --text: #fff; --msg-my: #2563eb; --msg-other: #1a1a1a; }
        body.light { --bg: #f0f2f5; --panel: #fff; --text: #000; --msg-other: #e4e6eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; width: 100vw; }

        /* Головний контейнер */
        #app { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .main-view { flex: 1; display: flex; flex-direction: column; border-right: 1px solid rgba(128,128,128,0.1); }
        .side-icons { width: 70px; display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 35px; background: var(--panel); }
        .side-icons i { font-size: 22px; color: #555; cursor: pointer; padding: 10px; }
        .side-icons i:hover { color: var(--accent); }

        /* Екрани */
        .screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 1000; padding: 20px; }
        .screen.active { display: flex; }

        .chat-card { padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(128,128,128,0.1); cursor: pointer; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; margin: 4px 0; position: relative; word-wrap: break-word; }
        .bubble.my { align-self: flex-end; background: var(--msg-my); color: #fff; border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        
        .input-ui { width: 100%; padding: 14px; background: var(--panel); border: 1px solid rgba(128,128,128,0.2); border-radius: 12px; color: var(--text); outline: none; }
        .btn-ui { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; color: #fff; cursor: pointer; }
        
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; }
    </style>
</head>
<body class="dark">

<div id="scr-auth" class="screen active" style="justify-content: center; align-items: center;">
    <div style="width: 100%; max-width: 300px; text-align: center;">
        <h2 style="margin-bottom:30px;">DoveGram 0.21</h2>
        <input type="text" id="reg-id" class="input-ui" placeholder="@ID (наприклад: nick)" style="margin-bottom:10px">
        <input type="text" id="reg-name" class="input-ui" placeholder="Ваше ім'я" style="margin-bottom:10px">
        <input type="text" id="reg-phone" class="input-ui" placeholder="+380..." style="margin-bottom:20px">
        <button id="login-btn" onclick="app.register()" class="btn-ui">УВІЙТИ</button>
        <p id="auth-status" style="font-size:12px; margin-top:15px; color:var(--accent)"></p>
    </div>
</div>

<div id="app">
    <div class="main-view">
        <div style="padding: 15px;"><input type="text" id="search-in" class="input-ui" placeholder="Пошук друзів..." oninput="app.search()"></div>
        <div id="contacts-list" style="flex: 1; overflow-y: auto;"></div>
    </div>
    <div class="side-icons">
        <i class="fas fa-cog" onclick="app.nav('scr-settings')"></i>
        <i class="fas fa-plus" onclick="document.getElementById('search-in').focus()"></i>
        <i class="fas fa-users" id="dev-btn" style="display:none" onclick="app.showDev()"></i>
        <i class="fas fa-user-circle" onclick="app.showMyProfile()"></i>
    </div>
</div>

<div id="scr-chat" class="screen" style="padding:0">
    <div style="padding: 15px; display: flex; align-items: center; gap: 12px; background: var(--panel); border-bottom: 1px solid rgba(128,128,128,0.1);">
        <i class="fas fa-arrow-left" onclick="app.nav('close-chat')"></i>
        <b id="chat-head-name">Чат</b>
        <span id="typing-notif" style="font-size:10px; color:var(--accent)"></span>
    </div>
    <div id="msg-box"></div>
    <div style="padding:10px; display:flex; gap:10px; background:var(--panel);">
        <input type="text" id="msg-input" class="input-ui" style="flex:1; margin:0" placeholder="Повідомлення..." oninput="app.typing()">
        <button onclick="app.send()" style="background:none; border:none; color:var(--accent); font-size:20px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div id="scr-profile" class="screen">
    <i class="fas fa-arrow-left" onclick="app.nav('close-chat')" style="margin-bottom:20px"></i>
    <div style="text-align: center;">
        <div style="width:90px; height:90px; border-radius:50%; background:var(--accent); margin:0 auto 15px; border:3px solid #333;"></div>
        <h2 id="p-name-val">Ім'я</h2>
        <p id="p-id-val" style="opacity:0.5; margin-bottom:5px"></p>
        <p id="p-phone-val" style="color:var(--accent); font-weight:bold"></p>
        <button class="btn-ui" style="background:#ef4444; margin-top:40px;" onclick="app.logout()">ВИЙТИ З АККАУНТУ</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
    authDomain: "dove-7ea6d.firebaseapp.com",
    projectId: "dove-7ea6d",
    databaseURL: "https://dove-7ea6d-default-rtdb.firebaseio.com",
    appId: "1:747559004808:web:f80e792795e5b3b4758d3d"
};

const f_app = initializeApp(firebaseConfig);
const db = getDatabase(f_app);

window.app = {
    user: null, peer: null,

    init() {
        const local = localStorage.getItem('dove_v21');
        if(local) {
            this.user = JSON.parse(local);
            this.launch();
        }
    },

    launch() {
        document.getElementById('scr-auth').classList.remove('active');
        document.getElementById('app').style.display = 'flex';
        if(this.user.id === 'dev') document.getElementById('dev-btn').style.display = 'block';
        this.loadUsers();
    },

    async register() {
        const id = document.getElementById('reg-id').value.trim().toLowerCase();
        const nm = document.getElementById('reg-name').value.trim();
        const ph = document.getElementById('reg-phone').value.trim();
        const btn = document.getElementById('login-btn');
        const stat = document.getElementById('auth-status');

        if(!id || !nm || !ph) return alert("Заповни все!");
        
        btn.disabled = true;
        stat.innerText = "Перевірка даних...";

        try {
            const snap = await get(ref(db, 'users/' + id));
            if(snap.exists()) {
                this.user = snap.val();
            } else {
                this.user = { id, name: nm, phone: ph, ava: '', bio: '', lang: 'uk' };
                await set(ref(db, 'users/' + id), this.user);
            }
            localStorage.setItem('dove_v21', JSON.stringify(this.user));
            location.reload(); // Перезавантаження для ініціалізації
        } catch(e) {
            alert("Помилка бази: " + e.message);
            btn.disabled = false;
        }
    },

    loadUsers() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            Object.values(snap.val() || {}).forEach(u => {
                if(u.id !== this.user.id) {
                    const d = document.createElement('div');
                    d.className = 'chat-card';
                    d.onclick = () => this.openChat(u);
                    d.innerHTML = `<div style="width:40px;height:40px;border-radius:50%;background:#222;"></div> <b>${u.name}</b>`;
                    list.appendChild(d);
                }
            });
        });
    },

    openChat(u) {
        this.peer = u;
        document.getElementById('chat-head-name').innerText = u.name;
        this.nav('scr-chat');
        const path = [this.user.id, u.id].sort().join('_');
        onValue(ref(db, 'msgs/' + path), (s) => this.draw(s.val()));
    },

    draw(data) {
        const box = document.getElementById('msg-box');
        box.innerHTML = ''; if(!data) return;
        Object.values(data).forEach(m => {
            const div = document.createElement('div');
            div.className = `bubble ${m.s === this.user.id ? 'my' : 'other'}`;
            div.innerHTML = `${m.t} <small style="display:block;font-size:8px;opacity:0.5;text-align:right">${m.time}</small>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    },

    send() {
        const t = document.getElementById('msg-input').value; if(!t) return;
        const path = [this.user.id, this.peer.id].sort().join('_');
        push(ref(db, 'msgs/' + path), {
            s: this.user.id, t, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        document.getElementById('msg-input').value = '';
    },

    nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id === 'close-chat') return;
        document.getElementById(id).classList.add('active');
    },

    showMyProfile() {
        document.getElementById('p-name-val').innerText = this.user.name;
        document.getElementById('p-id-val').innerText = '@' + this.user.id;
        document.getElementById('p-phone-val').innerText = this.user.phone;
        this.nav('scr-profile');
    },

    logout() { localStorage.clear(); location.reload(); }
};
app.init();
</script>
</body>
</html>
