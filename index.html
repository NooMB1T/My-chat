<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DoveGram</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#17212b;--sb:#0e1621;--inp:#242f3d;--hov:#202b36;
--sent:#2b5278;--recv:#182533;--acc:#5eaae8;--acc2:#3a8fd4;
--txt:#f5f5f5;--txt2:#7e919e;--txt3:#546778;--brd:#1c2936;
--grn:#4dcd5e;--red:#e05555;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--txt)}
.scr{display:none;height:100%;width:100%;position:absolute;top:0;left:0;flex-direction:column}.scr.act{display:flex}
.inp{width:100%;padding:14px 18px;border-radius:12px;border:2px solid var(--brd);background:var(--inp);color:var(--txt);font-size:15px;outline:none;margin-bottom:12px;transition:border .2s;font-family:inherit}
.inp:focus{border-color:var(--acc)}.inp::placeholder{color:var(--txt3)}
.ib{width:42px;height:42px;border:none;border-radius:50%;background:transparent;color:var(--txt2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.ib:hover{background:var(--hov);color:var(--txt)}

/* AUTH */
#auth{align-items:center;justify-content:center;background:var(--sb)}
.auth-box{width:90%;max-width:380px;text-align:center}
.logo-icon{width:100px;height:100px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,#5eaae8,#7b68ee);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(94,170,232,.3)}
.logo-icon i{font-size:44px;color:#fff}
.auth-box h1{font-size:28px;font-weight:700;margin-bottom:4px}
.auth-box .sub{color:var(--txt2);font-size:14px;margin-bottom:28px}
.btn-main{width:100%;padding:14px;border:none;border-radius:12px;background:var(--acc);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-main:hover{background:var(--acc2)}

/* APP UI */
#app{flex-direction:row}
.sb{width:320px;min-width:320px;height:100%;display:flex;flex-direction:column;background:var(--sb);border-right:1px solid var(--brd)}
.sb-top{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--brd)}
.search-w{flex:1;position:relative}
.search-w i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3)}
.search-w input{width:100%;padding:10px 14px 10px 40px;border-radius:22px;border:none;background:var(--inp);color:var(--txt);outline:none}

.tabs{display:flex;border-bottom:1px solid var(--brd)}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent}
.tab.act{color:var(--acc);border-bottom-color:var(--acc)}

.cl{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;transition:.1s}
.ci:hover{background:var(--hov)}.ci.active{background:var(--acc)}.ci.active *{color:#fff!important}
.av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;position:relative;flex-shrink:0}
.av.c1{background:#5eaae8} .av.c2{background:#43b87a} .av.c3{background:#e05555} .av.c4{background:#f5a623} .av.gl{background:linear-gradient(135deg,#5eaae8,#43b87a)}
.av .dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--grn);border-radius:50%;border:2px solid var(--sb)}

.ci-body{flex:1;min-width:0}
.ci-top{display:flex;justify-content:space-between;margin-bottom:2px}
.ci-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-time{font-size:11px;color:var(--txt3)}
.ci-msg{font-size:13px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.cha{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.ch-h{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--sb);border-bottom:1px solid var(--brd);min-height:58px}
.ch-info{flex:1}.ch-nm{font-weight:600;display:block}.ch-st{font-size:12px;color:var(--txt2)}
.msgs{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:4px}
.mg{max-width:75%;display:flex;flex-direction:column;margin-bottom:2px}
.mg.s{align-self:flex-end}.mg.r{align-self:flex-start}
.bbl{padding:8px 12px;border-radius:14px;position:relative;word-break:break-word;line-height:1.4}
.mg.s .bbl{background:var(--sent);border-bottom-right-radius:4px}
.mg.r .bbl{background:var(--recv);border-bottom-left-radius:4px}
.mg-sn{font-size:12px;font-weight:700;color:var(--acc);margin-bottom:2px;margin-left:5px}
.mg-f{display:flex;justify-content:flex-end;gap:4px;margin-top:2px;font-size:10px;opacity:0.6}

.in-bar{display:flex;align-items:flex-end;padding:8px 12px;background:var(--sb);border-top:1px solid var(--brd);gap:8px}
.in-bar textarea{flex:1;padding:10px 15px;border-radius:20px;background:var(--inp);color:var(--txt);border:none;outline:none;resize:none;max-height:150px}

/* Global Users List */
.gul{padding:10px;background:rgba(94,170,232,0.05);border-bottom:1px solid var(--brd);display:flex;gap:10px;overflow-x:auto}
.gui{flex-shrink:0;text-align:center;width:60px;cursor:pointer}
.gui .av{width:40px;height:40px;margin:0 auto 4px}
.gui span{font-size:10px;color:var(--txt2);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Modals */
.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:100}
.mo.act{display:flex}
.md{background:var(--sb);width:90%;max-width:400px;border-radius:20px;padding:25px}
.md-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}

@media(max-width:768px){
.sb{width:100%;min-width:100%}.sb.hid{display:none}
.cha.hid{display:none}.back{display:flex!important}
}
</style>
</head>
<body>

<div id="auth" class="scr act">
    <div class="auth-box">
        <div class="logo-icon"><i class="fas fa-dove"></i></div>
        <h1>DoveGram</h1>
        <p class="sub">Введіть дані для входу</p>
        <input class="inp" id="aId" placeholder="@username (латиниця)" autocomplete="off">
        <input class="inp" id="aNm" placeholder="Ваше ім'я">
        <button class="btn-main" id="aBtn">Увійти <i class="fas fa-arrow-right"></i></button>
        <p id="aErr" style="color:var(--red);margin-top:10px;font-size:13px"></p>
    </div>
</div>

<div id="app" class="scr">
    <aside id="sidebar" class="sb">
        <div class="sb-top">
            <button class="ib" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="search-w"><i class="fas fa-search"></i><input id="searchIn" placeholder="Пошук..."></div>
        </div>
        <div class="tabs">
            <div class="tab act" data-t="all">Всі</div>
            <div class="tab" data-t="global">Глобальний</div>
        </div>
        <div class="cl" id="chatList"></div>
    </aside>

    <main id="chatArea" class="cha hid">
        <header class="ch-h">
            <button class="ib back" id="backBtn" style="display:none"><i class="fas fa-arrow-left"></i></button>
            <div class="av gl" id="hAv" style="width:40px;height:40px"></div>
            <div class="ch-info">
                <span class="ch-nm" id="hNm">Оберіть чат</span>
                <span class="ch-st" id="hSt"></span>
            </div>
        </header>
        <div id="globalUsers" class="gul" style="display:none"></div>
        <div class="msgs" id="msgs"></div>
        <div class="in-bar" id="inBar" style="display:none">
            <textarea id="mIn" rows="1" placeholder="Повідомлення..."></textarea>
            <button class="ib" id="sndBtn" style="color:var(--acc)"><i class="fas fa-paper-plane"></i></button>
        </div>
    </main>
</div>

<div class="mo" id="profM">
    <div class="md">
        <div class="md-h"><h3>Профіль</h3><button class="ib" id="profX"><i class="fas fa-times"></i></button></div>
        <p style="font-size:12px;color:var(--acc);margin-bottom:5px">Ваш ID</p>
        <input class="inp" id="pId" disabled>
        <p style="font-size:12px;color:var(--acc);margin-bottom:5px">Ім'я</p>
        <input class="inp" id="pNm">
        <button class="btn-main" id="pSave" style="margin-top:10px">Зберегти</button>
        <button class="btn-main" id="logoutBtn" style="margin-top:10px;background:transparent;border:1px solid var(--red);color:var(--red)">Вийти</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, onChildAdded, update, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
    authDomain: "dove-7ea6d.firebaseapp.com",
    databaseURL: "https://dove-7ea6d-default-rtdb.firebaseio.com",
    projectId: "dove-7ea6d",
    storageBucket: "dove-7ea6d.appspot.com",
    appId: "1:747559004808:web:f80e792795e5b3b4758d3d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const S = { user: null, chat: null, listeners: [], mob: window.innerWidth <= 768 };
const $ = id => document.getElementById(id);

// --- UTILS ---
const cid = (a, b) => [a, b].sort().join('_');
const esc = s => { let d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const showScr = id => { 
    document.querySelectorAll('.scr').forEach(s => s.classList.remove('act')); 
    $(id).classList.add('act'); 
};

// --- AUTH ---
function init() {
    const saved = localStorage.getItem('dg_user');
    if (saved) {
        S.user = JSON.parse(saved);
        showScr('app');
        startApp();
    } else {
        showScr('auth');
    }
}

$('aBtn').onclick = () => {
    const id = $('aId').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    const nm = $('aNm').value.trim();
    if (id.length < 2) { $('aErr').textContent = 'ID занадто короткий'; return; }
    
    S.user = { uid: id, name: nm || id };
    localStorage.setItem('dg_user', JSON.stringify(S.user));
    
    set(ref(db, 'users/' + id), {
        uid: id,
        name: nm || id,
        online: true,
        lastSeen: Date.now()
    });
    
    showScr('app');
    startApp();
};

// --- APP CORE ---
let usersC = {};

function startApp() {
    // Слухач користувачів
    onValue(ref(db, 'users'), s => {
        usersC = s.val() || {};
        renderCL();
        renderGUL();
    });

    // Оновлення статусу "в мережі"
    const uRef = ref(db, 'users/' + S.user.uid);
    update(uRef, { online: true });
    window.addEventListener('beforeunload', () => update(uRef, { online: false, lastSeen: Date.now() }));
    
    bindEvents();
}

function renderCL() {
    let h = '';
    // Глобальний чат завжди зверху
    h += `<div class="ci ${S.chat === 'global' ? 'active' : ''}" onclick="openChat('global')">
        <div class="av gl"><i class="fas fa-globe"></i></div>
        <div class="ci-body">
            <div class="ci-top"><span class="ci-name">Глобальний чат</span></div>
            <div class="ci-msg">Загальне спілкування</div>
        </div>
    </div>`;

    // Приватні чати (лише ті, де є повідомлення, або за пошуком)
    Object.values(usersC).forEach(u => {
        if (u.uid === S.user.uid) return;
        h += `<div class="ci ${S.chat === u.uid ? 'active' : ''}" onclick="openChat('${u.uid}')">
            <div class="av c1"><i class="fas fa-user"></i>${u.online ? '<div class="dot"></div>' : ''}</div>
            <div class="ci-body">
                <div class="ci-top"><span class="ci-name">${esc(u.name)}</span></div>
                <div class="ci-msg">@${u.uid}</div>
            </div>
        </div>`;
    });
    $('chatList').innerHTML = h;
}

// Список людей зверху в чаті
function renderGUL() {
    let h = '';
    Object.values(usersC).forEach(u => {
        if (u.uid === S.user.uid) return;
        h += `<div class="gui" onclick="openChat('${u.uid}')">
            <div class="av ${u.online ? 'c2' : 'c4'}" style="width:36px;height:36px;font-size:12px">
                ${u.name[0].toUpperCase()}
            </div>
            <span>${esc(u.name)}</span>
        </div>`;
    });
    $('globalUsers').innerHTML = h;
}

function openChat(id) {
    S.chat = id;
    S.listeners.forEach(offFn => offFn());
    S.listeners = [];
    
    if (S.mob) {
        $('sidebar').classList.add('hid');
        $('chatArea').classList.remove('hid');
        $('backBtn').style.display = 'block';
    }
    
    $('chatArea').classList.remove('hid');
    $('inBar').style.display = 'flex';
    $('msgs').innerHTML = '';
    
    const isG = id === 'global';
    $('globalUsers').style.display = isG ? 'flex' : 'none';
    
    if (isG) {
        $('hNm').textContent = 'Глобальний чат';
        $('hSt').textContent = 'Для всіх користувачів';
    } else {
        const u = usersC[id] || { name: id };
        $('hNm').textContent = u.name;
        $('hSt').textContent = u.online ? 'в мережі' : 'офлайн';
    }

    const path = isG ? 'msgs/global' : 'msgs/' + cid(S.user.uid, id);
    
    const l = onChildAdded(ref(db, path), s => {
        addM(s.val());
        $('msgs').scrollTop = $('msgs').scrollHeight;
    });
    S.listeners.push(() => off(ref(db, path), 'child_added', l));
    renderCL();
}

function addM(m) {
    const mine = m.sender === S.user.uid;
    const d = document.createElement('div');
    d.className = 'mg ' + (mine ? 's' : 'r');
    
    let h = '';
    if (!mine && S.chat === 'global') h += `<div class="mg-sn">${esc(m.senderName)}</div>`;
    h += `<div class="bbl">
        <div>${esc(m.text)}</div>
        <div class="mg-f">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
    </div>`;
    d.innerHTML = h;
    $('msgs').appendChild(d);
}

async function sendMsg() {
    const txt = $('mIn').value.trim();
    if (!txt || !S.chat) return;

    const path = S.chat === 'global' ? 'msgs/global' : 'msgs/' + cid(S.user.uid, S.chat);
    const data = {
        sender: S.user.uid,
        senderName: S.user.name,
        text: txt,
        time: Date.now()
    };

    $('mIn').value = '';
    // Мінімальна затримка для стабільності Firebase
    setTimeout(() => {
        push(ref(db, path), data);
    }, 300);
}

// --- EVENTS ---
function bindEvents() {
    $('sndBtn').onclick = sendMsg;
    $('mIn').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } };
    
    $('menuBtn').onclick = () => {
        $('pId').value = '@' + S.user.uid;
        $('pNm').value = S.user.name;
        $('profM').classList.add('act');
    };
    
    $('profX').onclick = () => $('profM').classList.remove('act');
    
    $('pSave').onclick = () => {
        const newName = $('pNm').value.trim();
        if (newName) {
            S.user.name = newName;
            localStorage.setItem('dg_user', JSON.stringify(S.user));
            update(ref(db, 'users/' + S.user.uid), { name: newName });
            alert('Збережено!');
            $('profM').classList.remove('act');
        }
    };

    $('logoutBtn').onclick = () => {
        localStorage.removeItem('dg_user');
        location.reload();
    };

    $('backBtn').onclick = () => {
        $('sidebar').classList.remove('hid');
        $('chatArea').classList.add('hid');
        S.chat = null;
    };
}

function autoH() {
    const t = $('mIn');
    t.style.height = 'auto';
    t.style.height = t.scrollHeight + 'px';
}
$('mIn').oninput = autoH;

init();
</script>
</body>
</html>
