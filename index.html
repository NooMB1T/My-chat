
</html>
/html>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 6.0 Core</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --accent: #fff; --blue-zone: #050505; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Шапка по шаблону */
        .h { height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; background: #000; z-index: 100; }
        #back-btn { font-size: 24px; cursor: pointer; display: none; } /* Появится в чате */
        .user-av { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ff0000; object-fit: cover; } /* Червоне коло */

        #main-container { flex: 1; display: flex; }

        /* Список чатов (Синє на эскизе) */
        #chat-list-zone { width: 100%; max-width: 400px; background: var(--blue-zone); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .chat-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .chat-item:hover { background: #111; }
        .av-small { width: 45px; height: 45px; border-radius: 50%; background: #333; }

        /* Зона самого чата */
        #chat-window { flex: 1; display: none; flex-direction: column; background: #000; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; background: #1a1a1a; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: #fff; color: #000; }

        /* Панель кнопок справа (1, 2, 3, 4, ->) */
        #right-tools { width: 70px; border-left: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 30px; }
        .tool-btn { font-size: 22px; cursor: pointer; color: #555; transition: 0.2s; }
        .tool-btn:hover { color: #fff; }

        /* Ввод */
        .input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #222; }
        .inp { flex: 1; padding: 15px; border-radius: 15px; border: 1px solid #333; background: #111; color: #fff; outline: none; }

        /* Состояния */
        body.in-chat #chat-list-zone { display: none; }
        body.in-chat #chat-window { display: flex; }
        body.in-chat #back-btn { display: block; }
        body.in-chat #app-title { display: none; }

        #auth { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

<div id="auth">
    <h2 style="margin-bottom:20px">DoveGram 6.0 Core</h2>
    <input type="text" id="u_n" class="inp" style="max-width:300px" placeholder="Никнейм">
    <input type="tel" id="u_p" class="inp" style="max-width:300px" placeholder="Номер телефона">
    <button onclick="start()" style="width:300px; padding:15px; border-radius:15px; border:none; background:#fff; font-weight:bold">ВОЙТИ</button>
</div>

<div class="h">
    <div id="back-btn" onclick="exitChat()">←</div>
    <b id="app-title">DoveGram</b>
    <img id="my-pic" class="user-av" src="">
</div>

<div id="main-container">
    <div id="chat-list-zone">
        <div class="chat-item" onclick="enterChat('Глобальный чат', 'global')">
            <div class="av-small" style="display:flex;align-items:center;justify-content:center">🌐</div>
            <b>Глобальный хаб</b>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="chat-window">
        <div id="msgs"></div>
        <div class="input-area">
            <input type="text" id="in" class="inp" placeholder="Сообщение...">
            <button onclick="send()" style="padding:0 20px; border-radius:15px; border:none; background:#fff; font-weight:bold">↑</button>
        </div>
    </div>

    <div id="right-tools">
        <div class="tool-btn" onclick="alert('Настройки')">⚙️</div> <div class="tool-btn" onclick="alert('Добавить чат')">+</div> <div class="tool-btn" onclick="alert('Секретный режим')">🔒</div> <div class="tool-btn" onclick="alert('О приложении')">❔</div> <div class="tool-btn" style="margin-top:auto" onclick="location.reload()">➡️</div> </div>
</div>

<script>
    const sc = io();
    let u = localStorage.getItem('du'), av = localStorage.getItem('da') || 'https://i.imgur.com/6VBx3io.png', ph = localStorage.getItem('dp');
    let room = 'global';

    if(u) { document.getElementById('auth').style.display='none'; join(); }

    function start() {
        u = document.getElementById('u_n').value.trim(); ph = document.getElementById('u_p').value.trim();
        if(!u || !ph) return;
        localStorage.setItem('du', u); localStorage.setItem('dp', ph); localStorage.setItem('da', av);
        document.getElementById('auth').style.display='none';
        join();
    }

    function join() {
        document.getElementById('my-pic').src = av;
        sc.emit('j', { u, av, ph });
    }

    function enterChat(name, r) {
        room = r;
        document.body.classList.add('in-chat');
        sc.emit('join_room', r);
    }

    function exitChat() {
        document.body.classList.remove('in-chat');
    }

    sc.on('ul', d => {
        const list = document.getElementById('contact-list');
        list.innerHTML = '';
        Object.values(d.db).forEach(user => {
            if(user.u !== u) {
                list.innerHTML += `<div class="chat-item" onclick="enterChat('${user.u}', '${user.u}')">
                    <img src="${user.av}" class="av-small">
                    <b>${user.u}</b>
                </div>`;
            }
        });
    });

    sc.on('hs', h => { document.getElementById('msgs').innerHTML=''; h.forEach(m=>dr(m)); sl(); });
    sc.on('m', m => { dr(m); sl(); });

    function dr(d) {
        const div = document.createElement('div');
        div.className = `msg ${d.u === u ? 'me' : ''}`;
        div.innerHTML = `<small style="font-size:10px; opacity:0.5">${d.u}</small><br>${d.c}`;
        document.getElementById('msgs').appendChild(div);
    }

    function send() {
        const i = document.getElementById('in');
        if(i.value.trim()) { sc.emit('m', { u, av, c: i.value, room }); i.value = ''; }
    }

    function sl() { const b = document.getElementById('msgs'); b.scrollTop = b.scrollHeight; }
    document.getElementById('in').onkeypress = e => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
