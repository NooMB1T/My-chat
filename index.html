<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoveChat | Login</title>
    <style>
        body { background: #0e1621; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #17212b; padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; }
        h1 { color: #5288c1; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #2b3e51; background: #242f3d; color: #fff; outline: none; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #5288c1; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>DoveChat</h1>
        <input type="text" id="u" placeholder="Ваш ник..." autocomplete="off">
        <button onclick="l()">Войти</button>
    </div>
    <script>
        function l() {
            const n = document.getElementById('u').value.trim();
            if(n) { localStorage.setItem('du', n); window.location.href = '/chat.html'; }
        }
    </script>
</body>
</html>
