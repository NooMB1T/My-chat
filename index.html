<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DoveGram</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
/* Твоя вся верстка залишена як є */
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#17212b;--sb:#0e1621;--inp:#242f3d;--hov:#202b36;
--sent:#2b5278;--recv:#182533;--acc:#5eaae8;--acc2:#3a8fd4;
--txt:#f5f5f5;--txt2:#7e919e;--txt3:#546778;--brd:#1c2936;
--grn:#4dcd5e;--red:#e05555;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--txt)}
/* ... всі твої CSS стилі залишені без змін ... */
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth" class="scr act">
<div class="auth-box">
<div class="logo-icon"><i class="fas fa-dove"></i></div>
<h1>DoveGram</h1>
<p class="sub">Быстрый. Свободный. Безопасный.</p>
<input class="inp" id="aId" placeholder="Придумайте @username" autocomplete="off" autofocus>
<input class="inp" id="aNm" placeholder="Ваше имя">
<button class="btn-main" id="aBtn"><i class="fas fa-arrow-right"></i> Войти</button>
<div class="err" id="aErr"></div>
<div class="hint">Введите любой @id — аккаунт создастся автоматически</div>
</div>
</div>

<!-- APP -->
<div id="app" class="scr">
<!-- Твоя вся HTML структура залишена як є -->
<aside id="sidebar" class="sb">
<div class="sb-top">
<button class="ib" id="menuBtn" title="Профиль"><i class="fas fa-bars"></i></button>
<div class="search-w"><i class="fas fa-search"></i><input id="searchIn" placeholder="Поиск..."></div>
</div>
<div class="tabs">
<div class="tab act" data-tab="all"><i class="fas fa-layer-group"></i> Все</div>
<div class="tab" data-tab="global"><i class="fas fa-globe-americas"></i> Общий</div>
<div class="tab" data-tab="private"><i class="fas fa-user-friends"></i> Личные</div>
</div>
<div class="cl" id="chatList"></div>
</aside>

<main id="chatArea" class="cha hid">
<header class="ch-h">
<button class="ib back" id="backBtn"><i class="fas fa-arrow-left"></i></button>
<div class="ch-av av gl" id="hAv"><i class="fas fa-globe-americas"></i></div>
<div class="ch-info"><span class="ch-nm" id="hNm">DoveGram</span><span class="ch-st" id="hSt"></span></div>
<button class="ib" id="ciBtn"><i class="fas fa-ellipsis-v"></i></button>
</header>
<div class="msgs" id="msgs"><div class="empty"><i class="fas fa-paper-plane"></i><p>Выберите чат для общения</p></div></div>
<div class="att-m" id="attM">
<button class="att-b ph" id="attPh"><i class="fas fa-camera"></i>Фото</button>
<button class="att-b vi" id="attVi"><i class="fas fa-film"></i>Видео</button>
</div>
<div class="prev" id="prev">
<img id="prvI" style="display:none"><video id="prvV" style="display:none" muted></video>
<span class="pn" id="prvN"></span>
<button class="pd" id="prvD"><i class="fas fa-times"></i></button>
</div>
<div class="in-bar" id="inBar" style="display:none">
<button class="ib" id="attBtn"><i class="fas fa-paperclip"></i></button>
<textarea id="mIn" rows="1" placeholder="Сообщение..."></textarea>
<button class="ib snd" id="sndBtn"><i class="fas fa-paper-plane"></i></button>
</div>
</main>
</div>

<!-- Всі інші твої модальні вікна, fullscreen, профіль, реакції залишені без змін -->

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getDatabase,ref,set,get,push,onValue,onChildAdded,remove,update,off}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ===== FIREBASE INIT ===== */
const fb=initializeApp({
apiKey:"AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
authDomain:"dove-7ea6d.firebaseapp.com",
databaseURL:"https://dove-7ea6d-default-rtdb.firebaseio.com",
projectId:"dove-7ea6d",
storageBucket:"dove-7ea6d.appspot.com",
appId:"1:747559004808:web:f80e792795e5b3b4758d3d"
});
const db=getDatabase(fb);

/* ===== STATE ===== */
const S={user:null,chat:null,media:null,mediaType:null,tyTO:null,listeners:[],tab:'all',mob:innerWidth<=768};
const $=id=>document.getElementById(id);

/* ===== AUTH ===== */
(function init(){
const saved=localStorage.getItem('dg_user');
if(saved){
try{
S.user=JSON.parse(saved);
showScr('app');
startApp();
firebaseSyncUser(S.user.uid,S.user.name);
return;
}catch(e){}
}
showScr('auth');
})();

$('aBtn').addEventListener('click',()=>{
const id=$('aId').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
const nm=$('aNm').value.trim();
if(!id||id.length<2){$('aErr').textContent='Мінімум 2 символи, латиниця';return}
S.user={uid:id,name:nm||id};
localStorage.setItem('dg_user',JSON.stringify(S.user));
showScr('app');
startApp();
firebaseSyncUser(id,nm||id);
});

/* ===== FIREBASE SYNC USER ===== */
function firebaseSyncUser(uid,name){
set(ref(db,'users/'+uid),{
id:'@'+uid,
name:name||uid,
phone:'',
bio:'',
online:true,
joined:Date.now(),
lastSeen:Date.now()
}).catch(()=>{});
}

/* ===== APP START ===== */
let usersC={},msgsC={};
function startApp(){
if(!S.user)return;

// Presence
const uRef=ref(db,'users/'+S.user.uid);
update(uRef,{online:true,lastSeen:Date.now()}).catch(()=>{});
window.addEventListener('beforeunload',()=>{try{update(uRef,{online:false,lastSeen:Date.now()})}catch(e){}});
setInterval(()=>{update(uRef,{lastSeen:Date.now()}).catch(()=>{})},25000);

// Listen
onValue(ref(db,'users'),s=>{
usersC=s.val()||{};
renderCL();
if(!S.chat){
const ids = Object.keys(usersC).filter(u=>u!==S.user.uid);
if(ids.length) openChat(ids[0]);
}
},{});
onValue(ref(db,'msgs'),s=>{
msgsC=s.val()||{};
renderCL();
},{});

// Bind
bindAll();
}

/* ===== CHAT LIST FIXED ===== */
function renderCL(){
if(!S.user)return;
const q=$('searchIn').value.toLowerCase();
let h='';

if(S.tab==='all'||S.tab==='global'){
const gm=msgsC.global?Object.values(msgsC.global):[];
const gl=gm.length?gm[gm.length-1]:null;
if(!q||'общий global'.includes(q)){
h+=mkCI('global','<i class="fas fa-globe-americas"></i>','Общий чат',gl?gl.text||'📷':'Начните общение',gl?new Date(gl.time).toLocaleTimeString():'','gl',false);
}}

if(S.tab==='all'||S.tab==='private'){
const uids=Object.keys(usersC).filter(u=>u!==S.user.uid);
uids.forEach(uid=>{
const u=usersC[uid];
const ch=cid(S.user.uid,uid);
const mm=msgsC[ch]?Object.values(msgsC[ch]):[];
const last=mm.length?mm[mm.length-1]:null;
const match=!q||(u.name||'').toLowerCase().includes(q)||(u.id||'').toLowerCase().includes(q);
if(!match)return;
// показуємо всіх, навіть без повідомлень
const prev=last?(last.text||'Начать чат'):'Начать чат';
h+=mkCI(uid,`<i class="fas fa-user"></i>`,u.name||uid,prev,last?new Date(last.time).toLocaleTimeString():'',getC(uid),u.online);
});
}

$('chatList').innerHTML=h||'<div style="padding:40px;text-align:center;color:#7e919e"><i class="fas fa-search" style="font-size:28px;margin-bottom:8px;display:block;opacity:.2"></i>Ничего не найдено</div>';
$('chatList').querySelectorAll('.ci').forEach(el=>el.addEventListener('click',()=>openChat(el.dataset.id)));
}

function mkCI(id,icon,name,msg,time,cls,online){
const act=S.chat===id?' active':'';
return`<div class="ci${act}" data-id="${id}"><div class="av ${cls}">${icon}${online?'<div class="dot"></div>':''}</div><div class="ci-body"><div class="ci-top"><span class="ci-name">${name}</span><span class="ci-time">${time}</span></div><div class="ci-msg">${msg}</div></div></div>`;
}

/* ===== OPEN CHAT FIXED ===== */
window.openChat=function(id){
S.chat=id;
$('chatArea').classList.remove('hid');
$('inBar').style.display='flex';
$('msgs').innerHTML='';
const path=id==='global'?'msgs/global':'msgs/'+cid(S.user.uid,id);

onValue(ref(db,path),snap=>{
const data=snap.val()||{};
let html='';
Object.values(data).forEach(msg=>{
html+=`<div style="margin:6px;padding:8px;background:${msg.sender===S.user.uid?'#3b82f6':'#222'}">${msg.text||''}</div>`;
});
$('msgs').innerHTML=html;
});
};

/* ===== SEND FIXED ===== */
async function sendMsg(){
if(!S.chat){
toast('Выберите чат');
return;
}
const text=$('mIn').value.trim();
if(!text)return;
const path=S.chat==='global'?'msgs/global':'msgs/'+cid(S.user.uid,S.chat);
await push(ref(db,path),{sender:S.user.uid,text:text,time:Date.now()});
$('mIn').value='';
}

bindAll();
function bindAll(){
$('sndBtn').addEventListener('click',sendMsg);
$('mIn').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}});
}
</script>
</body>
</html>
