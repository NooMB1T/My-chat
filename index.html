</body>
</html>
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 6.0 Core</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --accent: #ff4d4d; --blue: #3b82f6; --green: #22c55e; --gray: #111; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* Авторизація (Спрощена) */
        #auth { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        input { width: 100%; max-width: 320px; padding: 18px; border-radius: 15px; background: #0a0a0a; color: #fff; border: 1px solid #222; margin-bottom: 12px; outline: none; }
        .btn { width: 100%; max-width: 320px; padding: 18px; border-radius: 15px; background: #fff; color: #000; font-weight: bold; border: none; cursor: pointer; }

        /* ВЕЛИКА АВАТАРКА (Червоне коло на схемі) */
        #big-av { position: fixed; top: 10px; right: 10px; width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; z-index: 1000; background: #222; }

        /* Панель пошуку (Зелена на схемі) */
        #search-box { width: 100%; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; }
        #s-in { width: 100%; padding: 12px; border-radius: 20px; background: #111; border: 1px solid #222; color: #fff; outline: none; }

        /* Список чатів (Зліва від синьої лінії) */
        #left { flex: 1; display: flex; flex-direction: column; border-right: 2px solid var(--blue); }
        .u-row { padding: 18px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #080808; cursor: pointer; }
        .u-row:active { background: #0a0a0a; }

        /* Кнопки налаштувань (Жовті/Зелені 1-4) */
        #right-btns { width: 70px; display: flex; flex-direction: column; align-items: center; padding-top: 130px; gap: 30px; }
        .num-btn { font-size: 22px; color: #4ade80; cursor: pointer; font-weight: bold; opacity: 0.6; transition: 0.3s; }
        .num-btn:hover { opacity: 1; transform: scale(1.2); }

        /* Окно чату */
        #win { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .m { padding: 14px; border-radius: 20px; background: #161616; max-width: 80%; font-size: 15px; }
        .m.me { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 2px; }
        .in-bar { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid #1a1a1a; }
    </style>
</head>
<body>

<div id="auth">
    <h2 style="margin-bottom:25px">DoveGram 6.0</h2>
    <input type="text" id="u-name" placeholder="Твій нікнейм">
    <input type="tel" id="u-phone" placeholder="Твій номер">
    <button class="btn" onclick="start()">УВІЙТИ</button>
</div>

<img id="big-av" src="https://i.imgur.com/6VBx3io.png">

<div id="left">
    <div id="search-box">
        <input type="text" id="s-in" placeholder="Пошук..." oninput="search()">
    </div>
    <div id="u-list"></div>
</div>

<div id="right-btns">
    <div class="num-btn" onclick="alert('Налаштування')">1</div>
    <div class="num-btn" onclick="alert('Додати')">2</div>
    <div class="num-btn" id="snd-btn" onclick="togSnd()">3</div>
    <div class="num-btn" onclick="alert('Закладки')">4</div>
    <div class="num-btn" style="margin-top:auto; color:red" onclick="location.reload()">→</div>
</div>

<div id="win">
    <div style="padding:15px; display:flex; align-items:center; border-bottom:1px solid #111">
        <span onclick="document.getElementById('win').style.display='none'" style="font-size:25px; cursor:pointer">←</span>
        <b id="chat-with" style="margin-left:20px"></b>
    </div>
    <div id="msgs"></div>
    <div class="input-bar">
        <input type="text" id="m-in" placeholder="Повідомлення..." style="flex:1; margin-bottom:0">
        <button onclick="send()" style="padding:0 20px; border-radius:12px; background:#fff; border:none; font-weight:bold">↑</button>
    </div>
</div>

<script>
    const socket = io();
    let me = { n: localStorage.getItem('dg_n'), p: localStorage.getItem('dg_p'), av: 'https://i.imgur.com/6VBx3io.png' };
    let snd = true;

    if(me.n) { document.getElementById('auth').style.display='none'; run(); }

    function start() {
        me.n = document.getElementById('u-name').value;
        me.p = document.getElementById('u-phone').value;
        if(!me.n || !me.p) return alert("Введи дані!");
        localStorage.setItem('dg_n', me.n); localStorage.setItem('dg_p', me.p);
        document.getElementById('auth').style.display='none';
        run();
    }

    function run() {
        document.getElementById('big-av').src = me.av;
        socket.emit('join', { u: me.n, ph: me.p, av: me.av });
    }

    function search() {
        const q = document.getElementById('s-in').value.toLowerCase();
        document.querySelectorAll('.u-row').forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    }

    function send() {
        const i = document.getElementById('m-in');
        if(i.value.trim()) { socket.emit('msg', { u: me.n, t: i.value }); i.value = ''; }
    }

    socket.on('ul', users => {
        const l = document.getElementById('u-list'); l.innerHTML = '';
        Object.keys(users).forEach(u => {
            if(u === me.n) return;
            l.innerHTML += `<div class="u-row" onclick="openChat('${u}')">
                <div style="width:45px; height:45px; border-radius:50%; background:#222"></div>
                <div><b>${u}</b><br><small style="color:#444">${users[u].ph}</small></div>
            </div>`;
        });
    });

    socket.on('msg', m => {
        const d = document.createElement('div');
        d.className = `m ${m.u === me.n ? 'me' : ''}`;
        d.innerHTML = `<small style="opacity:0.5">${m.u}</small><br>${m.t}`;
        document.getElementById('msgs').appendChild(d);
        if(snd && m.u !== me.n) new Audio('https://i.imgur.com/o2v81I1.mp3').play();
        const b = document.getElementById('msgs'); b.scrollTop = b.scrollHeight;
    });

    socket.on('hs', h => h.forEach(m => {
        const d = document.createElement('div');
        d.className = `m ${m.u === me.n ? 'me' : ''}`;
        d.innerHTML = `<small style="opacity:0.5">${m.u}</small><br>${m.t}`;
        document.getElementById('msgs').appendChild(d);
    }));

    function openChat(n) { document.getElementById('chat-with').innerText = n; document.getElementById('win').style.display = 'flex'; }
    function togSnd() { snd = !snd; document.getElementById('snd-btn').style.color = snd ? '#4ade80' : '#ff4d4d'; }
    document.getElementById('m-in').onkeypress = e => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
