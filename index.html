<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DoveGram Sync</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#17212b;--sb:#0e1621;--inp:#242f3d;--hov:#202b36;
--sent:#2b5278;--recv:#182533;--acc:#5eaae8;--acc2:#3a8fd4;
--txt:#f5f5f5;--txt2:#7e919e;--txt3:#546778;--brd:#1c2936;
--grn:#4dcd5e;--red:#e05555;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--txt)}
.scr{display:none;height:100%;width:100%;position:absolute;top:0;left:0}.scr.act{display:flex}
.inp{width:100%;padding:14px 18px;border-radius:12px;border:2px solid var(--brd);background:var(--inp);color:var(--txt);font-size:15px;outline:none;margin-bottom:12px;transition:border .2s}
.inp:focus{border-color:var(--acc)}
.ib{width:42px;height:42px;border:none;border-radius:50%;background:transparent;color:var(--txt2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.ib:hover{background:var(--hov);color:var(--txt)}

/* ===== AUTH ===== */
#auth{flex-direction:column;align-items:center;justify-content:center;background:var(--sb)}
.auth-box{width:90%;max-width:380px;text-align:center}
.btn-main{width:100%;padding:14px;border:none;border-radius:12px;background:var(--acc);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}
.btn-main:hover{background:var(--acc2)}

/* ===== APP ===== */
#app{flex-direction:row}
.sb{width:320px;min-width:320px;height:100%;display:flex;flex-direction:column;background:var(--sb);border-right:1px solid var(--brd)}
.sb-top{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--brd)}
.search-w{flex:1;position:relative}
.search-w i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3)}
.search-w input{width:100%;padding:10px 14px 10px 40px;border-radius:22px;border:none;background:var(--inp);color:var(--txt);outline:none}

.tabs{display:flex;border-bottom:1px solid var(--brd)}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent}
.tab.act{color:var(--acc);border-bottom-color:var(--acc)}

.cl{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:.12s}
.ci:hover{background:var(--hov)}.ci.active{background:var(--acc)}.ci.active *{color:#fff!important}
.av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;position:relative}
.av.c1{background:#5eaae8}.av.c2{background:#43b87a}.av.c3{background:#e05555}.av.c4{background:#f5a623}.av.gl{background:linear-gradient(135deg,#5eaae8,#43b87a)}
.av .dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--grn);border-radius:50%;border:2px solid var(--sb)}

.cha{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.ch-h{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--sb);border-bottom:1px solid var(--brd);position:relative}
.ch-nm{font-size:15px;font-weight:600}.ch-st{font-size:12px;color:var(--txt2)}

/* 3 DOTS MENU */
.ch-menu{position:absolute;top:55px;right:15px;background:var(--sb);border:1px solid var(--brd);border-radius:12px;padding:5px;z-index:2000;display:none;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ch-menu.show{display:flex}
.ch-menu button{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;background:none;border:none;color:var(--txt);cursor:pointer;border-radius:8px}
.ch-menu button:hover{background:var(--hov)}

.msgs{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:4px}
.mg{max-width:75%;display:flex;flex-direction:column}.mg.s{align-self:flex-end}.mg.r{align-self:flex-start}
.bbl{padding:8px 12px;border-radius:14px;font-size:14.5px;position:relative}
.mg.s .bbl{background:var(--sent);border-bottom-right-radius:4px}
.mg.r .bbl{background:var(--recv);border-bottom-left-radius:4px}
.mg-sn{font-size:12px;color:var(--acc);margin-bottom:2px;font-weight:600}
.mg-f{display:flex;justify-content:flex-end;font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px}

.mg-rx{display:flex;gap:4px;margin-top:2px}
.rxb{padding:2px 6px;border-radius:10px;background:var(--inp);border:1px solid var(--brd);font-size:12px;cursor:pointer}
.rxb.my{border-color:var(--acc)}

.in-bar{display:flex;align-items:center;padding:10px;background:var(--sb);border-top:1px solid var(--brd);gap:8px}
#mIn{flex:1;background:var(--inp);border:none;border-radius:20px;padding:10px 15px;color:var(--txt);outline:none;resize:none}

.rpop{position:fixed;display:none;background:var(--sb);border:1px solid var(--brd);border-radius:20px;padding:5px;gap:5px;z-index:3000}
.rpop.show{display:flex}
.rpop button{background:none;border:none;font-size:22px;cursor:pointer;padding:5px;transition:0.2s}
.rpop button:hover{transform:scale(1.3)}

@media(max-width:768px){ .sb.hid{display:none} .cha.hid{display:none} .back{display:flex!important} }
</style>
</head>
<body>

<div id="auth" class="scr act">
    <div class="auth-box">
        <h1 style="margin-bottom:20px">DoveGram</h1>
        <input class="inp" id="aId" placeholder="@username">
        <input class="inp" id="aNm" placeholder="Ваше ім'я">
        <button class="btn-main" id="aBtn">Увійти</button>
    </div>
</div>

<div id="app" class="scr">
    <aside id="sidebar" class="sb">
        <div class="sb-top">
            <button class="ib" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="search-w"><i class="fas fa-search"></i><input id="searchIn" placeholder="Пошук людей..."></div>
        </div>
        <div class="tabs">
            <div class="tab act" data-tab="all">Все</div>
            <div class="tab" data-tab="global">Глобал</div>
        </div>
        <div class="cl" id="chatList"></div>
    </aside>

    <main id="chatArea" class="cha hid">
        <header class="ch-h">
            <button class="ib back" style="display:none" id="backBtn"><i class="fas fa-arrow-left"></i></button>
            <div class="av gl" id="hAv" style="width:40px;height:40px"><i class="fas fa-globe"></i></div>
            <div style="flex:1">
                <div class="ch-nm" id="hNm">Оберіть чат</div>
                <div class="ch-st" id="hSt"></div>
            </div>
            <button class="ib" id="ciBtn"><i class="fas fa-ellipsis-v"></i></button>
            <div class="ch-menu" id="chMenu">
                <button id="cmClear"><i class="fas fa-trash"></i> Очистити чат</button>
            </div>
        </header>
        <div class="msgs" id="msgs"></div>
        <div class="in-bar" id="inBar" style="display:none">
            <textarea id="mIn" rows="1" placeholder="Повідомлення..."></textarea>
            <button class="ib" id="sndBtn" style="color:var(--acc)"><i class="fas fa-paper-plane"></i></button>
        </div>
    </main>
</div>

<div class="rpop" id="rPop">
    <button data-r="❤️">❤️</button>
    <button data-r="💔">💔</button>
    <button data-r="❤️‍🔥">❤️‍🔥</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onValue, off, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const fb = initializeApp({
    apiKey: "AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
    authDomain: "dove-7ea6d.firebaseapp.com",
    databaseURL: "https://dove-7ea6d-default-rtdb.firebaseio.com",
    projectId: "dove-7ea6d",
    storageBucket: "dove-7ea6d.appspot.com",
    appId: "1:747559004808:web:f80e792795e5b3b4758d3d"
});
const db = getDatabase(fb);

let S = { user: null, chat: null, tab: 'all', users: {}, listeners: [] };
const $ = id => document.getElementById(id);

/* AUTH */
const saved = localStorage.getItem('dg_user');
if(saved) { S.user = JSON.parse(saved); showApp(); }

$('aBtn').onclick = () => {
    const id = $('aId').value.trim().toLowerCase().replace('@','');
    const nm = $('aNm').value.trim();
    if(id.length < 2) return alert('ID надто короткий');
    S.user = { uid: id, name: nm || id };
    localStorage.setItem('dg_user', JSON.stringify(S.user));
    set(ref(db, 'users/' + id), { uid: id, name: nm || id, online: true });
    showApp();
};

function showApp() {
    $('auth').classList.remove('act');
    $('app').classList.add('act');
    onValue(ref(db, 'users'), snap => {
        S.users = snap.val() || {};
        renderCL();
    });
}

/* CHAT LIST & SEARCH */
function renderCL() {
    const q = $('searchIn').value.toLowerCase();
    let html = '';

    // Глобальний чат
    if(!q || 'глобал'.includes(q)) {
        html += `<div class="ci ${S.chat==='global'?'active':''}" onclick="openChat('global')">
            <div class="av gl"><i class="fas fa-globe"></i></div>
            <div style="margin-left:12px"><b>Глобальний чат</b><br><small>Всі користувачі</small></div>
        </div>`;
    }

    // Пошук друзів
    Object.values(S.users).forEach(u => {
        if(u.uid === S.user.uid) return;
        if(q && !u.name.toLowerCase().includes(q) && !u.uid.toLowerCase().includes(q)) return;
        
        html += `<div class="ci ${S.chat===u.uid?'active':''}" onclick="openChat('${u.uid}')">
            <div class="av c${(u.uid.length%4)+1}"><i class="fas fa-user"></i></div>
            <div style="margin-left:12px"><b>${u.name}</b><br><small>@${u.uid}</small></div>
        </div>`;
    });
    $('chatList').innerHTML = html;
}

$('searchIn').oninput = renderCL;

/* MESSAGING */
const cid = (a, b) => [a, b].sort().join('_');

window.openChat = (id) => {
    S.chat = id;
    S.listeners.forEach(off);
    S.listeners = [];
    
    $('chatArea').classList.remove('hid');
    if(innerWidth < 768) $('sidebar').classList.add('hid');
    $('inBar').style.display = 'flex';
    $('msgs').innerHTML = '';
    
    const isG = id === 'global';
    const path = isG ? 'msgs/global' : 'msgs/' + cid(S.user.uid, id);
    const target = isG ? {name: 'Глобал'} : S.users[id];
    
    $('hNm').textContent = target.name;
    renderCL();

    const mRef = ref(db, path);
    onValue(mRef, snap => {
        $('msgs').innerHTML = '';
        const data = snap.val() || {};
        Object.entries(data).forEach(([mid, m]) => {
            const mine = m.sender === S.user.uid;
            const div = document.createElement('div');
            div.className = `mg ${mine?'s':'r'}`;
            
            let reactions = '';
            if(m.reactions) {
                Object.entries(m.reactions).forEach(([reId, re]) => {
                    reactions += `<span class="rxb ${re.by===S.user.uid?'my':''}" onclick="toggleR('${mid}','${re.emoji}','${reId}')">${re.emoji}</span>`;
                });
            }

            div.innerHTML = `
                ${!mine && isG ? `<div class="mg-sn">${m.senderName}</div>` : ''}
                <div class="bbl" oncontextmenu="showR(event,'${mid}')" ondblclick="showR(event,'${mid}')">
                    ${m.text}
                    <div class="mg-f">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
                <div class="mg-rx">${reactions}</div>
            `;
            $('msgs').appendChild(div);
        });
        $('msgs').scrollTop = $('msgs').scrollHeight;
    });
    S.listeners.push(mRef);
};

$('sndBtn').onclick = () => {
    const txt = $('mIn').value.trim();
    if(!txt || !S.chat) return;
    const path = S.chat === 'global' ? 'msgs/global' : 'msgs/' + cid(S.user.uid, S.chat);
    push(ref(db, path), {
        sender: S.user.uid,
        senderName: S.user.name,
        text: txt,
        time: Date.now()
    });
    $('mIn').value = '';
};

/* REACTIONS */
let activeMid = null;
window.showR = (e, mid) => {
    e.preventDefault();
    activeMid = mid;
    $('rPop').style.left = e.pageX + 'px';
    $('rPop').style.top = (e.pageY - 50) + 'px';
    $('rPop').classList.add('show');
};

document.querySelectorAll('#rPop button').forEach(btn => {
    btn.onclick = () => {
        const emoji = btn.dataset.r;
        const path = (S.chat === 'global' ? 'msgs/global' : 'msgs/' + cid(S.user.uid, S.chat)) + `/${activeMid}/reactions`;
        push(ref(db, path), { emoji, by: S.user.uid });
        $('rPop').classList.remove('show');
    };
});

window.toggleR = (mid, em, reId) => {
    const path = (S.chat === 'global' ? 'msgs/global' : 'msgs/' + cid(S.user.uid, S.chat)) + `/${mid}/reactions/${reId}`;
    remove(ref(db, path));
};

/* UI */
$('ciBtn').onclick = (e) => { e.stopPropagation(); $('chMenu').classList.toggle('show'); };
document.onclick = () => { $('chMenu').classList.remove('show'); $('rPop').classList.remove('show'); };
$('backBtn').onclick = () => { $('sidebar').classList.remove('hid'); $('chatArea').classList.add('hid'); };
$('cmClear').onclick = () => {
    if(!confirm('Видалити історію?')) return;
    const path = S.chat === 'global' ? 'msgs/global' : 'msgs/' + cid(S.user.uid, S.chat);
    remove(ref(db, path));
};
</script>
</body>
</html>
