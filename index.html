<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DoveGram 0.30</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#17212b;--sb:#0e1621;--inp:#242f3d;--hov:#202b36;
--sent:#2b5278;--recv:#182533;--acc:#5eaae8;--acc2:#3a8fd4;
--txt:#f5f5f5;--txt2:#7e919e;--txt3:#546778;--brd:#1c2936;
--grn:#4dcd5e;--red:#e05555;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--txt)}
.scr{display:none;height:100%;width:100%;position:absolute;top:0;left:0}.scr.act{display:flex}
.inp{width:100%;padding:13px 16px;border-radius:12px;border:2px solid var(--brd);background:var(--inp);color:var(--txt);font-size:15px;outline:none;margin-bottom:10px;font-family:inherit;transition:border .2s}
.inp:focus{border-color:var(--acc)}.inp::placeholder{color:var(--txt3)}.inp:disabled{opacity:.5}
.ib{width:42px;height:42px;border:none;border-radius:50%;background:transparent;color:var(--txt2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.ib:hover{background:var(--hov);color:var(--txt)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--acc);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.btn:hover{background:var(--acc2)}.btn:disabled{opacity:.5}

/* AUTH */
#auth{flex-direction:column;align-items:center;justify-content:center;background:var(--sb)}
.abox{width:90%;max-width:380px;text-align:center;animation:fu .5s ease}
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logowrap{width:120px;height:60px;margin:0 auto 16px;overflow:hidden;position:relative}
.logocirc{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#e05555,#ff6b6b);position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:center}
.logocirc i{font-size:36px;color:#fff;margin-top:-8px}
.abox h1{font-size:30px;font-weight:700;margin-bottom:4px}
.abox .sub{color:var(--txt2);font-size:14px;margin-bottom:28px}

/* APP */
#app{flex-direction:row}

/* SIDEBAR */
.sb{width:320px;min-width:320px;height:100%;display:flex;flex-direction:column;background:var(--sb);border-right:1px solid var(--brd)}
.sb-top{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--brd);min-height:58px}
.srchw{flex:1;position:relative}
.srchw i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:13px}
.srchw input{width:100%;padding:10px 14px 10px 40px;border-radius:22px;border:none;background:var(--inp);color:var(--txt);font-size:13px;outline:none}
.tabs{display:flex;border-bottom:1px solid var(--brd)}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent}
.tab.act{color:var(--acc);border-bottom-color:var(--acc)}
.cl{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer}
.ci:hover{background:var(--hov)}.ci.on{background:rgba(94,170,232,.2)}
.av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;position:relative}
.av.gl{background:linear-gradient(135deg,#5eaae8,#43b87a)}
.av.c1{background:#5eaae8} .av.c2{background:#43b87a} .av.c3{background:#e05555}
.av .dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;background:var(--grn);border-radius:50%;border:2px solid var(--sb)}
.cib{flex:1;min-width:0}
.cin{font-size:14.5px;font-weight:600}
.cim{font-size:13px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CHAT AREA */
.cha{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.chh{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--sb);border-bottom:1px solid var(--brd);min-height:58px}
.chav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.chinf{flex:1;display:flex;flex-direction:column}
.chn{font-size:15px;font-weight:600}
.chs{font-size:12px;color:var(--txt2)}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:2px}
.mg{max-width:75%;display:flex;flex-direction:column;position:relative;margin-bottom:4px}
.mg.s{align-self:flex-end}.mg.r{align-self:flex-start}
.bbl{padding:8px 12px;border-radius:12px;font-size:14.5px;line-height:1.4;word-break:break-word}
.mg.s .bbl{background:var(--sent);border-top-right-radius:4px}
.mg.r .bbl{background:var(--recv);border-top-left-radius:4px}
.mi{max-width:100%;border-radius:8px;margin-bottom:4px;display:block}
.mgti{font-size:10px;color:rgba(255,255,255,.5);text-align:right;display:block;margin-top:2px}

/* INPUT BAR */
.inbar{display:flex;align-items:flex-end;gap:5px;padding:10px;background:var(--sb);border-top:1px solid var(--brd)}
.inbar textarea{flex:1;padding:10px 15px;border:none;border-radius:20px;background:var(--inp);color:var(--txt);resize:none;outline:none;max-height:120px}

/* UTILS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-bg.show{display:flex}
.mdl{width:90%;max-width:400px;background:var(--sb);border-radius:16px;padding:25px}
.ctx{position:fixed;display:none;background:var(--sb);border:1px solid var(--brd);border-radius:12px;padding:5px;z-index:2000}
.ctx.show{display:block}
.ctx button{width:100%;padding:10px;text-align:left;background:none;border:none;color:white;cursor:pointer}
.ctx button:hover{background:var(--hov)}

@media(max-width:768px){ .sb{width:100%}.sb.hid{display:none}.cha.hid{display:none} }
</style>
</head>
<body>

<div id="auth" class="scr act">
    <div class="abox">
        <div class="logowrap"><div class="logocirc"><i class="fas fa-dove"></i></div></div>
        <h1>DoveGram</h1>
        <p class="sub">Быстрый. Свободный. Безопасный.</p>
        <input class="inp" id="aId" placeholder="Придумайте @username" autocomplete="off">
        <input class="inp" id="aNm" placeholder="Ваше имя">
        <button class="btn" id="aBtn">Войти</button>
    </div>
</div>

<div id="app" class="scr">
    <aside id="sidebar" class="sb">
        <div class="sb-top">
            <button class="ib" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="srchw"><i class="fas fa-search"></i><input id="srcIn" placeholder="Поиск..."></div>
        </div>
        <div class="tabs">
            <div class="tab act">Все чаты</div>
        </div>
        <div class="cl" id="chatList"></div>
    </aside>

    <main id="chatArea" class="cha hid">
        <header class="chh">
            <button class="ib" id="backBtn"><i class="fas fa-arrow-left"></i></button>
            <div class="chav" id="hAv"></div>
            <div class="chinf"><span class="chn" id="hNm"></span><span class="chs" id="hSt"></span></div>
        </header>
        <div class="msgs" id="msgs"></div>
        <div class="inbar" id="inbar" style="display:none">
            <button class="ib" id="attBtn"><i class="fas fa-paperclip"></i></button>
            <textarea id="mIn" rows="1" placeholder="Сообщение..."></textarea>
            <button class="ib" id="sndBtn" style="color:var(--acc)"><i class="fas fa-paper-plane"></i></button>
        </div>
    </main>
</div>

<div class="modal-bg" id="myProfM">
    <div class="mdl">
        <h2 style="margin-bottom:15px">Профиль</h2>
        <input class="inp" id="pNm" placeholder="Имя">
        <input class="inp" id="pBio" placeholder="О себе">
        <button class="btn" id="pSave">Сохранить</button>
        <button class="btn" id="logoutBtn" style="background:var(--red); margin-top:10px">Выйти</button>
        <button class="btn" onclick="document.getElementById('myProfM').classList.remove('show')" style="background:none">Закрыть</button>
    </div>
</div>

<div class="ctx" id="ctx"><button id="ctxDel" style="color:var(--red)">Удалить сообщение</button></div>
<input type="file" id="fIn" style="display:none" accept="image/*">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, update, remove, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

[span_2](start_span)// Конфігурація[span_2](end_span)
const conf = {
    apiKey: "AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
    authDomain: "dove-7ea6d.firebaseapp.com",
    projectId: "dove-7ea6d",
    databaseURL: "https://dove-7ea6d-default-rtdb.firebaseio.com",
    appId: "1:747559004808:web:f80e792795e5b3b4758d3d"
};

const fb = initializeApp(conf);
const db = getDatabase(fb);
const S = { user: null, chat: null, curRef: null };
const $ = id => document.getElementById(id);

// --- AUTH ---
const goApp = () => {
    $('auth').classList.remove('act');
    $('app').classList.add('act');
    initSidebar();
};

$('aBtn').onclick = async () => {
    const id = $('aId').value.trim().toLowerCase();
    const nm = $('aNm').value.trim();
    if(!id || !nm) return alert("Заполните поля");
    
    const snap = await get(ref(db, `users/${id}`));
    S.user = snap.exists() ? snap.val() : { id, name: nm, bio: '', online: true };
    await set(ref(db, `users/${id}`), S.user);
    localStorage.setItem('dg_user', JSON.stringify(S.user));
    goApp();
};

// --- SIDEBAR ---
const initSidebar = () => {
    onValue(ref(db, 'users'), snap => {
        const list = $('chatList');
        list.innerHTML = `<div class="ci" onclick="app.openChat({id:'global',name:'Общий чат'})"><div class="av gl">🌍</div><div class="cib"><b class="cin">Общий чат</b></div></div>`;
        snap.forEach(c => {
            const u = c.val();
            if(u.id === S.user.id) return;
            const div = document.createElement('div');
            div.className = 'ci';
            div.onclick = () => openChat(u);
            div.innerHTML = `<div class="av c1">${u.name[0]}</div><div class="cib"><b class="cin">${u.name}</b><p class="cim">@${u.id}</p></div>`;
            list.appendChild(div);
        });
    });
};

// --- CHAT ---
const openChat = (target) => {
    S.chat = target;
    $('chatArea').classList.remove('hid');
    $('sidebar').classList.add('hid');
    $('inbar').style.display = 'flex';
    $('hNm').innerText = target.name;
    $('hAv').innerText = target.id === 'global' ? '🌍' : target.name[0];
    
    if(S.curRef) off(S.curRef);
    const path = target.id === 'global' ? 'global' : [S.user.id, target.id].sort().join('_');
    S.curRef = ref(db, `msgs/${path}`);
    
    onValue(S.curRef, snap => {
        const box = $('msgs');
        box.innerHTML = '';
        snap.forEach(c => {
            const m = c.val();
            const isMe = m.s === S.user.id;
            const div = document.createElement('div');
            div.className = `mg ${isMe ? 's' : 'r'}`;
            div.oncontextmenu = (e) => showCtx(e, c.key, path);
            div.innerHTML = `<div class="bbl">${m.img ? `<img src="${m.img}" class="mi">`:''}${m.t || ''}<span class="mgti">${new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
};

const send = async () => {
    const t = $('mIn').value.trim();
    if(!t && !window.pendingImg) return;
    const m = { s: S.user.id, t, ts: Date.now(), img: window.pendingImg || null };
    await push(S.curRef, m);
    $('mIn').value = '';
    window.pendingImg = null;
};

$('sndBtn').onclick = send;
$('attBtn').onclick = () => $('fIn').click();
$('fIn').onchange = e => {
    const reader = new FileReader();
    reader.onload = () => { window.pendingImg = reader.result; send(); };
    reader.readAsDataURL(e.target.files[0]);
};

// --- UTILS ---
const showCtx = (e, mid, path) => {
    e.preventDefault();
    const ctx = $('ctx');
    ctx.style.top = e.pageY + 'px'; ctx.style.left = e.pageX + 'px';
    ctx.classList.add('show');
    $('ctxDel').onclick = () => { remove(ref(db, `msgs/${path}/${mid}`)); ctx.classList.remove('show'); };
    document.onclick = () => ctx.classList.remove('show');
};

$('menuBtn').onclick = () => $('myProfM').classList.add('show');
$('pSave').onclick = () => {
    S.user.name = $('pNm').value; S.user.bio = $('pBio').value;
    update(ref(db, `users/${S.user.id}`), S.user);
    alert("Сохранено");
};
$('logoutBtn').onclick = () => { localStorage.clear(); location.reload(); };
$('backBtn').onclick = () => { $('sidebar').classList.remove('hid'); $('chatArea').classList.add('hid'); };

const saved = localStorage.getItem('dg_user');
if(saved) { S.user = JSON.parse(saved); goApp(); }

window.app = { openChat };
</script>
</body>
</html>
