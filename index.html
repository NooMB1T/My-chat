<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DoveGram 4.1 | Регистрация</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .c { background: #000; padding: 40px; border: 1px solid #fff; width: 350px; text-align: center; }
        h1 { font-size: 20px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }
        .av-p { width: 80px; height: 80px; border: 1px dashed #fff; margin: 0 auto 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .av-p img { width: 100%; height: 100%; object-fit: cover; }
        input[type="text"] { width: 100%; background: #000; border: 1px solid #fff; padding: 12px; color: #fff; outline: none; margin-bottom: 20px; text-align: center; }
        button { width: 100%; background: #fff; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #888; }
    </style>
</head>
<body>
    <div class="c">
        <h1>DoveGram 4.1</h1>
        <div class="av-p" onclick="document.getElementById('f').click()" id="pv">ЗАГРУЗИТЬ ФОТО</div>
        <input type="file" id="f" hidden accept="image/*" onchange="p(this)">
        <input type="text" id="i" placeholder="ВАШ НИКНЕЙМ">
        <button onclick="s()">ВОЙТИ В СИСТЕМУ</button>
    </div>
    <script>
        let _a = '';
        function p(i) {
            const r = new FileReader();
            r.onload = (e) => { _a = e.target.result; document.getElementById('pv').innerHTML = `<img src="${_a}">`; };
            r.readAsDataURL(i.files[0]);
        }
        function s() {
            const n = document.getElementById('i').value.trim();
            if(n) { localStorage.setItem('du', n); localStorage.setItem('da', _a); window.location.href = 'chat.html'; }
        }
    </script>
</body>
</html>
