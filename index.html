<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | DoveChat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        .c { background: #1e293b; padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 380px; border: 1px solid #334155; }
        h1 { color: #00ffcc; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: #fff; outline: none; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #00ffcc; color: #0f172a; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="c">
        <h1>DoveChat</h1>
        <input type="text" id="u" placeholder="Ваш никнейм..." autocomplete="off">
        <button onclick="l()">Войти</button>
    </div>
    <script>
        function l() {
            const n = document.getElementById('u').value.trim();
            if(n) { localStorage.setItem('du', n); window.location.href = 'chat.html'; }
        }
    </script>
</body>
</html>
