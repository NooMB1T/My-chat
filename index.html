<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DoveGram 15.0 Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #3b82f6; --bg: #050505; --panel: #111; --text: #fff; --msg-my: #2563eb; --msg-other: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* UI Layout за схемою */
        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }
        
        /* Червоне - пів аватарки */
        .half-avatar-wrap { 
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%); 
            width: 120px; height: 120px; border-radius: 50%; background: var(--accent);
            z-index: 100; border: 4px solid var(--bg); overflow: hidden; cursor: pointer;
        }
        .half-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* Синє - чати (Центральна частина) */
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg); border-right: 1px solid #222; margin-top: 60px; }

        /* Іконки замість цифр (Права панель) */
        .side-bar { width: 60px; display: flex; flex-direction: column; align-items: center; padding-top: 80px; gap: 30px; background: var(--panel); }
        .side-bar i { font-size: 20px; color: #666; cursor: pointer; transition: 0.3s; }
        .side-bar i:hover { color: var(--accent); }

        /* Екрани */
        .screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 50; }
        .screen.active { display: flex; }

        /* Чати та повідомлення */
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .bubble { max-width: 75%; padding: 12px; border-radius: 18px; margin: 5px 0; position: relative; }
        .bubble.my { align-self: flex-end; background: var(--msg-my); border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        
        /* Реакції */
        .reactions { position: absolute; bottom: -15px; right: 5px; display: flex; gap: 3px; font-size: 14px; }
        
        /* Пошук та реєстрація */
        .input-box { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; outline: none; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-size: cover; background-position: center; }
        .recording { color: #ef4444 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="scr-auth" class="screen active" style="justify-content: center; align-items: center; padding: 20px;">
    <div style="width: 100%; max-width: 350px;">
        <h2 style="text-align:center; margin-bottom:20px;">DoveGram 15.0</h2>
        <input type="text" id="reg-avatar" class="input-box" placeholder="URL Аватарки">
        <input type="text" id="reg-phone" class="input-box" placeholder="Номер телефону (+380...)">
        <input type="text" id="reg-name" class="input-box" placeholder="Ім'я">
        <input type="text" id="reg-id" class="input-box" placeholder="@ID користувача">
        <textarea id="reg-bio" class="input-box" placeholder="Про мене (опис)"></textarea>
        <button onclick="app.register()" class="btn-main">СТВОРИТИ ПРОФІЛЬ</button>
    </div>
</div>

<div id="scr-main" class="app-container">
    <div class="half-avatar-wrap" onclick="app.showMyProfile()">
        <img id="my-avatar-img" src="https://via.placeholder.com/100" alt="Avatar">
    </div>

    <div class="main-content">
        <div style="padding: 15px; border-bottom: 1px solid #222;">
            <input type="text" id="search-user" class="input-box" placeholder="Пошук за ім'ям або ID..." oninput="app.search()">
        </div>
        <div id="chat-list" style="overflow-y: auto; flex: 1;"></div>
    </div>

    <div class="side-bar">
        <i class="fas fa-cog" onclick="app.openSettings()"></i> <i class="fas fa-user-plus" onclick="document.getElementById('search-user').focus()"></i> <i class="fas fa-bell-slash"></i> <i class="fas fa-user-circle" onclick="app.showMyProfile()"></i> </div>
</div>

<div id="scr-chat" class="screen">
    <div class="header" style="padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--panel);">
        <i class="fas fa-arrow-left" onclick="app.nav('scr-main')"></i> <div class="avatar" style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent);" id="chat-header-avatar"></div>
        <div style="flex: 1;">
            <b id="chat-with-name">Ім'я</b>
            <div id="typing-status" style="font-size: 11px; color: var(--accent);"></div>
        </div>
        <i class="fas fa-info-circle" onclick="app.viewPeerProfile()"></i>
    </div>
    <div id="msg-container"></div>
    <div id="reaction-panel" style="display:none; padding: 5px; background: #111; justify-content: center; gap: 20px;">
        <span onclick="app.addReaction('❤️‍🔥')">❤️‍🔥</span>
        <span onclick="app.addReaction('💔')">💔</span>
        <span onclick="app.addReaction('❤️')">❤️</span>
    </div>
    <div class="header" style="padding: 10px; display: flex; gap: 10px; background: var(--panel); align-items: center;">
        <i class="fas fa-image" onclick="document.getElementById('file-in').click()"></i>
        <input type="file" id="file-in" hidden accept="image/*" onchange="app.sendMedia('img')">
        <input type="text" id="msg-in" class="input-box" style="margin:0; flex:1;" placeholder="Повідомлення..." oninput="app.handleTyping()">
        <i class="fas fa-microphone" id="voice-btn" onmousedown="app.startVoice()" onmouseup="app.stopVoice()"></i>
        <i class="fas fa-paper-plane" style="color: var(--accent);" onclick="app.sendText()"></i>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
    authDomain: "dove-7ea6d.firebaseapp.com",
    projectId: "dove-7ea6d",
    databaseURL: "https://dove-7ea6d-default-rtdb.firebaseio.com",
    appId: "1:747559004808:web:f80e792795e5b3b4758d3d"
};

const f_app = initializeApp(firebaseConfig);
const db = getDatabase(f_app);

window.app = {
    user: null, activePeer: null, typingTimeout: null, mediaRecorder: null, audioChunks: [],
    lang: navigator.language.startsWith('uk') ? 'uk' : 'ru',

    init() {
        const saved = localStorage.getItem('dove_v15');
        if(saved) {
            this.user = JSON.parse(saved);
            document.getElementById('my-avatar-img').src = this.user.avatar;
            this.nav('scr-main');
            this.syncContacts();
        }
    },

    nav(id) {
        document.querySelectorAll('.screen, .app-container').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = (id === 'scr-main') ? 'flex' : 'flex';
    },

    register() {
        const phone = document.getElementById('reg-phone').value;
        const phoneRegex = /^\+?380\d{9}$/;
        if(!phoneRegex.test(phone)) return alert("Введіть правильний номер +380...");

        this.user = {
            id: document.getElementById('reg-id').value.toLowerCase().replace('@',''),
            name: document.getElementById('reg-name').value,
            phone: phone,
            avatar: document.getElementById('reg-avatar').value || 'https://via.placeholder.com/100',
            bio: document.getElementById('reg-bio').value,
            bg: ''
        };
        
        set(ref(db, 'users/' + this.user.id), this.user);
        localStorage.setItem('dove_v15', JSON.stringify(this.user));
        location.reload();
    },

    search() {
        const query = document.getElementById('search-user').value.toLowerCase();
        if(query.length < 2) return;
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            Object.values(snap.val() || {}).forEach(u => {
                if(u.id !== this.user.id && (u.id.includes(query) || u.name.toLowerCase().includes(query))) {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => this.openChat(u);
                    div.innerHTML = `<img src="${u.avatar}" style="width:40px;height:40px;border-radius:50%"> <b>${u.name}</b>`;
                    list.appendChild(div);
                }
            });
        });
    },

    openChat(peer) {
        this.activePeer = peer;
        document.getElementById('chat-with-name').innerText = peer.name;
        document.getElementById('msg-container').style.backgroundImage = `url(${this.user.bg})`;
        this.nav('scr-chat');
        const path = [this.user.id, peer.id].sort().join('_');
        
        onValue(ref(db, 'msgs/' + path), (snap) => this.renderMsgs(snap.val()));
        onValue(ref(db, `status/${path}/${peer.id}`), (snap) => {
            const text = this.lang === 'uk' ? 'Цвіркоче...' : 'Думает...';
            document.getElementById('typing-status').innerText = snap.val() ? text : '';
        });
    },

    handleTyping() {
        const path = [this.user.id, this.activePeer.id].sort().join('_');
        set(ref(db, `status/${path}/${this.user.id}`), true);
        clearTimeout(this.typingTimeout);
        this.typingTimeout = setTimeout(() => set(ref(db, `status/${path}/${this.user.id}`), false), 2000);
    },

    sendText() {
        const txt = document.getElementById('msg-in').value;
        if(!txt) return;
        this.pushMsg({ t: txt });
        document.getElementById('msg-in').value = '';
    },

    async pushMsg(data) {
        const path = [this.user.id, this.activePeer.id].sort().join('_');
        const newMsgRef = push(ref(db, 'msgs/' + path));
        set(newMsgRef, {
            ...data,
            s: this.user.id,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            read: false
        });
    },

    renderMsgs(data) {
        const box = document.getElementById('msg-container');
        box.innerHTML = '';
        if(!data) return;
        Object.entries(data).forEach(([key, m]) => {
            const isMy = m.s === this.user.id;
            const div = document.createElement('div');
            div.className = `bubble ${isMy ? 'my' : 'other'}`;
            div.onclick = () => { window.lastMsgId = key; document.getElementById('reaction-panel').style.display='flex'; };
            
            let html = m.t || '';
            if(m.img) html = `<img src="${m.img}" style="width:100%; border-radius:10px;">`;
            if(m.voice) html = `<audio src="${m.voice}" controls style="width:180px;"></audio>`;
            
            const ticks = m.read ? '<i class="fas fa-check-double" style="color:#3b82f6"></i>' : '<i class="fas fa-check"></i>';
            div.innerHTML = `${html} <div style="font-size:9px; text-align:right; opacity:0.6;">${m.time} ${isMy ? ticks : ''}</div>`;
            
            if(m.react) div.innerHTML += `<div class="reactions">${m.react}</div>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    },

    addReaction(emoji) {
        const path = [this.user.id, this.activePeer.id].sort().join('_');
        update(ref(db, `msgs/${path}/${window.lastMsgId}`), { react: emoji });
        document.getElementById('reaction-panel').style.display='none';
    },

    async startVoice() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        this.mediaRecorder = new MediaRecorder(stream);
        this.audioChunks = [];
        this.mediaRecorder.ondataavailable = e => this.audioChunks.push(e.data);
        this.mediaRecorder.start();
        document.getElementById('voice-btn').classList.add('recording');
    },

    stopVoice() {
        if(!this.mediaRecorder) return;
        this.mediaRecorder.stop();
        document.getElementById('voice-btn').classList.remove('recording');
        this.mediaRecorder.onstop = async () => {
            const blob = new Blob(this.audioChunks, { type: 'audio/mp4' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => this.pushMsg({ voice: reader.result });
        };
    }
};
app.init();
</script>
</body>
</html>
