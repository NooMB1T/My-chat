<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 4.94 Global</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --card: #121212; --text: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Авторизація */
        #auth { position: fixed; inset:0; background:#000; z-index:1000; display:flex; align-items:center; justify-content:center; flex-direction:column; padding:20px; }
        input { width:100%; max-width:300px; padding:15px; border-radius:12px; border:1px solid #333; background:#111; color:#fff; margin-bottom:10px; outline:none; }
        .btn { width:100%; max-width:300px; padding:15px; border-radius:12px; border:none; background:#fff; color:#000; font-weight:bold; cursor:pointer; }

        /* Шапка */
        .h { height:60px; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 20px; background:#000; justify-content:space-between; z-index:10; }
        
        /* Чат */
        #bx { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px; background-size:cover; background-position:center; }
        .mw { max-width:85%; padding:10px 14px; border-radius:18px; background: rgba(30,30,30,0.8); backdrop-filter:blur(10px); align-self:flex-start; border:1px solid #333; position:relative; }
        .mw.me { align-self:flex-end; background:#fff; color:#000; border:none; }
        .av-m { width:28px; height:28px; border-radius:50%; object-fit:cover; margin-right:8px; }
        
        /* Налаштування */
        #st { position:fixed; right:-100%; top:0; bottom:0; width:300px; background:#111; z-index:500; transition:0.3s; padding:20px; border-left:1px solid #222; }
        #st.o { right:0; }
        .av-l { width:80px; height:80px; border-radius:50%; border:2px solid #fff; cursor:pointer; object-fit:cover; margin-bottom:15px; }

        /* Ввід */
        .b { padding:15px; background:#000; border-top:1px solid #222; display:flex; gap:10px; align-items:center; }
        #in { flex:1; margin-bottom:0; }
        .btn-up { width:45px; height:45px; border-radius:50%; background:#222; border:none; color:#fff; font-size:24px; cursor:pointer; }
    </style>
</head>
<body>

<div id="auth">
    <h1 style="margin-bottom:20px">DoveGram 4.94</h1>
    <input type="text" id="u_n" placeholder="Твій нік">
    <input type="tel" id="u_p" placeholder="Номер телефону">
    <button class="btn" onclick="join()">УВІЙТИ</button>
</div>

<div id="st">
    <h2 style="margin-bottom:20px">Налаштування</h2>
    <center>
        <img id="p_av" class="av-l" onclick="document.getElementById('f_av').click()">
        <input type="file" id="f_av" hidden accept="image/*" onchange="upAv(this)">
    </center>
    <p style="font-size:12px; color:#888; margin-bottom:5px">Змінити нік:</p>
    <input type="text" id="n_u">
    <p style="font-size:12px; color:#888; margin-bottom:5px">Глобальний фон (URL фото):</p>
    <input type="text" id="n_bg" placeholder="Вставте посилання на фото">
    <button class="btn" style="background:#fff" onclick="save()">ЗБЕРЕГТИ</button>
    <br><br>
    <button class="btn" style="background:#ff4d4d; color:#fff" onclick="location.reload()">ВИЙТИ</button>
</div>

<div class="h">
    <b style="letter-spacing:1px">ГЛОБАЛЬНИЙ ЧАТ</b>
    <span onclick="document.getElementById('st').classList.toggle('o')" style="cursor:pointer; font-size:20px">⚙️</span>
</div>

<div id="bx"></div>

<div class="b">
    <button class="btn-up" onclick="document.getElementById('f_m').click()">+</button>
    <input type="file" id="f_m" hidden accept="image/*" onchange="upImg(this)">
    <input type="text" id="in" placeholder="Повідомлення..." autocomplete="off">
    <button class="btn" style="width:60px; max-width:60px" onclick="sm()">↑</button>
</div>

<script>
    const sc = io();
    let u = localStorage.getItem('du'), av = localStorage.getItem('da') || 'https://i.imgur.com/6VBx3io.png', ph = localStorage.getItem('dp');

    if(u) { document.getElementById('auth').style.display = 'none'; join(); }

    function join() {
        if(!u) {
            u = document.getElementById('u_n').value.trim();
            ph = document.getElementById('u_p').value.trim();
            if(!u || !ph) return alert("Заповни всі поля!");
            localStorage.setItem('du', u); localStorage.setItem('dp', ph); localStorage.setItem('da', av);
            document.getElementById('auth').style.display = 'none';
        }
        document.getElementById('n_u').value = u;
        document.getElementById('p_av').src = av;
        sc.emit('j', { u, av, ph });
    }

    sc.on('hs', d => { 
        document.getElementById('bx').innerHTML = ''; 
        d.h.forEach(m => dr(m)); 
        if(d.bg) setBg(d.bg);
        sl(); 
    });
    sc.on('m', m => { dr(m); sl(); });
    sc.on('new_bg', url => setBg(url));
    sc.on('d', id => document.getElementById(id)?.remove());

    function dr(d) {
        const w = document.createElement('div'); w.id = d.id;
        w.className = `mw ${d.u === u ? 'me' : ''}`;
        const canDel = (u === 'NooMB1T' || d.u === u);
        w.innerHTML = `
            <div style="font-size:10px; font-weight:bold; margin-bottom:5px; display:flex; align-items:center">
                <img src="${d.av}" class="av-m">${d.u} ${canDel ? `<span onclick="sc.emit('d','${d.id}')" style="color:red; margin-left:10px">×</span>` : ''}
            </div>
            <div style="word-break:break-all">${d.t === 'img' ? `<img src="${d.c}" style="max-width:100%; border-radius:10px; display:block">` : d.c}</div>
        `;
        document.getElementById('bx').appendChild(w);
    }

    function sm() {
        const i = document.getElementById('in');
        if(i.value.trim()){ sc.emit('m', { u, av, c: i.value, t: 'txt' }); i.value = ''; }
    }

    function upImg(el) {
        const r = new FileReader();
        r.onload = e => sc.emit('m', { u, av, c: e.target.result, t: 'img' });
        r.readAsDataURL(el.files[0]);
    }

    function upAv(el) {
        const r = new FileReader();
        r.onload = e => { av = e.target.result; document.getElementById('p_av').src = av; };
        r.readAsDataURL(el.files[0]);
    }

    function save() {
        const newU = document.getElementById('n_u').value.trim();
        const newBg = document.getElementById('n_bg').value.trim();
        if(newU) { u = newU; localStorage.setItem('du', u); }
        localStorage.setItem('da', av);
        if(newBg) sc.emit('set_bg', newBg);
        alert("Збережено!");
        location.reload();
    }

    function setBg(url) { document.getElementById('bx').style.backgroundImage = `url(${url})`; }
    function sl() { const b = document.getElementById('bx'); b.scrollTop = b.scrollHeight; }
    document.getElementById('in').onkeypress = e => { if(e.key === 'Enter') sm(); };
</script>

</body>
</html>
