<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DoveChat | Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #0b0f19; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .c { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); padding: 50px 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); display: none; }
        h1 { color: #00f2fe; margin-bottom: 10px; font-size: 32px; background: linear-gradient(to right, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #8b9bb4; margin-bottom: 30px; font-size: 15px; }
        input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; outline: none; margin-bottom: 20px; }
        button { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #4facfe, #00f2fe); color: #000; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="r" class="c">
        <h1>DoveChat Pro</h1>
        <p>Ваше безопасное пространство. Введите имя.</p>
        <input type="text" id="i" placeholder="Например, Алекс..." autocomplete="off">
        <button onclick="s()">Войти</button>
    </div>
    <script>
        if (localStorage.getItem('du')) window.location.href = 'chat.html';
        else document.getElementById('r').style.display = 'block';
        function s() {
            const n = document.getElementById('i').value.trim();
            if(n) { localStorage.setItem('du', n); window.location.href = 'chat.html'; }
        }
    </script>
</body>
</html>
