<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>DoveGram | Вход</title>
    <style>
        body { background: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .c { width: 85%; max-width: 320px; text-align: center; }
        .av-p { width: 80px; height: 80px; border: 1px solid #000; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; font-size: 12px; }
        .av-p img { width: 100%; height: 100%; object-fit: cover; }
        input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px; outline: none; }
        button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="c">
        <h2>DoveGram 4.5</h2>
        <div class="av-p" onclick="document.getElementById('f').click()" id="pv">ФОТО</div>
        <input type="file" id="f" hidden accept="image/*" onchange="p(this)">
        <input type="text" id="i" placeholder="Никнейм">
        <input type="tel" id="ph" placeholder="+380...">
        <button onclick="s()">Войти</button>
    </div>
    <script>
        let _a = '';
        function p(i) {
            const r = new FileReader();
            r.onload = (e) => { _a = e.target.result; document.getElementById('pv').innerHTML = `<img src="${_a}">`; };
            r.readAsDataURL(i.files[0]);
        }
        function s() {
            const n = document.getElementById('i').value.trim(), p = document.getElementById('ph').value.trim();
            if(n && p) { localStorage.setItem('du', n); localStorage.setItem('da', _a); localStorage.setItem('dp', p); window.location.href = '/chat'; }
        }
    </script>
</body>
</html>
