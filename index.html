<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 6.0 Multiverse</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --card: #151515; --accent: #fff; --ghost: rgba(255,255,255,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* Авторизация */
        #auth { position: fixed; inset:0; background:#000; z-index:2000; display:flex; align-items:center; justify-content:center; flex-direction:column; padding:20px; }
        .inp { width:100%; max-width:300px; padding:15px; border-radius:15px; border:1px solid #333; background:#111; color:#fff; margin-bottom:10px; outline:none; }
        .btn-main { width:100%; max-width:300px; padding:15px; border-radius:15px; border:none; background:#fff; color:#000; font-weight:bold; cursor:pointer; }

        /* Левая панель (Синє на эскизе) - Список чатов */
        #left { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #222; }
        .h { height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        
        /* Червоне коло: Аватар */
        .my-av { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; cursor: pointer; }

        .chat-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid #111; transition: 0.2s; }
        .chat-item:hover { background: var(--ghost); }
        .chat-item .av { width: 50px; height: 50px; border-radius: 50%; background: #222; }
        .chat-item.active { background: #1a1a1a; border-left: 3px solid #fff; }

        /* Правая панель (Кнопки 1, 2, 3, 4, ->) */
        #right-menu { width: 70px; background: #080808; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 25px; border-left: 1px solid #222; }
        .m-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: #111; cursor: pointer; font-size: 20px; transition: 0.2s; color: #555; }
        .m-btn:hover { background: #fff; color: #000; transform: scale(1.1); }
        .m-btn.active { color: #fff; border: 1px solid #444; }

        /* Окно сообщений */
        #chat-window { flex: 2; display: flex; flex-direction: column; background: #000; border-right: 1px solid #222; display: none; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; background: #1a1a1a; align-self: flex-start; line-height: 1.4; border: 1px solid #222; }
        .msg.me { align-self: flex-end; background: #fff; color: #000; border: none; }

        .input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #222; }
        
        /* Спец-эффекты */
        .secret-mode { filter: hue-rotate(280deg) brightness(0.8); }
        .secret-mode .msg { font-style: italic; opacity: 0.8; }
    </style>
</head>
<body>

<div id="auth">
    <h1 style="letter-spacing: 5px; margin-bottom: 30px">DOVEGRAM 6.0</h1>
    <input type="text" id="u_n" class="inp" placeholder="Ваше имя">
    <input type="tel" id="u_p" class="inp" placeholder="+7 / +380 ...">
    <button class="btn-main" onclick="start()">ВОЙТИ В МУЛЬТИВСЕЛЕННУЮ</button>
</div>

<div id="left">
    <div class="h">
        <b style="font-size: 20px">Чаты</b>
        <img id="my-pic" class="my-av" src="" onclick="openTab(1)">
    </div>
    <div id="hub-list">
        <div class="chat-item active" onclick="joinRoom('global')">
            <div class="av" style="background: linear-gradient(45deg, #333, #666); display: flex; align-items: center; justify-content: center">🌍</div>
            <div><b>Глобальный хаб</b><br><small style="color: #666">Общий чат для всех</small></div>
        </div>
        <div id="contacts-area">
            <div style="padding: 10px 20px; font-size: 11px; color: #444; text-transform: uppercase">Контакты</div>
            <div id="my-contacts"></div>
        </div>
    </div>
</div>

<div id="chat-window">
    <div class="h">
        <b id="room-name">Глобальный хаб</b>
        <span id="room-status" style="font-size: 11px; color: #0f0">онлайн</span>
    </div>
    <div id="msgs"></div>
    <div class="input-area">
        <input type="text" id="in" class="inp" style="margin:0" placeholder="Напишите сообщение...">
        <button class="btn-main" style="width: 60px" onclick="send()">↑</button>
    </div>
</div>

<div id="right-menu">
    <div class="m-btn" title="Настройки (1)" onclick="openTab(1)">⚙️</div>
    <div class="m-btn" title="Добавить (2)" onclick="openTab(2)">+</div>
    <div class="m-btn" title="Секретный режим (3)" onclick="openTab(3)">🔒</div>
    <div class="m-btn" title="Инфо (4)" onclick="openTab(4)">❔</div>
    <div style="margin-top: auto; margin-bottom: 20px" class="m-btn" onclick="location.reload()">➡️</div>
</div>

<script>
    const sc = io();
    let u = localStorage.getItem('du'), ph = localStorage.getItem('dp'), av = localStorage.getItem('da') || 'https://i.imgur.com/6VBx3io.png';
    let curRoom = 'global';
    let secret = false;

    if(u) { document.getElementById('auth').style.display='none'; start(); }

    function start() {
        if(!u) {
            u = document.getElementById('u_n').value.trim(); ph = document.getElementById('u_p').value.trim();
            if(!u || !ph) return;
            localStorage.setItem('du', u); localStorage.setItem('dp', ph); localStorage.setItem('da', av);
            document.getElementById('auth').style.display='none';
        }
        document.getElementById('my-pic').src = av;
        document.getElementById('chat-window').style.display = 'flex';
        sc.emit('j', { u, av, ph });
    }

    // Логика кнопок (1, 2, 3, 4)
    function openTab(n) {
        if(n === 1) alert("Настройки: Тут можно будет сменить тему или аватар.");
        if(n === 2) {
            let p = prompt("Введите номер телефона для синхронизации:");
            sc.emit('sync_request', p); // Запрос на поиск в базе
            alert("Поиск контакта " + p + "...");
        }
        if(n === 3) {
            secret = !secret;
            document.body.classList.toggle('secret-mode');
            alert(secret ? "Включен Burn Mode (сообщения не сохраняются)" : "Секретный режим выключен");
        }
        if(n === 4) alert("DoveGram 6.0 Multiverse\nBuild: 240326\nDev: Gemini & NooMB1T");
    }

    function joinRoom(r) {
        curRoom = r;
        document.getElementById('room-name').innerText = r === 'global' ? 'Глобальный хаб' : r;
        document.getElementById('msgs').innerHTML = '';
        sc.emit('join_room', r);
    }

    sc.on('ul', d => {
        const list = document.getElementById('my-contacts');
        list.innerHTML = '';
        // "Синхронизация" - показываем всех, кто есть в глобальной базе
        Object.values(d.db).forEach(user => {
            if(user.u !== u) {
                list.innerHTML += `
                    <div class="chat-item" onclick="joinRoom('${user.u}')">
                        <img src="${user.av}" class="av">
                        <div><b>${user.u}</b><br><small style="color:#555">${user.ph}</small></div>
                    </div>`;
            }
        });
    });

    sc.on('hs', h => { h.forEach(m => dr(m)); sl(); });
    sc.on('m', m => { dr(m); sl(); });
    sc.on('d', id => document.getElementById(id)?.remove());

    function dr(d) {
        const div = document.createElement('div'); div.id = d.id;
        div.className = `msg ${d.u === u ? 'me' : ''}`;
        div.innerHTML = `<div style="font-size:10px; opacity:0.6; margin-bottom:4px">${d.u}</div>${d.c}`;
        document.getElementById('msgs').appendChild(div);
        
        if(secret) { // Если секретный режим, удаляем через 10 сек
            setTimeout(() => div.style.opacity = "0.2", 5000);
            setTimeout(() => div.remove(), 10000);
        }
    }

    function send() {
        const i = document.getElementById('in');
        if(i.value.trim()) {
            sc.emit('m', { u, av, c: i.value, room: curRoom });
            i.value = '';
        }
    }

    function sl() { const b = document.getElementById('msgs'); b.scrollTop = b.scrollHeight; }
    document.getElementById('in').onkeypress = e => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
/html>
