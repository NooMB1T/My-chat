<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DoveGram</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
/* Твій оригінальний дизайн та колірна палітра */
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#17212b;--sb:#0e1621;--inp:#242f3d;--hov:#202b36;
--sent:#2b5278;--recv:#182533;--acc:#5eaae8;--acc2:#3a8fd4;
--txt:#f5f5f5;--txt2:#7e919e;--txt3:#546778;--brd:#1c2936;
--grn:#4dcd5e;--red:#e05555;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--txt)}
.scr{display:none;height:100%;width:100%;position:absolute;top:0;left:0}.scr.act{display:flex}
.inp{width:100%;padding:14px 18px;border-radius:12px;border:2px solid var(--brd);background:var(--inp);color:var(--txt);font-size:15px;outline:none;margin-bottom:12px;transition:border .2s;font-family:inherit}
.inp:focus{border-color:var(--acc)}

/* Стилі для авторизації, чатів та повідомлень з твого файлу index (25).html */
#auth{flex-direction:column;align-items:center;justify-content:center;background:var(--sb)}
.auth-box{width:90%;max-width:380px;text-align:center}
.btn-main{width:100%;padding:14px;border:none;border-radius:12px;background:var(--acc);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}

#app{flex-direction:row}
.sb{width:320px;min-width:320px;height:100%;display:flex;flex-direction:column;background:var(--sb);border-right:1px solid var(--brd)}
.cl{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:.12s}
.ci:hover{background:var(--hov)}.ci.active{background:var(--acc)}.ci.active *{color:#fff!important}
.av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;position:relative;flex-shrink:0}
.av .dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;background:var(--grn);border-radius:50%;border:2px solid var(--sb)}

.cha{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.ch-h{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--sb);border-bottom:1px solid var(--brd)}
.msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:2px}
.mg{max-width:70%;display:flex;flex-direction:column}.mg.s{align-self:flex-end}.mg.r{align-self:flex-start}
.bbl{padding:7px 12px;border-radius:12px;font-size:14.5px;position:relative}
.mg.s .bbl{background:var(--sent);border-top-right-radius:4px}
.mg.r .bbl{background:var(--recv);border-top-left-radius:4px}

.in-bar{display:flex;align-items:center;gap:8px;padding:10px;background:var(--sb);border-top:1px solid var(--brd)}
#mIn{flex:1;background:var(--inp);border:none;border-radius:20px;padding:10px 15px;color:var(--txt);outline:none;resize:none}

.tdot span{width:5px;height:5px;background:var(--acc);border-radius:50%;display:inline-block;animation:bounce .6s infinite alternate}
@keyframes bounce{to{opacity:.3;transform:translateY(-3px)}}

@media(max-width:768px){ .sb.hid{display:none} .cha.hid{display:none} }
</style>
</head>
<body>

<div id="auth" class="scr act">
    <div class="auth-box">
        <h1 style="margin-bottom:20px">DoveGram</h1>
        <input class="inp" id="aId" placeholder="@username">
        <input class="inp" id="aNm" placeholder="Ваше ім'я">
        <button class="btn-main" id="aBtn">Увійти</button>
    </div>
</div>

<div id="app" class="scr">
    <aside id="sidebar" class="sb">
        <div style="padding:10px; border-bottom:1px solid var(--brd)">
            <input class="inp" id="searchIn" placeholder="Пошук..." style="margin-bottom:0; padding:8px 14px; border-radius:20px">
        </div>
        <div class="cl" id="chatList"></div>
    </aside>

    <main id="chatArea" class="cha hid">
        <header class="ch-h">
            <button class="ib" id="backBtn" style="display:none"><i class="fas fa-arrow-left"></i></button>
            <div class="av" id="hAv" style="width:40px;height:40px;background:var(--acc2)"><i class="fas fa-user"></i></div>
            <div style="flex:1">
                <div class="ch-nm" id="hNm">Оберіть чат</div>
                <div class="ch-st" id="hSt"></div>
            </div>
        </header>
        <div class="msgs" id="msgs"></div>
        <div class="in-bar" id="inBar" style="display:none">
            <textarea id="mIn" rows="1" placeholder="Повідомлення..."></textarea>
            <button id="sndBtn" style="background:none; border:none; color:var(--acc); cursor:pointer; font-size:20px"><i class="fas fa-paper-plane"></i></button>
        </div>
    </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onValue, off, onChildAdded, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const fb = initializeApp({
    apiKey: "AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
    authDomain: "dove-7ea6d.firebaseapp.com",
    databaseURL: "https://dove-7ea6d-default-rtdb.firebaseio.com",
    projectId: "dove-7ea6d",
    storageBucket: "dove-7ea6d.appspot.com",
    appId: "1:747559004808:web:f80e792795e5b3b4758d3d"
});
const db = getDatabase(fb);

const S = { user: null, chat: null, users: {}, listeners: [], mob: window.innerWidth <= 768 };
const $ = id => document.getElementById(id);
const cid = (a, b) => [a, b].sort().join('_');

/* АВТОРИЗАЦІЯ */
const saved = localStorage.getItem('dg_user');
if(saved) { S.user = JSON.parse(saved); startApp(); }

$('aBtn').onclick = () => {
    const id = $('aId').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
    const nm = $('aNm').value.trim();
    if(id.length < 2) return alert('ID мін. 2 символи');
    S.user = { uid: id, name: nm || id };
    localStorage.setItem('dg_user', JSON.stringify(S.user));
    set(ref(db, 'users/' + id), { ...S.user, online: true, lastSeen: Date.now() });
    startApp();
};

function startApp() {
    $('auth').classList.remove('act');
    $('app').classList.add('act');
    
    // Синхронізація списку користувачів
    onValue(ref(db, 'users'), snap => {
        S.users = snap.val() || {};
        renderSidebar();
    });

    // Оновлення статусу "Online" кожні 25 сек
    setInterval(() => {
        if(S.user) update(ref(db, 'users/' + S.user.uid), { lastSeen: Date.now(), online: true });
    }, 25000);
}

function renderSidebar() {
    const q = $('searchIn').value.toLowerCase();
    let h = '';
    Object.values(S.users).forEach(u => {
        if(u.uid === S.user.uid) return;
        if(q && !u.name.toLowerCase().includes(q)) return;
        const act = S.chat === u.uid ? 'active' : '';
        h += `<div class="ci ${act}" onclick="openChat('${u.uid}')">
            <div class="av" style="background:var(--acc)"><i class="fas fa-user"></i>${u.online?'<div class="dot"></div>':''}</div>
            <div style="flex:1"><b>${u.name}</b><br><small>${u.online?'в мережі':'не в мережі'}</small></div>
        </div>`;
    });
    $('chatList').innerHTML = h;
}

/* СИНХРОНІЗАЦІЯ ПОВІДОМЛЕНЬ ТА СТАТУСІВ */
window.openChat = (id) => {
    S.chat = id;
    S.listeners.forEach(off); S.listeners = [];
    if(S.mob) { $('sidebar').classList.add('hid'); $('chatArea').classList.remove('hid'); $('backBtn').style.display='block'; }
    $('chatArea').classList.remove('hid');
    $('inBar').style.display = 'flex';
    
    const u = S.users[id] || {};
    $('hNm').textContent = u.name || id;
    $('hSt').textContent = u.online ? 'в мережі' : 'був(ла) нещодавно';
    
    const path = 'msgs/' + cid(S.user.uid, id);
    $('msgs').innerHTML = '';

    // Слухаємо нові повідомлення
    const l1 = onChildAdded(ref(db, path), snap => {
        const m = snap.val();
        addMsgToUI(m);
    });
    S.listeners.push(l1);

    // Слухаємо статус "Друкує..."
    const l2 = onValue(ref(db, 'typing/' + cid(S.user.uid, id)), snap => {
        const data = snap.val() || {};
        const isTyping = Object.entries(data).some(([uid, val]) => uid !== S.user.uid && val === true);
        if(isTyping) {
            $('hSt').innerHTML = '<span class="tdot"><span></span><span></span><span></span></span> друкує...';
        } else {
            $('hSt').textContent = u.online ? 'в мережі' : 'був(ла) нещодавно';
        }
    });
    S.listeners.push(l2);
    renderSidebar();
};

function addMsgToUI(m) {
    const mine = m.sender === S.user.uid;
    const div = document.createElement('div');
    div.className = `mg ${mine?'s':'r'}`;
    div.innerHTML = `<div class="bbl">${m.text}<div style="font-size:10px; opacity:0.5; text-align:right; margin-top:3px">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div>`;
    $('msgs').appendChild(div);
    $('msgs').scrollTop = $('msgs').scrollHeight;
}

/* ВІДПРАВКА */
$('sndBtn').onclick = () => {
    const txt = $('mIn').value.trim();
    if(!txt || !S.chat) return;
    const path = 'msgs/' + cid(S.user.uid, S.chat);
    push(ref(db, path), {
        sender: S.user.uid,
        text: txt,
        time: Date.now()
    });
    $('mIn').value = '';
    set(ref(db, 'typing/' + cid(S.user.uid, S.chat) + '/' + S.user.uid), false);
};

/* СТАТУС ДРУКУ */
$('mIn').oninput = () => {
    if(!S.chat) return;
    set(ref(db, 'typing/' + cid(S.user.uid, S.chat) + '/' + S.user.uid), true);
    clearTimeout(S.typeTimeout);
    S.typeTimeout = setTimeout(() => {
        set(ref(db, 'typing/' + cid(S.user.uid, S.chat) + '/' + S.user.uid), false);
    }, 2000);
};

$('backBtn').onclick = () => {
    $('sidebar').classList.remove('hid');
    $('chatArea').classList.add('hid');
    S.chat = null;
};
</script>
</body>
</html>
