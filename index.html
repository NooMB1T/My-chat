<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 6.0 Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --bg: #000; --accent: #ff4d4d; --blue: #3b82f6; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; color: #fff; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }

        /* Ліва панель (Списки) */
        #left { flex: 1; border-right: 2px solid var(--blue); display: flex; flex-direction: column; }
        .header { padding: 25px 20px; font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .search-bar { margin: 0 15px 20px; padding: 12px 18px; background: var(--glass); border-radius: 15px; border: 1px solid #222; display: flex; align-items: center; }
        .search-bar input { background: none; border: none; outline: none; width: 100%; font-size: 14px; }

        .chat-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; transition: 0.2s; cursor: pointer; border-bottom: 1px solid #080808; }
        .chat-item:active { background: #111; }
        .avatar-circle { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(45deg, var(--accent), #ff8e8e); display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Права панель (Іконки та Аватарка) */
        #right { width: 85px; display: flex; flex-direction: column; align-items: center; padding-top: 140px; gap: 35px; position: relative; }
        
        /* Та сама аватарка на лінії */
        .main-profile-pic {
            position: absolute;
            top: 20px;
            right: 35px; /* Накладання на лінію */
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            z-index: 100;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(255, 77, 77, 0.3);
        }

        .nav-icon { font-size: 24px; color: #333; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-icon:hover { color: #fff; transform: translateY(-3px); }
        .nav-icon.active { color: var(--accent); }
        .badge { position: absolute; top: -5px; right: -8px; background: #fff; color: #000; font-size: 10px; padding: 2px 5px; border-radius: 10px; font-weight: 900; }

        /* Анімація появи */
        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .chat-item { animation: slide 0.4s ease forwards; }
    </style>
</head>
<body>

    <div id="left">
        <div class="header">DoveGram <span style="color:var(--accent)">6.0</span></div>
        <div class="search-bar">
            <i class="fas fa-search" style="margin-right: 10px; color: #444;"></i>
            <input type="text" placeholder="Пошук контактів...">
        </div>
        
        <div id="list">
            <div class="chat-item" onclick="location.href='chat.html'">
                <div class="avatar-circle"><i class="fas fa-fire"></i></div>
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between"><b>Global Core</b> <small style="color:#444">19:21</small></div>
                    <small style="color:#666">Anton: Привіт, як воно?</small>
                </div>
            </div>
            <div class="chat-item">
                <div class="avatar-circle" style="background:#222"><i class="fas fa-user-shield" style="color:#blue"></i></div>
                <div style="flex:1">
                    <b>Система</b><br>
                    <small style="color:#666">Ваш акаунт захищено</small>
                </div>
            </div>
        </div>
    </div>

    <img src="https://i.imgur.com/6VBx3io.png" class="main-profile-pic">

    <div id="right">
        <div class="nav-icon"><i class="fas fa-th-large"></i></div>
        <div class="nav-icon" onclick="location.href='chat.html'"><i class="fas fa-paper-plane"></i></div>
        <div class="nav-icon active">
            <i class="fas fa-comment-dots"></i>
            <span class="badge">1</span>
        </div>
        <div class="nav-icon"><i class="fas fa-adjust"></i></div>
        <div class="nav-icon" style="margin-top:auto; margin-bottom: 30px; color:#111"><i class="fas fa-cog"></i></div>
    </div>

</body>
</html>
