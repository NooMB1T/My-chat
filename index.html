<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DoveChat 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%); z-index: -1; }
        .c { background: rgba(255, 255, 255, 0.02); border: 1px solid #4facfe; padding: 40px; border-radius: 5px; text-align: center; box-shadow: 0 0 20px #4facfe33; transform: scale(0.9); animation: f 0.5s forwards; }
        @keyframes f { to { transform: scale(1); opacity: 1; } }
        h1 { font-size: 24px; letter-spacing: 5px; color: #4facfe; text-shadow: 0 0 10px #4facfe; margin-bottom: 20px; }
        input { background: none; border: 1px solid #333; padding: 15px; color: #fff; width: 250px; outline: none; margin-bottom: 20px; text-align: center; transition: 0.3s; }
        input:focus { border-color: #00f2fe; box-shadow: 0 0 10px #00f2fe44; }
        button { background: #4facfe; border: none; padding: 15px 30px; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="c">
        <h1>NEON DRIVE</h1>
        <input type="text" id="i" placeholder="IDENTIFY YOURSELF" maxlength="15">
        <br>
        <button onclick="s()">ENTER</button>
    </div>
    <script>
        if(localStorage.getItem('du')) window.location.href = 'chat.html';
        function s() {
            const n = document.getElementById('i').value.trim();
            if(n) { localStorage.setItem('du', n); window.location.href = 'chat.html'; }
        }
    </script>
</body>
</html>
