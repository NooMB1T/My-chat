<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DoveGram 18.0 Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #3b82f6; --bg: #000; --panel: #0a0a0a; --text: #fff; --msg-my: #2563eb; --msg-other: #1a1a1a; }
        body.light { --bg: #f0f2f5; --panel: #fff; --text: #000; --msg-other: #e4e6eb; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; transition: background 0.3s; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Конструкція */
        .app-container { display: flex; height: 100vh; }
        .main-view { flex: 1; display: flex; flex-direction: column; border-right: 1px solid rgba(128,128,128,0.1); }
        
        .side-icons { width: 70px; display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 35px; background: var(--panel); border-left: 1px solid rgba(128,128,128,0.1); }
        .side-icons i { font-size: 22px; color: #555; cursor: pointer; padding: 10px; }
        .side-icons i:hover { color: var(--accent); }

        .screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 1000; padding: 20px; }
        .screen.active { display: flex; }

        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; margin: 4px 0; position: relative; }
        .bubble.my { align-self: flex-end; background: var(--msg-my); color: #fff; border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        
        .react-badge { position: absolute; bottom: -10px; right: 5px; background: var(--panel); border-radius: 10px; padding: 2px 5px; font-size: 12px; border: 1px solid #333; }
        .input-ui { width: 100%; padding: 14px; background: var(--panel); border: 1px solid rgba(128,128,128,0.2); border-radius: 12px; color: var(--text); outline: none; margin-bottom: 10px; }
        .btn-ui { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #fff; }

        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .user-row { padding: 10px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div id="scr-auth" class="screen active" style="justify-content: center; align-items: center;">
    <div style="width: 100%; max-width: 320px; text-align: center;">
        <h2 id="lang-auth-title" style="margin-bottom:20px">DoveGram</h2>
        <input type="text" id="reg-id" class="input-ui" placeholder="@ID (напр: ivan)">
        <input type="text" id="reg-name" class="input-ui" placeholder="Ім'я">
        <input type="text" id="reg-phone" class="input-ui" placeholder="+380...">
        <button onclick="app.register()" class="btn-ui" id="lang-reg-btn">Зареєструватися</button>
    </div>
</div>

<div class="app-container" id="scr-main" style="display:none">
    <div class="main-view">
        <div style="padding: 15px;"><input type="text" id="find-user" class="input-ui" placeholder="Пошук..." oninput="app.search()"></div>
        <div id="contacts-list" style="flex: 1; overflow-y: auto;"></div>
    </div>
    <div class="side-icons">
        <i class="fas fa-cog" onclick="app.nav('scr-settings')"></i>
        <i class="fas fa-plus" onclick="document.getElementById('find-user').focus()"></i>
        <i class="fas fa-users" id="dev-tab" style="display:none" onclick="app.showAdminPanel()"></i>
        <i class="fas fa-user-circle" onclick="app.showProfile('self')"></i>
    </div>
</div>

<div id="scr-profile" class="screen">
    <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px;">
        <i class="fas fa-arrow-left" onclick="app.nav('scr-main')"></i>
        <h2 id="lang-p-title">Мій Профіль</h2>
    </div>
    <div style="text-align:center">
        <img id="p-ava" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--accent); margin-bottom:15px;">
        <h3 id="p-name">Ім'я</h3>
        <p id="p-id" style="opacity:0.5; margin-bottom:5px;"></p>
        <p id="p-phone" style="color:var(--accent)"></p>
        <div id="p-bio" style="margin-top:20px; font-style:italic"></div>
    </div>
</div>

<div id="scr-settings" class="screen">
    <i class="fas fa-arrow-left" onclick="app.nav('scr-main')" style="margin-bottom:20px"></i>
    <h2 id="lang-s-title">Налаштування</h2>
    <div style="margin:20px 0;">
        <p id="lang-theme-label">Тема:</p>
        <button class="btn-ui" style="background:#222; margin:10px 0" onclick="app.toggleTheme()">Чорна / Біла</button>
        <p id="lang-lang-label">Мова:</p>
        <button class="btn-ui" style="background:#222; margin:10px 0" onclick="app.toggleLang()">UA / RU</button>
    </div>
    <button class="btn-ui" style="background:#ef4444" onclick="app.logout()">Вийти</button>
</div>

<div id="scr-admin" class="screen">
    <i class="fas fa-arrow-left" onclick="app.nav('scr-main')" style="margin-bottom:20px"></i>
    <h2>Всі користувачі</h2>
    <div id="admin-user-list" style="overflow-y:auto; flex:1"></div>
</div>

<div id="scr-chat" class="screen" style="padding:0">
    <div style="padding: 15px; display: flex; align-items: center; gap: 12px; background: var(--panel); border-bottom: 1px solid rgba(128,128,128,0.1);">
        <i class="fas fa-arrow-left" onclick="app.nav('scr-main')"></i>
        <b id="chat-title">Чат</b>
        <div id="typing-txt" style="font-size:10px; color:var(--accent); margin-left:10px;"></div>
    </div>
    <div id="msg-box"></div>
    <div id="react-panel" style="display:none; padding:10px; justify-content:center; gap:20px; background:var(--panel)">
        <span onclick="app.sendReact('❤️‍🔥')">❤️‍🔥</span><span onclick="app.sendReact('💔')">💔</span><span onclick="app.sendReact('❤️')">❤️</span>
    </div>
    <div style="padding:10px; display:flex; gap:10px; align-items:center; background:var(--panel);">
        <i class="fas fa-camera" onclick="app.sendPhoto()"></i>
        <input type="text" id="msg-in" class="input-ui" style="flex:1; margin:0" oninput="app.handleTyping()">
        <i class="fas fa-paper-plane" onclick="app.sendText()"></i>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
    authDomain: "dove-7ea6d.firebaseapp.com",
    projectId: "dove-7ea6d",
    databaseURL: "https://dove-7ea6d-default-rtdb.firebaseio.com",
    appId: "1:747559004808:web:f80e792795e5b3b4758d3d"
};

const f_app = initializeApp(firebaseConfig);
const db = getDatabase(f_app);

window.app = {
    user: null, peer: null, lastM: null,
    lang: 'uk', theme: 'dark',

    init() {
        const local = localStorage.getItem('dove_v18');
        if(local) {
            this.user = JSON.parse(local);
            this.applySettings();
            this.nav('scr-main');
            if(this.user.id === 'dev') document.getElementById('dev-tab').style.display = 'block';
        }
    },

    nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-main').style.display = (id === 'scr-main') ? 'flex' : 'none';
        if(id !== 'scr-main') document.getElementById(id).classList.add('active');
    },

    async register() {
        const id = document.getElementById('reg-id').value.toLowerCase().trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const name = document.getElementById('reg-name').value;

        if(!id || !phone || !name) return alert("Заповни все!");

        // Перевірка унікальності ID та телефону
        const usersSnap = await get(ref(db, 'users'));
        const users = usersSnap.val() || {};
        
        if(users[id]) return alert("Цей ID вже зайнятий!");
        for(let u in users) { if(users[u].phone === phone) return alert("Цей номер вже зареєстрований!"); }

        this.user = { id, name, phone, ava: 'https://via.placeholder.com/100', bio: '', lang: 'uk', theme: 'dark' };
        set(ref(db, 'users/' + id), this.user);
        localStorage.setItem('dove_v18', JSON.stringify(this.user));
        location.reload();
    },

    showProfile(type) {
        const u = type === 'self' ? this.user : this.peer;
        document.getElementById('p-ava').src = u.ava || 'https://via.placeholder.com/100';
        document.getElementById('p-name').innerText = u.name;
        document.getElementById('p-id').innerText = '@' + u.id;
        document.getElementById('p-phone').innerText = u.phone;
        document.getElementById('p-bio').innerText = u.bio || '';
        this.nav('scr-profile');
    },

    showAdminPanel() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = '';
            Object.values(snap.val()).forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-row';
                div.innerHTML = `<b>@${u.id}</b> | ${u.name} | ${u.phone}`;
                list.appendChild(div);
            });
        });
        this.nav('scr-admin');
    },

    toggleTheme() {
        this.theme = (this.theme === 'dark') ? 'light' : 'dark';
        this.applySettings();
    },

    toggleLang() {
        this.lang = (this.lang === 'uk') ? 'ru' : 'uk';
        this.applySettings();
    },

    applySettings() {
        document.body.className = this.theme;
        const dict = {
            uk: { title: "Профіль", settings: "Налаштування", typing: "Цвіркоче...", search: "Пошук..." },
            ru: { title: "Профиль", settings: "Настройки", typing: "Думает...", search: "Поиск..." }
        };
        const d = dict[this.lang];
        document.getElementById('lang-p-title').innerText = d.title;
        document.getElementById('lang-s-title').innerText = d.settings;
        document.getElementById('find-user').placeholder = d.search;
        if(this.peer) document.getElementById('msg-in').placeholder = d.typing;
    },

    search() {
        const q = document.getElementById('find-user').value.toLowerCase();
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            Object.values(snap.val() || {}).forEach(u => {
                if(u.id !== this.user.id && (u.id.includes(q) || u.name.toLowerCase().includes(q))) {
                    const div = document.createElement('div');
                    div.className = 'user-row';
                    div.style.cursor = 'pointer';
                    div.onclick = () => this.openChat(u);
                    div.innerHTML = `<img src="${u.ava}" style="width:40px;height:40px;border-radius:50%"> <b>${u.name}</b>`;
                    list.appendChild(div);
                }
            });
        });
    },

    openChat(u) {
        this.peer = u;
        document.getElementById('chat-title').innerText = u.name;
        this.nav('scr-chat');
        this.applySettings();
        const path = [this.user.id, u.id].sort().join('_');
        onValue(ref(db, 'msgs/' + path), (s) => this.drawMsgs(s.val()));
        onValue(ref(db, `status/${path}/${u.id}`), (s) => {
            document.getElementById('typing-txt').innerText = s.val() ? (this.lang === 'uk' ? 'Цвіркоче...' : 'Думает...') : '';
        });
    },

    drawMsgs(data) {
        const box = document.getElementById('msg-box');
        box.innerHTML = ''; if(!data) return;
        Object.entries(data).forEach(([key, m]) => {
            const isMy = m.s === this.user.id;
            const div = document.createElement('div');
            div.className = `bubble ${isMy ? 'my' : 'other'}`;
            div.onclick = () => { this.lastM = key; document.getElementById('react-panel').style.display='flex'; };
            let content = m.img ? `<img src="${m.img}" style="width:100%; border-radius:10px">` : m.t;
            div.innerHTML = `${content} <small style="display:block;font-size:8px;opacity:0.5">${m.time}</small>`;
            if(m.r) div.innerHTML += `<div class="react-badge">${m.r}</div>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    },

    sendText() {
        const t = document.getElementById('msg-in').value; if(!t) return;
        this.pushMsg({ t });
        document.getElementById('msg-in').value = '';
    },

    sendPhoto() {
        const url = prompt("Встав URL фото:");
        if(url) this.pushMsg({ img: url });
    },

    sendReact(emoji) {
        const path = [this.user.id, this.peer.id].sort().join('_');
        update(ref(db, `msgs/${path}/${this.lastM}`), { r: emoji });
        document.getElementById('react-panel').style.display='none';
    },

    pushMsg(data) {
        const path = [this.user.id, this.peer.id].sort().join('_');
        push(ref(db, 'msgs/' + path), {
            ...data, s: this.user.id, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
    },

    handleTyping() {
        const path = [this.user.id, this.peer.id].sort().join('_');
        set(ref(db, `status/${path}/${this.user.id}`), true);
        setTimeout(() => set(ref(db, `status/${path}/${this.user.id}`), false), 2000);
    },

    logout() { localStorage.removeItem('dove_v18'); location.reload(); }
};
app.init();
</script>
</body>
</html>
