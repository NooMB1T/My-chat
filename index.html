<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DoveGram 0.26</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #3b82f6; --bg: #000; --panel: #0a0a0a; --text: #fff; --msg-my: #2563eb; --msg-other: #1a1a1a; --border: #111; }
        body.light { --bg: #f0f2f5; --panel: #fff; --text: #000; --msg-other: #e4e6eb; --border: #ddd; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Sidebar */
        #app-core { display: none; flex: 1; width: 100vw; flex-direction: row; }
        .main-view { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .side-icons { width: 65px; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 25px; background: var(--panel); border-left: 1px solid var(--border); }
        .side-icons i { font-size: 20px; color: #555; cursor: pointer; padding: 10px; transition: 0.2s; }
        .side-icons i:hover { color: var(--accent); transform: scale(1.1); }
        .side-icons i.active { color: var(--accent); }

        /* Screens */
        .screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 1000; padding: 20px; }
        .screen.active { display: flex; }

        /* UI */
        .input-ui { width: 100%; padding: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; color: var(--text); outline: none; margin-bottom: 10px; }
        .btn-ui { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; color: #fff; cursor: pointer; }
        
        .user-row { padding: 12px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .user-row:hover { background: var(--panel); }
        .user-row img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--border); }
        .ava-plug { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; }

        /* Chat */
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; position: relative; word-wrap: break-word; font-size: 15px; }
        .bubble.my { align-self: flex-end; background: var(--msg-my); color: #fff; border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        .react-badge { position: absolute; bottom: -10px; right: 10px; background: var(--panel); border: 1px solid var(--border); padding: 2px 5px; border-radius: 10px; font-size: 12px; }
        .msg-author { font-size: 11px; font-weight: bold; color: var(--accent); margin-bottom: 3px; }
    </style>
</head>
<body class="dark">

<div id="scr-auth" class="screen active" style="justify-content: center; align-items: center;">
    <div style="width: 100%; max-width: 300px; text-align: center;">
        <h1 style="margin-bottom:25px;">DoveGram <span style="color:var(--accent)">0.26</span></h1>
        <input type="text" id="reg-id" class="input-ui" placeholder="@ID">
        <input type="text" id="reg-name" class="input-ui" placeholder="Имя">
        <input type="text" id="reg-phone" class="input-ui" placeholder="Номер">
        <button onclick="app.fastAuth()" class="btn-ui">ВОЙТИ</button>
    </div>
</div>

<div id="app-core">
    <div class="main-view">
        <div style="padding: 15px; border-bottom: 1px solid var(--border);">
            <input type="text" id="search-input" class="input-ui" style="margin:0" placeholder="Поиск..." oninput="app.search()">
        </div>
        <div id="contacts-list" style="flex: 1; overflow-y: auto;"></div>
    </div>
    <div class="side-icons">
        <i class="fas fa-home" onclick="app.nav('close')" title="Главная"></i>
        <i class="fas fa-globe" onclick="app.openChat({id:'global', name:'Глобальный чат'})" title="Глобал"></i>
        <i class="fas fa-search" onclick="document.getElementById('search-input').focus()"></i>
        <i class="fas fa-cog" onclick="app.nav('scr-settings')"></i>
        <i class="fas fa-shield-alt" id="dev-btn" style="display:none; color:#ef4444" onclick="app.showAdmin()"></i>
        <i class="fas fa-user-circle" onclick="app.showMe()"></i>
    </div>
</div>

<div id="scr-profile" class="screen"><i class="fas fa-times" onclick="app.nav('close')"></i><div id="prof-cont" style="text-align:center;margin-top:40px"></div></div>
<div id="scr-settings" class="screen">
    <i class="fas fa-times" onclick="app.nav('close')" style="margin-bottom:20px"></i>
    <h2>Настройки</h2>
    <div style="text-align:center; margin: 20px 0;">
        <img id="set-ava" style="width:100px; height:100px; border-radius:50%; object-fit:cover; background:var(--panel);">
        <br><button class="btn-ui" style="width:auto; margin-top:10px;" onclick="document.getElementById('f-ava').click()">Сменить фото</button>
        <input type="file" id="f-ava" hidden accept="image/*" onchange="app.updAva(this)">
    </div>
    <button class="btn-ui" style="background:var(--panel); border:1px solid var(--border); margin-bottom:10px" onclick="app.theme()">Сменить тему</button>
    <button class="btn-ui" style="background:#ef4444" onclick="app.logout()">Выйти</button>
</div>
<div id="scr-admin" class="screen"><i class="fas fa-times" onclick="app.nav('close')"></i><h2 style="color:#ef4444; margin:20px 0">Пользователи</h2><div id="admin-list"></div></div>

<div id="scr-chat" class="screen" style="padding:0; overflow:hidden;">
    <div style="padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--panel); border-bottom: 1px solid var(--border);">
        <i class="fas fa-chevron-left" onclick="app.closeChat()" style="cursor:pointer;"></i>
        <img id="chat-ava" src="" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
        <b id="chat-name">Чат</b>
    </div>
    <div id="msg-box"></div>
    <div id="react-panel" style="display:none; padding:10px; justify-content:center; gap:30px; background:var(--panel); border-top:1px solid var(--border);">
        <span onclick="app.react('❤️‍🔥')" style="font-size:24px; cursor:pointer;">❤️‍🔥</span>
        <span onclick="app.react('💔')" style="font-size:24px; cursor:pointer;">💔</span>
        <span onclick="app.react('❤️')" style="font-size:24px; cursor:pointer;">❤️</span>
    </div>
    <div style="padding:15px; display:flex; gap:12px; align-items:center; background:var(--panel); border-top: 1px solid var(--border);">
        <i class="fas fa-camera" style="font-size:22px; color:var(--accent); cursor:pointer;" onclick="document.getElementById('f-img').click()"></i>
        <input type="file" id="f-img" hidden accept="image/*" onchange="app.sendImg(this)">
        <input type="text" id="msg-in" class="input-ui" style="margin:0; flex:1;" placeholder="Текст..." onkeydown="if(event.key==='Enter') app.sendT()">
        <i class="fas fa-paper-plane" style="font-size:22px; color:var(--accent); cursor:pointer;" onclick="app.sendT()"></i>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const cfg = {
    apiKey: "AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
    authDomain: "dove-7ea6d.firebaseapp.com",
    projectId: "dove-7ea6d",
    databaseURL: "https://dove-7ea6d-default-rtdb.firebaseio.com",
    appId: "1:747559004808:web:f80e792795e5b3b4758d3d"
};

const f_app = initializeApp(cfg);
const db = getDatabase(f_app);

window.app = {
    user: null, peer: null, lastM: null, chatRef: null,
    
    init() {
        const s = localStorage.getItem('dv_26');
        if(s) { this.user = JSON.parse(s); this.start(); }
    },

    fastAuth() {
        const id = document.getElementById('reg-id').value.trim().toLowerCase();
        const nm = document.getElementById('reg-name').value.trim();
        const ph = document.getElementById('reg-phone').value.replace(/\D/g, '');
        if(!id || !nm || !ph) return alert("Заполни всё!");
        if(id === 'dev' && ph !== '380685244936') return alert("Доступ закрыт.");
        
        this.user = { id, name: nm, phone: ph, ava: '', theme: 'dark' };
        set(ref(db, 'users/' + id), this.user);
        localStorage.setItem('dv_26', JSON.stringify(this.user));
        this.start();
    },

    start() {
        document.getElementById('scr-auth').classList.remove('active');
        document.getElementById('app-core').style.display = 'flex';
        if(this.user.id === 'dev') document.getElementById('dev-btn').style.display = 'block';
        document.body.className = this.user.theme || 'dark';
        this.loadUsers();
    },

    loadUsers() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = `<div class="user-row" onclick="app.openChat({id:'global', name:'Глобальный чат'})">
                <div class="ava-plug"><i class="fas fa-globe"></i></div>
                <div><b>Глобальный чат</b><br><small style="color:var(--accent)">Виден всем</small></div>
            </div>`;
            const data = snap.val() || {};
            Object.values(data).forEach(u => {
                if(u.id !== this.user.id) {
                    const r = document.createElement('div');
                    r.className = 'user-row';
                    r.onclick = () => this.openChat(u);
                    r.innerHTML = `<img src="${u.ava || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='}">
                                   <div><b>${u.name}</b><br><small style="color:#777">@${u.id}</small></div>`;
                    list.appendChild(r);
                }
            });
        });
    },

    openChat(u) {
        this.peer = u;
        document.getElementById('chat-name').innerText = u.name;
        document.getElementById('chat-ava').src = u.ava || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
        this.nav('scr-chat');
        if (this.chatRef) off(this.chatRef);
        const path = u.id === 'global' ? 'global' : [this.user.id, u.id].sort().join('_');
        this.chatRef = ref(db, 'msgs/' + path);
        onValue(this.chatRef, (s) => this.draw(s.val()));
    },

    draw(data) {
        const box = document.getElementById('msg-box');
        box.innerHTML = ''; if(!data) return;
        Object.entries(data).forEach(([key, m]) => {
            const isMe = m.s === this.user.id;
            const b = document.createElement('div');
            b.className = `bubble ${isMe ? 'my' : 'other'}`;
            b.onclick = () => { this.lastM = key; document.getElementById('react-panel').style.display='flex'; };
            let h = '';
            if(this.peer.id === 'global' && !isMe) h += `<div class="msg-author">${m.sn}</div>`;
            if(m.img) h += `<img src="${m.img}" style="width:100%; border-radius:10px; margin-bottom:5px;">`;
            if(m.t) h += `<div>${m.t}</div>`;
            h += `<div style="font-size:9px; opacity:0.5; text-align:right;">${m.time}</div>`;
            if(m.r) h += `<div class="react-badge">${m.r}</div>`;
            b.innerHTML = h; box.appendChild(b);
        });
        box.scrollTop = box.scrollHeight;
    },

    sendT() {
        const i = document.getElementById('msg-in');
        if(!i.value.trim()) return;
        this.push({ t: i.value }); i.value = '';
    },

    sendImg(input) {
        if(input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => this.push({ img: e.target.result });
            r.readAsDataURL(input.files[0]);
        }
    },

    push(obj) {
        const path = this.peer.id === 'global' ? 'global' : [this.user.id, this.peer.id].sort().join('_');
        push(ref(db, 'msgs/' + path), { ...obj, s: this.user.id, sn: this.user.name, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    },

    react(e) {
        const path = this.peer.id === 'global' ? 'global' : [this.user.id, this.peer.id].sort().join('_');
        update(ref(db, `msgs/${path}/${this.lastM}`), { r: e });
        document.getElementById('react-panel').style.display = 'none';
    },

    nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id !== 'close') document.getElementById(id).classList.add('active');
    },

    closeChat() { if(this.chatRef) off(this.chatRef); this.nav('close'); },

    showMe() {
        document.getElementById('prof-cont').innerHTML = `
            <img src="${this.user.ava}" style="width:120px;height:120px;border-radius:50%;border:3px solid var(--accent)">
            <h2>${this.user.name}</h2><p>@${this.user.id}</p><p>${this.user.phone}</p>`;
        this.nav('scr-profile');
    },

    updAva(input) {
        if(input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => {
                this.user.ava = e.target.result;
                update(ref(db, 'users/' + this.user.id), { ava: e.target.result });
                localStorage.setItem('dv_26', JSON.stringify(this.user));
                document.getElementById('set-ava').src = e.target.result;
            };
            r.readAsDataURL(input.files[0]);
        }
    },

    theme() {
        this.user.theme = this.user.theme === 'dark' ? 'light' : 'dark';
        document.body.className = this.user.theme;
        update(ref(db, 'users/' + this.user.id), { theme: this.user.theme });
        localStorage.setItem('dv_26', JSON.stringify(this.user));
    },

    search() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.user-row').forEach(r => {
            r.style.display = r.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    },

    showAdmin() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            Object.values(snap.val() || {}).forEach(u => {
                const r = document.createElement('div');
                r.className = 'user-row';
                r.innerHTML = `<img src="${u.ava || ''}"><div><b>${u.name}</b> (@${u.id})<br><small>${u.phone}</small></div>`;
                list.appendChild(r);
            });
        });
        this.nav('scr-admin');
    },

    logout() { localStorage.clear(); location.reload(); }
};
app.init();
</script>
</body>
</html>
