<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 6.0 Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --bg: #000; 
            --accent: #ff4d4d; 
            --blue-line: #3b82f6; 
            --panel: #0a0a0a;
            --green-active: #4ade80;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* Авторизація */
        #auth { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-in { width: 100%; max-width: 340px; padding: 18px; margin-bottom: 15px; border-radius: 15px; background: #111; border: 1px solid #222; color: #fff; font-size: 16px; outline: none; }
        .auth-btn { width: 100%; max-width: 340px; padding: 18px; border-radius: 15px; background: #fff; color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }

        /* КОНСТРУКЦІЯ: Ліва панель */
        #left { flex: 1; display: flex; flex-direction: column; border-right: 2px solid var(--blue-line); position: relative; }
        
        /* Пошук (Зелена зона) */
        .search-wrap { padding: 20px 15px; background: var(--bg); }
        #s-input { width: 100%; padding: 12px 18px; border-radius: 25px; background: #121212; border: 1px solid #252525; color: #fff; font-size: 14px; }

        /* Список чатів */
        #chat-list { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .chat-row { padding: 18px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #080808; cursor: pointer; position: relative; }
        .chat-row:active { background: #050505; }
        .av-min { width: 50px; height: 50px; border-radius: 50%; background: #1a1a1a; object-fit: cover; }
        .online-dot { position: absolute; bottom: 18px; left: 55px; width: 12px; height: 12px; background: var(--green-active); border: 2px solid #000; border-radius: 50%; }

        /* ПРАВА ПАНЕЛЬ: Аватарка та Кнопки */
        #right { width: 90px; display: flex; flex-direction: column; align-items: center; padding-top: 150px; gap: 35px; position: relative; }

        /* ФОТО НАКЛАДЕНЕ (Червоне коло - виступає на 50%) */
        .main-av-container {
            position: absolute;
            top: 20px;
            right: 40px; /* Зсув вліво, щоб перекрити синю лінію */
            width: 110px;
            height: 110px;
            z-index: 100;
        }
        #main-av {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--accent);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.2);
            background: #222;
        }

        /* ІКОНКИ ЗАМІСТЬ ЦИФР (Жовті точки на схемі) */
        .nav-link { font-size: 24px; color: #444; cursor: pointer; transition: 0.3s ease; position: relative; }
        .nav-link:hover { color: #fff; transform: scale(1.1); }
        .nav-link.active { color: var(--green-active); }
        .msg-count { position: absolute; top: -8px; right: -10px; background: var(--accent); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* ВІКНО ЧАТУ (Глобальний чат) */
        #win { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; }
        .win-head { padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #111; gap: 20px; }
        #msg-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Повідомлення з реакціями */
        .msg-cloud { max-width: 80%; padding: 14px 18px; border-radius: 22px; background: #161616; position: relative; font-size: 15px; }
        .msg-cloud.my { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; }
        .msg-img { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid #222; }
        
        .react-bar { display: flex; gap: 6px; margin-top: -8px; margin-left: 12px; }
        .re-chip { background: #222; padding: 3px 8px; border-radius: 12px; font-size: 12px; border: 1px solid #333; cursor: pointer; color: #aaa; }

        /* Бар вводу */
        .input-bar { padding: 15px; background: #000; border-top: 1px solid #111; display: flex; align-items: center; gap: 12px; }
        #file-up { display: none; }
        .bar-btn { font-size: 20px; color: #555; cursor: pointer; }
        #m-input { flex: 1; padding: 14px; border-radius: 15px; background: #111; border: none; color: #fff; outline: none; }
    </style>
</head>
<body>

<div id="auth">
    <div style="text-align: center;">
        <h1 style="font-size: 32px; letter-spacing: -1px; margin-bottom: 5px;">DoveGram 6.0</h1>
        <p style="color: #444; font-weight: bold; margin-bottom: 40px;">CORE STABLE</p>
        <input type="text" id="nick" class="auth-in" placeholder="Нікнейм">
        <input type="tel" id="phone" class="auth-in" placeholder="+380 ...">
        <button class="auth-btn" onclick="login()">Увійти</button>
    </div>
</div>

<div class="main-av-container">
    <img id="main-av" src="https://i.imgur.com/6VBx3io.png">
</div>

<div id="left">
    <div class="search-wrap">
        <input type="text" id="s-input" placeholder="Пошук контактів..." oninput="doSearch()">
    </div>
    <div id="chat-list">
        <div class="chat-row" onclick="openChat('Глобальний чат', true)">
            <div style="width: 50px; height: 50px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-bolt"></i>
            </div>
            <div style="flex: 1;">
                <b>Global Core Chat</b><br>
                <small style="color: #555;">Система: Онлайн</small>
            </div>
        </div>
        <div id="others"></div>
    </div>
</div>

<div id="right">
    <div class="nav-link" onclick="tab('p')"><i class="fas fa-id-badge"></i></div>
    <div class="nav-link" onclick="document.getElementById('file-up').click()"><i class="fas fa-camera"></i></div>
    <div class="nav-link active" onclick="tab('m')">
        <i class="fas fa-comment-alt"></i>
        <span id="unread" class="msg-count">2</span>
    </div>
    <div class="nav-link" onclick="tab('s')"><i class="fas fa-sliders-h"></i></div>
    
    <div class="nav-link" style="margin-top: auto; color: #222;" onclick="location.reload()">
        <i class="fas fa-power-off"></i>
    </div>
</div>

<div id="win">
    <div class="win-head">
        <i class="fas fa-chevron-left" style="font-size: 20px;" onclick="closeChat()"></i>
        <b id="win-title">Чат</b>
    </div>
    <div id="msg-box"></div>
    <div class="input-bar">
        <label for="file-up" class="bar-btn"><i class="fas fa-paperclip"></i></label>
        <input type="file" id="file-up" accept="image/*" onchange="sendImg(this)">
        <input type="text" id="m-input" placeholder="Повідомлення...">
        <div class="bar-btn" onclick="sendText()"><i class="fas fa-arrow-up" style="color: #fff;"></i></div>
    </div>
</div>

<script>
    let me = { n: '', p: '', av: 'https://i.imgur.com/6VBx3io.png' };
    let unread = 0;

    function login() {
        me.n = document.getElementById('nick').value;
        me.p = document.getElementById('phone').value;
        if(!me.n || !me.p) return alert("Заповни поля!");
        document.getElementById('auth').style.display = 'none';
        document.getElementById('main-av').src = me.av;
        addSysMsg("Підключено до Core 6.0");
        genUsers();
    }

    function sendText() {
        const i = document.getElementById('m-input');
        if(i.value.trim()) { pushMsg(me.n, i.value, true); i.value = ''; }
    }

    function sendImg(input) {
        if(input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => pushMsg(me.n, '', true, e.target.result);
            r.readAsDataURL(input.files[0]);
        }
    }

    function pushMsg(u, t, isMe, img = null) {
        const box = document.getElementById('msg-box');
        const div = document.createElement('div');
        div.className = `msg-cloud ${isMe ? 'my' : ''}`;
        div.innerHTML = `<small style="opacity: 0.4; font-size: 10px;">${u}</small><br>
                         ${t ? `<span>${t}</span>` : ''}
                         ${img ? `<img src="${img}" class="msg-img">` : ''}`;
        
        const react = document.createElement('div');
        react.className = 'react-bar';
        react.innerHTML = `<div class="re-chip" onclick="this.innerHTML='🔥 1'; this.style.color='#ff4d4d'">🔥</div>`;
        
        box.appendChild(div);
        box.appendChild(react);
        box.scrollTop = box.scrollHeight;
        
        if(!isMe) { unread++; upd(); }
    }

    function upd() {
        const b = document.getElementById('unread');
        b.textContent = unread;
        b.style.display = unread > 0 ? 'block' : 'none';
    }

    function openChat(t) {
        document.getElementById('win-title').textContent = t;
        document.getElementById('win').style.display = 'flex';
        unread = 0; upd();
    }

    function closeChat() { document.getElementById('win').style.display = 'none'; }

    function doSearch() {
        const q = document.getElementById('s-input').value.toLowerCase();
        document.querySelectorAll('.chat-row').forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    }

    function genUsers() {
        const o = document.getElementById('others');
        const names = ['Anton_Dev', 'Support_Core', 'Moderator'];
        names.forEach(n => {
            o.innerHTML += `<div class="chat-row" onclick="openChat('${n}')">
                <div class="av-min" style="background: #111;"></div>
                <div class="online-dot"></div>
                <div style="flex:1"><b>${n}</b><br><small style="color:#333">Core User</small></div>
            </div>`;
        });
    }

    function addSysMsg(t) {
        document.getElementById('msg-box').innerHTML += `<div style="text-align:center; color:#222; font-size:12px; margin:10px 0;">${t}</div>`;
    }

    function tab(t) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    document.getElementById('m-input').onkeypress = (e) => { if(e.key === 'Enter') sendText(); };
</script>
</body>
</html>
