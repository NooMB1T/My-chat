<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>DoveGram | Login</title>
    <style>
        body { background: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .c { width: 85%; max-width: 320px; text-align: center; }
        .av-p { width: 90px; height: 90px; border: 2px solid #000; border-radius: 50%; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; font-weight: bold; font-size: 12px; }
        .av-p img { width: 100%; height: 100%; object-fit: cover; }
        input { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: #000; }
        button { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="c">
        <h1 style="letter-spacing: -1px; margin-bottom: 20px;">DoveGram 4.6</h1>
        <div class="av-p" onclick="document.getElementById('f').click()" id="pv">АВАТАР</div>
        <input type="file" id="f" hidden accept="image/*" onchange="p(this)">
        <input type="text" id="i" placeholder="Твой ник">
        <input type="tel" id="ph" placeholder="Номер телефона">
        <button onclick="s()">ВОЙТИ</button>
    </div>
    <script>
        let _a = '';
        function p(i) {
            const r = new FileReader();
            r.onload = (e) => { _a = e.target.result; document.getElementById('pv').innerHTML = `<img src="${_a}">`; };
            r.readAsDataURL(i.files[0]);
        }
        function s() {
            const n = document.getElementById('i').value.trim(), ph = document.getElementById('ph').value.trim();
            if(n && ph) { 
                localStorage.setItem('du', n); localStorage.setItem('da', _a); localStorage.setItem('dp', ph);
                window.location.href = '/chat'; 
            }
        }
    </script>
</body>
</html>
