<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 6.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --bg: #000; --blue: #3b82f6; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; color: #fff; }
        body { background: var(--bg); height: 100vh; overflow: hidden; }

        /* Регистрация */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .input-reg { width: 100%; max-width: 300px; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: #111; border: 1px solid #222; outline: none; }
        .btn-reg { width: 100%; max-width: 300px; padding: 15px; border-radius: 12px; background: #fff; color: #000; font-weight: bold; border: none; cursor: pointer; }

        /* Главный экран */
        #main-app { display: none; height: 100vh; width: 100%; }
        
        #left-side { flex: 1; border-right: 2px solid var(--blue); display: flex; flex-direction: column; }
        .head { padding: 20px; font-size: 22px; font-weight: 800; }
        
        /* Аватарка (без контура, на линии) */
        #right-side { width: 80px; display: flex; flex-direction: column; align-items: center; padding-top: 140px; gap: 40px; position: relative; }
        .main-av { 
            position: absolute; top: 20px; right: 38px; 
            width: 100px; height: 100px; border-radius: 50%; 
            z-index: 100; object-fit: cover; background: #222;
        }

        .nav-link { font-size: 24px; color: #333; cursor: pointer; transition: 0.2s; }
        .nav-link.active { color: #fff; }

        /* Список чатов */
        .chat-row { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .global-av { width: 50px; height: 50px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; }

        /* Экран Чата */
        #chat-screen { position: fixed; inset: 0; background: #000; z-index: 1500; display: none; flex-direction: column; }
        .chat-h { padding: 15px; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 15px; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; background: var(--glass); border-radius: 15px; max-width: 80%; }
        .bubble.me { align-self: flex-end; background: #fff; color: #000; }

        /* Настройки */
        #settings-screen { position: fixed; inset: 0; background: #000; z-index: 1600; display: none; padding: 20px; }
        .set-row { padding: 15px 0; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }

        .input-bar { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #111; }
        #m-text { flex: 1; padding: 10px; border-radius: 10px; background: #111; border: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2 style="margin-bottom: 20px;">DoveGram 6.0</h2>
    <input type="text" id="u-name" class="input-reg" placeholder="Ваше имя">
    <input type="text" id="u-tag" class="input-reg" placeholder="@кличка (уникальный ID)">
    <button class="btn-reg" onclick="register()">Создать аккаунт</button>
</div>

<div id="main-app">
    <div id="left-side" style="display: flex;">
        <div class="head">Чаты</div>
        <div class="chat-row" onclick="openGlobal()">
            <div class="global-av"><i class="fas fa-bolt"></i></div>
            <div><b>Глобальный чат</b><br><small style="color: #555;">Все пользователи здесь</small></div>
        </div>
    </div>

    <img src="https://i.imgur.com/6VBx3io.png" class="main-av" id="my-photo">

    <div id="right-side">
        <div class="nav-link" onclick="showSettings()"><i class="fas fa-id-card"></i></div>
        <div class="nav-link"><i class="fas fa-camera"></i></div>
        <div class="nav-link active"><i class="fas fa-comment"></i></div>
        <div class="nav-link" onclick="showSettings()"><i class="fas fa-cog"></i></div>
        <div class="nav-link" style="margin-top: auto; margin-bottom: 30px;" onclick="location.reload()">
            <i class="fas fa-arrow-left"></i>
        </div>
    </div>
</div>

<div id="chat-screen">
    <div class="chat-h">
        <i class="fas fa-chevron-left" onclick="closeChat()"></i>
        <b>Глобальный чат</b>
    </div>
    <div id="msgs"></div>
    <div class="input-bar">
        <input type="text" id="m-text" placeholder="Сообщение...">
        <i class="fas fa-paper-plane" onclick="send()"></i>
    </div>
</div>

<div id="settings-screen">
    <div class="chat-h">
        <i class="fas fa-chevron-left" onclick="hideSettings()"></i>
        <b>Настройки профиля</b>
    </div>
    <div class="set-row">
        <span>Имя</span>
        <b id="set-name">Anton</b>
    </div>
    <div class="set-row">
        <span>ID</span>
        <b id="set-tag" style="color: var(--blue);">@anton_dev</b>
    </div>
    <div class="set-row">
        <span>Статус</span>
        <span style="color: #4ade80;">Online</span>
    </div>
    <button class="btn-reg" style="margin-top: 20px; background: #ff4d4d; color: #fff;" onclick="location.reload()">Выйти из системы</button>
</div>

<script>
    let user = { name: '', tag: '' };

    function register() {
        const n = document.getElementById('u-name').value;
        const t = document.getElementById('u-tag').value;
        if(!n || !t) return alert("Заполни все поля!");
        
        user.name = n;
        user.tag = t.startsWith('@') ? t : '@' + t;
        
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        
        document.getElementById('set-name').textContent = user.name;
        document.getElementById('set-tag').textContent = user.tag;
    }

    function openGlobal() { document.getElementById('chat-screen').style.display = 'flex'; }
    function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }
    
    function showSettings() { document.getElementById('settings-screen').style.display = 'block'; }
    function hideSettings() { document.getElementById('settings-screen').style.display = 'none'; }

    function send() {
        const i = document.getElementById('m-text');
        if(!i.value.trim()) return;
        const m = document.getElementById('msgs');
        m.innerHTML += `<div class="bubble me"><small>${user.tag}</small><br>${i.value}</div>`;
        i.value = '';
        m.scrollTop = m.scrollHeight;
    }
</script>
</body>
</html>
