<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 6.0 | Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #3b82f6; --bg: #000; --panel: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; color: #fff; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }

        /* Авторизація */
        #gate { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gate-card { width: 90%; max-width: 360px; text-align: center; }
        .g-input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 15px; background: #0a0a0a; border: 1px solid #1a1a1a; outline: none; transition: 0.3s; }
        .g-input:focus { border-color: var(--accent); }
        .g-btn { width: 100%; padding: 18px; margin-top: 20px; border-radius: 15px; background: #fff; color: #000; font-weight: 800; border: none; cursor: pointer; }

        /* Контент */
        #main-side { flex: 1; border-right: 2px solid var(--accent); display: flex; flex-direction: column; background: var(--panel); }
        .h-title { padding: 35px 25px; font-size: 28px; font-weight: 900; }
        .c-item { padding: 20px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .c-item:hover { background: rgba(255,255,255,0.03); }
        .c-icon { width: 60px; height: 60px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 24px; }

        /* Бокове меню та Аватарка (БЕЗ КОНТУРУ, на лінії) */
        #nav-bar { width: 90px; display: flex; flex-direction: column; align-items: center; padding-top: 150px; gap: 40px; position: relative; background: #000; }
        .main-av { position: absolute; top: 25px; right: 38px; width: 105px; height: 105px; border-radius: 50%; z-index: 100; object-fit: cover; background: #111; cursor: pointer; }
        .nav-btn { font-size: 26px; color: #1a1a1a; cursor: pointer; transition: 0.3s; }
        .nav-btn.active, .nav-btn:hover { color: #fff; }

        /* Профіль */
        #prof-ui { position: fixed; inset: 0; background: #000; z-index: 8000; display: none; padding: 40px 20px; }
        .prof-box { background: #050505; padding: 25px; border-radius: 20px; border: 1px solid #111; margin-top: 30px; }
        .p-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

<div id="gate">
    <div class="gate-card">
        <h1 style="font-size: 36px; margin-bottom: 30px; letter-spacing: -1px;">DOVEGRAM 6.0</h1>
        <input type="text" id="in-name" class="g-input" placeholder="Введите имя">
        <input type="text" id="in-phone" class="g-input" placeholder="+380 ...">
        <button class="g-btn" onclick="save()">ВХОД</button>
    </div>
</div>

<div id="main-side">
    <div class="h-title">Чаты</div>
    <div class="c-item" onclick="location.href='chat.html'">
        <div class="c-icon"><i class="fas fa-bolt"></i></div>
        <div style="flex:1">
            <div style="display:flex; justify-content:space-between"><b>Глобальное ядро</b> <small style="color:#222">online</small></div>
            <p style="color:#444; font-size:14px; margin-top:4px;">(Начало общения)</p>
        </div>
    </div>
</div>

<img src="https://i.imgur.com/6VBx3io.png" class="main-av" onclick="openP()">

<div id="nav-bar">
    <div class="nav-btn active"><i class="fas fa-comment-dots"></i></div>
    <div class="nav-btn" onclick="openP()"><i class="fas fa-cog"></i></div>
    <div class="nav-btn" onclick="theme()"><i class="fas fa-palette"></i></div>
    <div class="nav-btn" style="margin-top:auto; margin-bottom:40px;" onclick="exit()">
        <i class="fas fa-power-off" style="color:#300"></i>
    </div>
</div>

<div id="prof-ui">
    <div style="display:flex; align-items:center; gap:20px;">
        <i class="fas fa-arrow-left" style="font-size:24px;" onclick="closeP()"></i>
        <h2>Настройки</h2>
    </div>
    <div class="prof-box">
        <div class="p-row"><span>Имя</span> <b id="p-n">---</b></div>
        <div class="p-row"><span>Телефон</span> <b id="p-p">---</b></div>
        <div class="p-row" style="border:none; color:#ff4d4d; margin-top:20px; cursor:pointer" onclick="exit()"><b>Выйти из аккаунта</b></div>
    </div>
</div>

<script>
    function save() {
        const n = document.getElementById('in-name').value;
        const p = document.getElementById('in-phone').value;
        if(!n || !p) return;
        localStorage.setItem('dg_user', n);
        localStorage.setItem('dg_phone', p);
        location.reload();
    }
    function check() {
        const u = localStorage.getItem('dg_user');
        if(u) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('p-n').innerText = u;
            document.getElementById('p-p').innerText = localStorage.getItem('dg_phone');
        }
    }
    function exit() { localStorage.clear(); location.reload(); }
    function openP() { document.getElementById('prof-ui').style.display = 'block'; }
    function closeP() { document.getElementById('prof-ui').style.display = 'none'; }
    function theme() {
        const c = ['#3b82f6', '#ff4d4d', '#4ade80', '#eab308'];
        document.documentElement.style.setProperty('--accent', c[Math.floor(Math.random()*c.length)]);
    }
    window.onload = check;
</script>
</body>
</html>
