<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DoveGram 17.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #3b82f6; --bg: #000; --panel: #0a0a0a; --text: #fff; --msg-my: #2563eb; --msg-other: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; color: var(--text); }
        body { background: var(--bg); height: 100vh; overflow: hidden; }

        .app-container { display: flex; height: 100vh; }
        
        /* Головне меню БЕЗ аватара зверху */
        .main-view { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #111; }
        
        /* Бічна панель (Іконки швидкого налаштування) */
        .side-icons { width: 70px; display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 35px; background: #080808; border-left: 1px solid #111; }
        .side-icons i { font-size: 22px; color: #555; cursor: pointer; transition: 0.3s; padding: 10px; }
        .side-icons i:hover { color: var(--accent); transform: scale(1.1); }
        .side-icons i.active { color: var(--accent); }

        .screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 1000; }
        .screen.active { display: flex; }

        .chat-card { padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #111; cursor: pointer; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; margin: 4px 0; position: relative; }
        .bubble.my { align-self: flex-end; background: var(--msg-my); border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        
        .input-ui { width: 100%; padding: 12px; background: #111; border: 1px solid #222; border-radius: 12px; outline: none; }
        .btn-ui { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-size: cover; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; background: #222; margin: 0 auto 20px; display: block; object-fit: cover; border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div id="scr-auth" class="screen active" style="justify-content: center; align-items: center; padding: 25px;">
    <div style="width: 100%; max-width: 320px;">
        <h2 style="text-align: center; margin-bottom: 30px; letter-spacing: 1px;">DoveGram</h2>
        <input type="text" id="reg-id" class="input-ui" placeholder="@ID (напр: user777)" style="margin-bottom:12px">
        <input type="text" id="reg-name" class="input-ui" placeholder="Ваше ім'я" style="margin-bottom:12px">
        <input type="text" id="reg-phone" class="input-ui" placeholder="+380..." style="margin-bottom:12px">
        <button onclick="app.register()" class="btn-ui">СТВОРИТИ АККАУНТ</button>
    </div>
</div>

<div class="app-container" id="scr-main">
    <div class="main-view">
        <div style="padding: 15px; border-bottom: 1px solid #111;">
            <input type="text" id="find-user" class="input-ui" placeholder="Пошук друга..." oninput="app.search()">
        </div>
        <div id="contacts-list" style="flex: 1; overflow-y: auto;"></div>
    </div>

    <div class="side-icons">
        <i class="fas fa-cog" title="Налаштування" onclick="app.nav('scr-settings')"></i>
        <i class="fas fa-plus" title="Додати" onclick="document.getElementById('find-user').focus()"></i>
        <i class="fas fa-volume-mute" title="Звук" onclick="alert('Звук вимкнено')"></i>
        <i class="fas fa-user-circle" title="Профіль" onclick="app.showProfile('self')"></i>
    </div>
</div>

<div id="scr-settings" class="screen" style="padding: 25px;">
    <div style="display: flex; align-items: center; margin-bottom: 30px;">
        <i class="fas fa-arrow-left" onclick="app.nav('scr-main')" style="font-size: 20px; margin-right: 20px;"></i>
        <h2>Налаштування</h2>
    </div>
    
    <img id="set-ava-preview" class="avatar-preview" src="https://via.placeholder.com/100">
    <input type="file" id="set-ava-input" hidden accept="image/*" onchange="app.updateAva(this)">
    <button class="btn-ui" style="background:#222; margin-bottom: 20px;" onclick="document.getElementById('set-ava-input').click()">
        <i class="fas fa-camera"></i> Обрати фото з галереї
    </button>

    <input type="text" id="set-name" class="input-ui" placeholder="Змінити ім'я" style="margin-bottom:12px">
    <textarea id="set-bio" class="input-ui" placeholder="Про мене (статус)" style="margin-bottom:20px"></textarea>
    <button onclick="app.saveSettings()" class="btn-ui">ЗБЕРЕГТИ ЗМІНИ</button>
</div>

<div id="scr-chat" class="screen">
    <div style="padding: 15px; display: flex; align-items: center; gap: 12px; background: #0a0a0a; border-bottom: 1px solid #111;">
        <i class="fas fa-arrow-left" onclick="app.nav('scr-main')"></i>
        <div style="flex:1">
            <b id="chat-name">Чат</b>
            <div id="typing-txt" style="font-size:10px; color:var(--accent); height:12px;"></div>
        </div>
    </div>
    <div id="msg-box"></div>
    <div style="padding:10px; display:flex; gap:10px; align-items:center; background:#0a0a0a;">
        <input type="text" id="msg-in" class="input-ui" style="flex:1" placeholder="Цвіркоче..." oninput="app.handleTyping()">
        <i class="fas fa-paper-plane" onclick="app.sendMsg()"></i>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",
    authDomain: "dove-7ea6d.firebaseapp.com",
    projectId: "dove-7ea6d",
    databaseURL: "https://dove-7ea6d-default-rtdb.firebaseio.com",
    appId: "1:747559004808:web:f80e792795e5b3b4758d3d"
};

const f_app = initializeApp(firebaseConfig);
const db = getDatabase(f_app);

window.app = {
    user: null, peer: null,
    lang: navigator.language.startsWith('uk') ? 'uk' : 'ru',

    init() {
        const local = localStorage.getItem('dove_v17');
        if(local) {
            this.user = JSON.parse(local);
            this.nav('scr-main');
            this.syncMyData();
        }
    },

    nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id === 'scr-main') return;
        document.getElementById(id).classList.add('active');
        if(id === 'scr-settings') {
            document.getElementById('set-ava-preview').src = this.user.ava || '';
            document.getElementById('set-name').value = this.user.name;
            document.getElementById('set-bio').value = this.user.bio || '';
        }
    },

    register() {
        const id = document.getElementById('reg-id').value.toLowerCase().replace('@','');
        const phone = document.getElementById('reg-phone').value;
        if(!id || !phone) return alert("Заповни всі поля!");

        this.user = {
            id, name: document.getElementById('reg-name').value,
            phone, ava: '', bio: '', bg: ''
        };
        set(ref(db, 'users/' + id), this.user);
        localStorage.setItem('dove_v17', JSON.stringify(this.user));
        location.reload();
    },

    updateAva(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                this.user.ava = e.target.result;
                document.getElementById('set-ava-preview').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    },

    saveSettings() {
        this.user.name = document.getElementById('set-name').value;
        this.user.bio = document.getElementById('set-bio').value;
        update(ref(db, 'users/' + this.user.id), this.user);
        localStorage.setItem('dove_v17', JSON.stringify(this.user));
        alert("Дані оновлено!");
        this.nav('scr-main');
    },

    search() {
        const q = document.getElementById('find-user').value.toLowerCase();
        if(q.length < 2) return;
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            Object.values(snap.val() || {}).forEach(u => {
                if(u.id !== this.user.id && (u.id.includes(q) || u.name.toLowerCase().includes(q))) {
                    const div = document.createElement('div');
                    div.className = 'chat-card';
                    div.onclick = () => this.openChat(u);
                    div.innerHTML = `
                        <div style="width:40px;height:40px;border-radius:50%;background:#222;overflow:hidden">
                            <img src="${u.ava || ''}" style="width:100%;height:100%;object-fit:cover">
                        </div>
                        <b>${u.name}</b>
                    `;
                    list.appendChild(div);
                }
            });
        });
    },

    openChat(u) {
        this.peer = u;
        document.getElementById('chat-name').innerText = u.name;
        this.nav('scr-chat');
        const path = [this.user.id, u.id].sort().join('_');
        onValue(ref(db, 'msgs/' + path), (s) => this.drawMsgs(s.val()));
        onValue(ref(db, `status/${path}/${u.id}`), (s) => {
            const txt = this.lang === 'uk' ? 'Цвіркоче...' : 'Думает...';
            document.getElementById('typing-txt').innerText = s.val() ? txt : '';
        });
    },

    drawMsgs(data) {
        const box = document.getElementById('msg-box');
        box.innerHTML = ''; if(!data) return;
        Object.values(data).forEach(m => {
            const isMy = m.s === this.user.id;
            const div = document.createElement('div');
            div.className = `bubble ${isMy ? 'my' : 'other'}`;
            div.innerHTML = `${m.t} <small style="display:block;font-size:8px;opacity:0.5;text-align:right">${m.time}</small>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    },

    sendMsg() {
        const t = document.getElementById('msg-in').value; if(!t) return;
        const path = [this.user.id, this.peer.id].sort().join('_');
        push(ref(db, 'msgs/' + path), {
            s: this.user.id, t, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        document.getElementById('msg-in').value = '';
    },

    handleTyping() {
        const path = [this.user.id, this.peer.id].sort().join('_');
        set(ref(db, `status/${path}/${this.user.id}`), true);
        setTimeout(() => set(ref(db, `status/${path}/${this.user.id}`), false), 2000);
    }
};
app.init();
</script>
</body>
</html>
