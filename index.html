<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DoveGram Ultra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --accent: #3b82f6;
            --bg: #000;
            --panel: #0a0a0a;
            --text: #fff;
            --msg-my: #3b82f6;
            --msg-other: #1a1a1a;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f3f4f6;
            --panel: #ffffff;
            --text: #000;
            --msg-my: #3b82f6;
            --msg-other: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); height: 100vh; overflow: hidden; transition: var(--transition); }

        /* SPA Layout */
        .screen { 
            position: fixed; inset: 0; background: var(--bg); 
            display: none; flex-direction: column; 
            transform: translateX(100%); transition: var(--transition); 
        }
        .screen.active { display: flex; transform: translateX(0); z-index: 10; }
        .screen.prev { transform: translateX(-20%); opacity: 0.5; }

        /* Headers */
        .header { 
            padding: 15px 20px; background: var(--panel); 
            border-bottom: 1px solid rgba(128,128,128,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* UI Elements */
        .btn-round { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: var(--panel); border: 1px solid rgba(128,128,128,0.2);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .input-main {
            width: 100%; padding: 14px 20px; border-radius: 15px;
            background: var(--panel); border: 1px solid rgba(128,128,128,0.2);
            margin-bottom: 15px; outline: none; transition: 0.2s;
        }
        .input-main:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }

        /* Chat List */
        .chat-card {
            padding: 15px 20px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(128,128,128,0.05); cursor: pointer;
        }
        .avatar { 
            width: 55px; height: 55px; border-radius: 50%; 
            background: var(--accent); display: flex; align-items: center; 
            justify-content: center; font-size: 20px; font-weight: bold; color: #fff;
        }

        /* Messages */
        #msg-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { 
            max-width: 80%; padding: 12px 16px; border-radius: 18px; 
            position: relative; animation: pop 0.2s ease-out;
        }
        .bubble.my { align-self: flex-end; background: var(--msg-my); color: #fff; border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        .time { font-size: 10px; opacity: 0.6; margin-top: 4px; display: block; text-align: right; }

        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Settings */
        .settings-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: var(--panel); margin-bottom: 2px;
        }

        /* Modals */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(8px);
        }
        .modal-content { background: var(--panel); padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; }
    </style>
</head>
<body data-theme="dark">

<div id="scr-auth" class="screen active" style="justify-content: center; align-items: center; transform: none;">
    <div style="width: 85%; max-width: 340px; text-align: center;">
        <i class="fas fa-dove" style="font-size: 50px; color: var(--accent); margin-bottom: 20px;"></i>
        <h1 style="margin-bottom: 30px;">DoveGram</h1>
        <input type="text" id="in-name" class="input-main" placeholder="Имя" data-i18="ph_name">
        <input type="text" id="in-phone" class="input-main" placeholder="+380..." data-i18="ph_phone">
        <button onclick="core.reg()" class="input-main" style="background: var(--accent); color: #fff; font-weight: bold; border: none;">Увійти / Войти</button>
    </div>
</div>

<div id="scr-main" class="screen">
    <div class="header">
        <h2 data-i18="title_chats">Чаты</h2>
        <div style="display: flex; gap: 10px;">
            <div class="btn-round" onclick="core.modal('mod-add', true)"><i class="fas fa-plus"></i></div>
            <div class="btn-round" onclick="core.nav('scr-set')"><i class="fas fa-user-cog"></i></div>
        </div>
    </div>
    <div id="list-chats" style="flex: 1; overflow-y: auto;"></div>
</div>

<div id="scr-chat" class="screen">
    <div class="header">
        <div class="btn-round" onclick="core.nav('scr-main')"><i class="fas fa-arrow-left"></i></div>
        <div style="text-align: center;">
            <b id="chat-title">Name</b>
            <div id="chat-status" style="font-size: 10px; color: var(--accent);">online</div>
        </div>
        <div class="btn-round" onclick="core.clearChat()"><i class="fas fa-trash"></i></div>
    </div>
    <div id="msg-container"></div>
    <div class="header" style="border-top: 1px solid rgba(128,128,128,0.1); border-bottom: none;">
        <input type="text" id="msg-input" class="input-main" style="margin: 0;" placeholder="Сообщение..." data-i18="ph_msg">
        <div class="btn-round" style="margin-left: 10px; background: var(--accent); border: none;" onclick="core.send()">
            <i class="fas fa-paper-plane" style="color: #fff;"></i>
        </div>
    </div>
</div>

<div id="scr-set" class="screen">
    <div class="header">
        <div class="btn-round" onclick="core.nav('scr-main')"><i class="fas fa-arrow-left"></i></div>
        <h2 data-i18="title_settings">Настройки</h2>
        <div style="width: 45px;"></div>
    </div>
    
    <div style="padding: 20px; text-align: center;">
        <div class="avatar" id="my-av" style="width: 100px; height: 100px; font-size: 40px; margin: 0 auto 15px;">?</div>
        <h2 id="my-name">User</h2>
        <p id="my-id" style="color: var(--accent); font-family: monospace;"></p>
    </div>

    <div class="settings-row">
        <span data-i18="lbl_theme">Темная тема</span>
        <input type="checkbox" id="theme-tog" checked onchange="core.toggleTheme()">
    </div>
    
    <div class="settings-row">
        <span data-i18="lbl_lang">Язык / Мова</span>
        <select id="lang-sel" onchange="core.setLang(this.value)" style="background: var(--bg); padding: 5px; border-radius: 5px;">
            <option value="ru">Русский</option>
            <option value="uk">Українська</option>
        </select>
    </div>

    <button onclick="core.exit()" class="input-main" style="width: 90%; margin: 40px auto; display: block; background: #ef4444; color: #fff; border: none;">Вихід / Выход</button>
</div>

<div id="mod-add" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom: 20px;" data-i18="title_new">Добавить контакт</h3>
        <input type="text" id="add-id" class="input-main" placeholder="ID (DG-...)">
        <input type="text" id="add-name" class="input-main" placeholder="Имя">
        <div style="display: flex; gap: 10px;">
            <button onclick="core.modal('mod-add', false)" class="input-main" style="flex: 1;">Отмена</button>
            <button onclick="core.addContact()" class="input-main" style="flex: 1; background: var(--accent); color: #fff; border: none;">ОК</button>
        </div>
    </div>
</div>

<script>
const dict = {
    ru: { ph_name: "Ваше имя", ph_phone: "Телефон", title_chats: "Чаты", ph_msg: "Сообщение...", title_settings: "Настройки", lbl_theme: "Темная тема", lbl_lang: "Язык интерфейса", title_new: "Новый контакт" },
    uk: { ph_name: "Ваше ім'я", ph_phone: "Телефон", title_chats: "Чати", ph_msg: "Повідомлення...", title_settings: "Налаштування", lbl_theme: "Темна тема", lbl_lang: "Мова інтерфейсу", title_new: "Новий контакт" }
};

const core = {
    db: { user: null, contacts: [], lang: 'ru', theme: 'dark' },
    activeId: null,

    init() {
        const data = localStorage.getItem('dove_db');
        if(data) this.db = JSON.parse(data);
        
        this.applyTheme();
        this.applyLang();
        
        if(this.db.user) {
            this.nav('scr-main');
            this.renderList();
            this.updateProfile();
        }

        document.getElementById('msg-input').onkeyup = (e) => { if(e.key === 'Enter') this.send(); };
    },

    nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    modal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; },

    reg() {
        const n = document.getElementById('in-name').value;
        const p = document.getElementById('in-phone').value;
        if(!n || !p) return;
        this.db.user = { name: n, phone: p, id: 'DG-' + Math.random().toString(36).substr(2,4).toUpperCase() };
        this.save();
        location.reload();
    },

    save() { localStorage.setItem('dove_db', JSON.stringify(this.db)); },

    addContact() {
        const id = document.getElementById('add-id').value;
        const name = document.getElementById('add-name').value;
        if(!id || !name) return;
        this.db.contacts.push({ id, name, msgs: [] });
        this.save();
        this.modal('mod-add', false);
        this.renderList();
    },

    renderList() {
        const container = document.getElementById('list-chats');
        container.innerHTML = '';
        this.db.contacts.forEach(c => {
            const last = c.msgs.length ? c.msgs[c.msgs.length-1].text : 'Нет сообщений';
            container.innerHTML += `
                <div class="chat-card" onclick="core.openChat('${c.id}')">
                    <div class="avatar">${c.name[0]}</div>
                    <div style="flex:1">
                        <b>${c.name}</b><br>
                        <small style="opacity:0.5">${last}</small>
                    </div>
                </div>
            `;
        });
    },

    openChat(id) {
        this.activeId = id;
        const c = this.db.contacts.find(x => x.id === id);
        document.getElementById('chat-title').innerText = c.name;
        this.renderMsgs();
        this.nav('scr-chat');
    },

    send() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        const c = this.db.contacts.find(x => x.id === this.activeId);
        c.msgs.push({ text: inp.value, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), my: true });
        this.save();
        inp.value = '';
        this.renderMsgs();
    },

    renderMsgs() {
        const box = document.getElementById('msg-container');
        box.innerHTML = '';
        const c = this.db.contacts.find(x => x.id === this.activeId);
        c.msgs.forEach(m => {
            box.innerHTML += `
                <div class="bubble ${m.my ? 'my' : 'other'}">
                    ${m.text}
                    <span class="time">${m.time}</span>
                </div>
            `;
        });
        box.scrollTop = box.scrollHeight;
    },

    clearChat() {
        if(!confirm('Очистить историю?')) return;
        const c = this.db.contacts.find(x => x.id === this.activeId);
        c.msgs = [];
        this.save();
        this.renderMsgs();
    },

    toggleTheme() {
        this.db.theme = this.db.theme === 'dark' ? 'light' : 'dark';
        this.save();
        this.applyTheme();
    },

    applyTheme() {
        document.body.setAttribute('data-theme', this.db.theme);
        document.getElementById('theme-tog').checked = (this.db.theme === 'dark');
    },

    setLang(l) {
        this.db.lang = l;
        this.save();
        this.applyLang();
    },

    applyLang() {
        const l = this.db.lang;
        document.getElementById('lang-sel').value = l;
        document.querySelectorAll('[data-i18]').forEach(el => {
            const key = el.getAttribute('data-i18');
            if(el.tagName === 'INPUT') el.placeholder = dict[l][key];
            else el.innerText = dict[l][key];
        });
    },

    updateProfile() {
        document.getElementById('my-name').innerText = this.db.user.name;
        document.getElementById('my-id').innerText = 'Your ID: ' + this.db.user.id;
        document.getElementById('my-av').innerText = this.db.user.name[0];
    },

    exit() { localStorage.clear(); location.reload(); }
};

window.onload = () => core.init();
</script>
</body>
</html>
