<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DoveGram 6.0 | Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #3b82f6; --bg: #000; --panel: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; color: #fff; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }

        /* Система входа */
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .gate-card { width: 90%; max-width: 350px; text-align: center; }
        .gate-input { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; background: #111; border: 1px solid #222; outline: none; transition: 0.3s; }
        .gate-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .gate-btn { width: 100%; padding: 16px; margin-top: 15px; border-radius: 12px; background: #fff; color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }

        /* Основной интерфейс */
        #main-view { flex: 1; border-right: 2px solid var(--accent); display: flex; flex-direction: column; background: var(--panel); }
        .top-bar { padding: 30px 25px; display: flex; justify-content: space-between; align-items: center; }
        .top-bar h1 { font-size: 26px; font-weight: 900; letter-spacing: -1px; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); transition: 0.2s; }
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-icon { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(45deg, #111, #222); display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--accent); }

        /* Боковое меню */
        #nav-side { width: 90px; display: flex; flex-direction: column; align-items: center; padding-top: 150px; gap: 40px; position: relative; background: #000; }
        .side-av { position: absolute; top: 25px; right: 38px; width: 105px; height: 105px; border-radius: 50%; z-index: 100; object-fit: cover; background: #111; cursor: pointer; transition: 0.3s; }
        .side-av:hover { transform: scale(1.05); }

        .nav-link { font-size: 26px; color: #222; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-link:hover, .nav-link.active { color: #fff; }
        .nav-link i { filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }

        /* Экран Профиля */
        #profile-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; padding: 30px; }
        .prof-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .prof-info-box { background: #080808; padding: 25px; border-radius: 20px; border: 1px solid #111; }
        .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #111; }
        .info-row span { color: #555; font-size: 14px; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="gate-card">
        <h1 style="font-size: 32px; margin-bottom: 10px;">DOVEGRAM</h1>
        <p style="color: #444; margin-bottom: 30px;">Core 6.0 Architecture</p>
        <input type="text" id="reg-name" class="gate-input" placeholder="Введите имя">
        <input type="text" id="reg-phone" class="gate-input" placeholder="+380 ...">
        <button class="gate-btn" onclick="saveUser()">Начать сессию</button>
    </div>
</div>

<div id="main-view">
    <div class="top-bar">
        <h1>Чаты</h1>
        <i class="fas fa-search" style="color: #333;"></i>
    </div>
    <div class="chat-list">
        <div class="chat-item" onclick="location.href='chat.html'">
            <div class="chat-icon"><i class="fas fa-bolt"></i></div>
            <div style="flex: 1;">
                <div style="display:flex; justify-content:space-between"><b>Глобальное ядро</b> <small style="color:#222">сейчас</small></div>
                <p style="color: #555; font-size: 14px; margin-top: 4px;">(Начало общения)</p>
            </div>
        </div>
    </div>
</div>

<img src="https://i.imgur.com/6VBx3io.png" class="side-av" id="user-photo" onclick="toggleProfile(true)">

<div id="nav-side">
    <div class="nav-link active"><i class="fas fa-comment-alt"></i></div>
    <div class="nav-link" onclick="toggleProfile(true)"><i class="fas fa-sliders-h"></i></div>
    <div class="nav-link" onclick="changeColor()"><i class="fas fa-palette"></i></div>
    <div class="nav-link" style="margin-top: auto; margin-bottom: 40px;" onclick="logout()">
        <i class="fas fa-power-off" style="color: #400;"></i>
    </div>
</div>

<div id="profile-overlay">
    <div class="prof-header">
        <i class="fas fa-chevron-left" style="font-size: 24px; cursor:pointer;" onclick="toggleProfile(false)"></i>
        <h2 style="font-size: 28px;">Настройки</h2>
    </div>
    <div class="prof-info-box">
        <div class="info-row"><span>Имя аккаунта</span> <b id="p-name">---</b></div>
        <div class="info-row"><span>Привязанный номер</span> <b id="p-phone">---</b></div>
        <div class="info-row"><span>Версия ПО</span> <b style="color: var(--accent);">6.0.4-STABLE</b></div>
        <div class="info-row" style="border:none; margin-top: 20px; color: #ff4d4d; cursor:pointer;" onclick="logout()">
            <b>Завершить все сеансы</b>
        </div>
    </div>
</div>

<script>
    const storage = {
        save: (key, val) => localStorage.setItem(key, val),
        get: (key) => localStorage.getItem(key),
        clear: () => localStorage.clear()
    };

    function checkSession() {
        const name = storage.get('dg_name');
        if (name) {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-phone').innerText = storage.get('dg_phone');
        }
    }

    function saveUser() {
        const n = document.getElementById('reg-name').value;
        const p = document.getElementById('reg-phone').value;
        if(n.length < 2 || p.length < 5) return alert("Данные слишком короткие!");
        
        storage.save('dg_name', n);
        storage.save('dg_phone', p);
        location.reload();
    }

    function logout() {
        if(confirm("Выйти из системы? Все данные будут стерты.")) {
            storage.clear();
            location.reload();
        }
    }

    function toggleProfile(show) {
        document.getElementById('profile-overlay').style.display = show ? 'block' : 'none';
    }

    function changeColor() {
        const colors = ['#3b82f6', '#ff4d4d', '#4ade80', '#a855f7', '#eab308'];
        const current = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
        let next = colors[(colors.indexOf(current) + 1) % colors.length];
        document.documentElement.style.setProperty('--accent', next);
    }

    window.onload = checkSession;
</script>
</body>
</html>
