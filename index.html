<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DoveGram</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#17212b;--sb:#0e1621;--inp:#242f3d;--hov:#202b36;
--sent:#2b5278;--recv:#182533;--acc:#5eaae8;--acc2:#3a8fd4;
--txt:#f5f5f5;--txt2:#7e919e;--txt3:#546778;--brd:#1c2936;
--grn:#4dcd5e;--red:#e05555;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--txt)}
.scr{display:none;height:100%;width:100%;position:absolute;top:0;left:0}.scr.act{display:flex}
.inp{width:100%;padding:14px 18px;border-radius:12px;border:2px solid var(--brd);background:var(--inp);color:var(--txt);font-size:15px;outline:none;margin-bottom:12px;transition:border .2s;font-family:inherit}
.inp:focus{border-color:var(--acc)}.inp::placeholder{color:var(--txt3)}
.ib{width:42px;height:42px;border:none;border-radius:50%;background:transparent;color:var(--txt2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.ib:hover{background:var(--hov);color:var(--txt)}

/* CONNECTION BANNER */
#offBanner{display:none;position:fixed;top:0;left:0;width:100%;background:var(--red);color:#fff;text-align:center;padding:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 2px 10px rgba(0,0,0,.3)}

/* AUTH */
#auth{flex-direction:column;align-items:center;justify-content:center;background:var(--sb)}
.auth-box{width:90%;max-width:380px;text-align:center;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo-icon{width:100px;height:100px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,#5eaae8,#7b68ee);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(94,170,232,.3)}
.logo-icon i{font-size:44px;color:#fff}
.auth-box h1{font-size:28px;font-weight:700;margin-bottom:4px}
.auth-box .sub{color:var(--txt2);font-size:14px;margin-bottom:28px}
.btn-main{width:100%;padding:14px;border:none;border-radius:12px;background:var(--acc);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-main:hover{background:var(--acc2)}.btn-main:disabled{opacity:.6;cursor:wait}
.err{color:var(--red);font-size:13px;min-height:20px;margin-top:10px}
.hint{color:var(--txt3);font-size:12px;margin-top:14px}

/* APP */
#app{flex-direction:row;padding-top:env(safe-area-inset-top)}
.sb{width:320px;min-width:320px;height:100%;display:flex;flex-direction:column;background:var(--sb);border-right:1px solid var(--brd)}
.sb-top{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--brd);min-height:58px}
.search-w{flex:1;position:relative}
.search-w i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:13px}
.search-w input{width:100%;padding:10px 14px 10px 40px;border-radius:22px;border:none;background:var(--inp);color:var(--txt);font-size:13px;outline:none}
.search-w input::placeholder{color:var(--txt3)}

.tabs{display:flex;border-bottom:1px solid var(--brd)}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--txt3);cursor:pointer;transition:.2s;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.act{color:var(--acc);border-bottom-color:var(--acc)}.tab:hover{color:var(--txt2)}
.tab i{font-size:14px}

.cl{flex:1;overflow-y:auto}.cl::-webkit-scrollbar{width:5px}.cl::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
.ci{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .12s}
.ci:hover{background:var(--hov)}.ci.active{background:var(--acc)}.ci.active *{color:#fff!important}
.av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0;position:relative}
.av i{font-size:22px}
.av.c1{background:linear-gradient(135deg,#5eaae8,#7b68ee)}
.av.c2{background:linear-gradient(135deg,#43b87a,#2ecc71)}
.av.c3{background:linear-gradient(135deg,#e05555,#ff6b6b)}
.av.c4{background:linear-gradient(135deg,#f5a623,#f7c948)}
.av.c5{background:linear-gradient(135deg,#9b59b6,#8e44ad)}
.av.c6{background:linear-gradient(135deg,#1abc9c,#16a085)}
.av.c7{background:linear-gradient(135deg,#e91e63,#f06292)}
.av.gl{background:linear-gradient(135deg,#5eaae8,#43b87a)}
.av .dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;background:var(--grn);border-radius:50%;border:2.5px solid var(--sb)}
.ci-body{flex:1;min-width:0}
.ci-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.ci-name{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.ci-time{font-size:12px;color:var(--txt3);flex-shrink:0;margin-left:8px}
.ci-msg{font-size:13px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CHAT AREA */
.cha{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.ch-h{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--sb);border-bottom:1px solid var(--brd);min-height:58px;position:relative}
.back{display:none}
.ch-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0}
.ch-av i{font-size:18px}
.ch-info{flex:1;display:flex;flex-direction:column;cursor:pointer;padding:4px;border-radius:6px;transition:.2s}
.ch-info:hover{background:var(--hov)}
.ch-nm{font-size:15px;font-weight:600}.ch-st{font-size:12px;color:var(--txt2)}.ch-st.on{color:var(--grn)}.ch-st.tp{color:var(--acc)}

.ctx-menu{position:absolute;top:55px;right:15px;background:var(--sb);border:1px solid var(--brd);border-radius:12px;padding:5px;z-index:2000;display:none;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:160px}
.ctx-menu.show{display:flex}
.ctx-menu button{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;background:none;border:none;color:var(--txt);font-size:14px;cursor:pointer;border-radius:8px;font-family:inherit;transition:.15s}
.ctx-menu button:hover{background:var(--hov)}

.msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:4px}
.msgs::-webkit-scrollbar{width:5px}.msgs::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
.mg{max-width:70%;display:flex;flex-direction:column}.mg.s{align-self:flex-end}.mg.r{align-self:flex-start}
.mg-sn{font-size:12px;font-weight:600;color:var(--acc);margin:0 10px 1px;display:none}.mg.r.g .mg-sn{display:block}
.bbl{padding:7px 12px 5px;border-radius:12px;font-size:14.5px;line-height:1.4;word-break:break-word}
.mg.s .bbl{background:var(--sent);border-top-right-radius:4px}
.mg.r .bbl{background:var(--recv);border-top-left-radius:4px}
.bbl img.mi{max-width:280px;max-height:300px;border-radius:8px;display:block;margin-bottom:4px;cursor:pointer}
.bbl video{max-width:280px;border-radius:8px;display:block;margin-bottom:4px}
.mg-t{white-space:pre-wrap}
.mg-f{display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-top:1px}
.mg-ti{font-size:11px;color:rgba(255,255,255,.45)}.mg.s .mg-ti{color:rgba(255,255,255,.55)}
.mg-ck{font-size:11px;color:rgba(255,255,255,.45)}.mg-ck.read{color:var(--acc)}
.mg-rx{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.rxb{padding:2px 7px;border-radius:12px;font-size:14px;border:1px solid var(--brd);background:rgba(94,170,232,.08);cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:3px}
.rxb:hover{border-color:var(--acc);background:rgba(94,170,232,.18)}.rxb.my{border-color:var(--acc);background:rgba(94,170,232,.2)}
.rxc{font-size:12px;color:var(--txt2)}

.dsep{align-self:center;padding:4px 14px;border-radius:16px;background:rgba(0,0,0,.3);font-size:13px;color:var(--txt2);margin:10px 0}
.tdot{display:inline-flex;gap:3px;align-items:center}
.tdot span{width:5px;height:5px;background:var(--acc);border-radius:50%;animation:bounce .6s infinite alternate}
.tdot span:nth-child(2){animation-delay:.15s}.tdot span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{opacity:.3;transform:translateY(-3px)}}

.in-bar{display:flex;align-items:flex-end;gap:4px;padding:8px 10px;background:var(--sb);border-top:1px solid var(--brd)}
.in-bar textarea{flex:1;padding:10px 14px;border:none;border-radius:20px;background:var(--inp);color:var(--txt);font-size:14px;font-family:inherit;resize:none;outline:none;max-height:120px;line-height:1.35}
.in-bar textarea::placeholder{color:var(--txt3)}
.ib.snd{color:var(--acc);font-size:20px}.ib.snd:hover{color:var(--acc2)}

.att-m{display:none;padding:10px 14px;background:var(--sb);border-top:1px solid var(--brd);gap:10px}
.att-m.show{display:flex}
.att-b{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:12px 18px;border-radius:14px;border:none;background:var(--inp);color:var(--txt);transition:.2s;font-size:12px;font-family:inherit}
.att-b i{font-size:24px}.att-b:hover{background:var(--hov);transform:translateY(-2px)}
.att-b.ph i{color:#5eaae8}.att-b.vi i{color:#e05555}

.prev{display:none;align-items:center;gap:10px;padding:8px 14px;background:var(--sb);border-top:1px solid var(--brd)}
.prev img,.prev video{width:56px;height:56px;object-fit:cover;border-radius:8px}
.prev .pn{flex:1;color:var(--txt2);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prev .pd{width:30px;height:30px;border:none;border-radius:50%;background:var(--red);color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.rpop{position:fixed;display:none;background:var(--sb);border:1px solid var(--brd);border-radius:24px;padding:6px 10px;gap:4px;box-shadow:0 8px 30px rgba(0,0,0,.6);z-index:999}
.rpop.show{display:flex}
.rpop button{width:44px;height:44px;border:none;border-radius:50%;background:transparent;font-size:24px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.rpop button:hover{transform:scale(1.35);background:var(--hov)}

.fscr{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:2000;cursor:zoom-out}
.fscr.show{display:flex}.fscr img,.fscr video{max-width:95%;max-height:95%;border-radius:4px}
.fscr .x{position:absolute;top:16px;right:16px;width:44px;height:44px;border:none;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:1000}
.mo.show{display:flex}
.md{width:90%;max-width:400px;background:var(--sb);border-radius:16px;padding:24px;animation:fadeIn .25s ease;display:flex;flex-direction:column;max-height:85vh;}
.md-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-shrink:0}
.md-top h3{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.fl{display:block;font-size:12px;color:var(--acc);margin:8px 0 4px}
.md-btns{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.btn-out{width:100%;padding:13px;border:1px solid var(--red);border-radius:12px;background:transparent;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-out:hover{background:rgba(224,85,85,.1)}

.tt{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--inp);border:1px solid var(--brd);padding:10px 24px;border-radius:20px;font-size:14px;opacity:0;transition:.25s;z-index:9999;pointer-events:none;white-space:nowrap}
.tt.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txt3)}
.empty i{font-size:52px;margin-bottom:14px;opacity:.2}.empty p{font-size:15px}

/* CALL UI */
#callUi{display:none;position:fixed;inset:0;background:#000;z-index:3000;flex-direction:column;align-items:center;justify-content:center}
#callUi.show{display:flex}
.call-vids{position:relative;width:100%;flex:1;background:#111;overflow:hidden}
#remVid{width:100%;height:100%;object-fit:cover}
#locVid{position:absolute;bottom:20px;right:20px;width:120px;height:160px;object-fit:cover;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.5);background:#222}
.call-ctls{padding:20px;display:flex;gap:20px;background:var(--sb);width:100%;justify-content:center}
.btn-call{width:60px;height:60px;border-radius:50%;border:none;font-size:24px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-call.red{background:var(--red)}
.btn-call.grn{background:var(--grn)}
#incCall{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--sb);border:1px solid var(--acc);border-radius:16px;padding:15px 20px;z-index:4000;box-shadow:0 10px 30px rgba(0,0,0,.6);text-align:center;color:#fff}

@media(max-width:768px){.sb{width:100%;min-width:100%;position:absolute;z-index:10}.cha{width:100%}.sb.hid{display:none}.cha.hid{display:none}.back{display:flex!important}.mg{max-width:85%}}
</style>
</head>
<body>

<div id="offBanner">Немає з'єднання з сервером. Перепідключення...</div>

<div id="auth" class="scr act">
<div class="auth-box">
<div class="logo-icon"><i class="fas fa-dove"></i></div>
<h1>DoveGram</h1>
<p class="sub">Швидко. Вільно. Безпечно.</p>
<input class="inp" id="aId" placeholder="Придумайте @username" autocomplete="off" autofocus>
<input class="inp" id="aNm" placeholder="Ваше ім'я">
<button class="btn-main" id="aBtn"><i class="fas fa-arrow-right"></i> Увійти</button>
<div class="err" id="aErr"></div>
</div>
</div>

<div id="app" class="scr">
<aside id="sidebar" class="sb">
<div class="sb-top">
<button class="ib" id="menuBtn" title="Профіль"><i class="fas fa-bars"></i></button>
<div class="search-w"><i class="fas fa-search"></i><input id="searchIn" placeholder="Пошук..."></div>
</div>
<div class="tabs">
<div class="tab act" data-tab="all"><i class="fas fa-layer-group"></i> Всі</div>
<div class="tab" data-tab="global"><i class="fas fa-globe-americas"></i> Глобал</div>
<div class="tab" data-tab="private"><i class="fas fa-user-friends"></i> Особисті</div>
</div>
<div class="cl" id="chatList"></div>
</aside>

<main id="chatArea" class="cha hid">
<header class="ch-h">
<button class="ib back" id="backBtn"><i class="fas fa-arrow-left"></i></button>
<div class="ch-av av gl" id="hAv"><i class="fas fa-globe-americas"></i></div>
<div class="ch-info" id="chInfo" title="Натисніть для інформації">
<span class="ch-nm" id="hNm">DoveGram</span><span class="ch-st" id="hSt"></span>
</div>
<button class="ib" id="ciCall" style="display:none; color:var(--grn)"><i class="fas fa-phone-alt"></i></button>
<button class="ib" id="ciBtn"><i class="fas fa-ellipsis-v"></i></button>
<div class="ctx-menu" id="chMenu">
<button id="cmClear" style="color:var(--red)"><i class="fas fa-trash-alt"></i> Очистити чат</button>
</div>
</header>
<div class="msgs" id="msgs"><div class="empty"><i class="fas fa-paper-plane"></i><p>Виберіть чат для спілкування</p></div></div>
<div class="att-m" id="attM">
<button class="att-b ph" id="attPh"><i class="fas fa-camera"></i>Фото</button>
<button class="att-b vi" id="attVi"><i class="fas fa-film"></i>Відео</button>
</div>
<div class="prev" id="prev">
<img id="prvI" style="display:none"><video id="prvV" style="display:none" muted></video>
<span class="pn" id="prvN"></span>
<button class="pd" id="prvD"><i class="fas fa-times"></i></button>
</div>
<div class="in-bar" id="inBar" style="display:none">
<button class="ib" id="attBtn"><i class="fas fa-paperclip"></i></button>
<textarea id="mIn" rows="1" placeholder="Повідомлення..."></textarea>
<button class="ib snd" id="sndBtn"><i class="fas fa-paper-plane"></i></button>
</div>
</main>
</div>

<div class="mo" id="profM">
<div class="md">
<div class="md-top"><h3><i class="fas fa-user-cog"></i> Профіль</h3><button class="ib" id="profX"><i class="fas fa-times"></i></button></div>
<label class="fl">@ID</label><input class="inp" id="pId" disabled>
<label class="fl">Ім'я</label><input class="inp" id="pNm">
<label class="fl">Телефон</label><input class="inp" id="pPh" type="tel">
<label class="fl">Про себе</label><input class="inp" id="pBio" placeholder="Розкажіть...">
<div class="md-btns">
<button class="btn-main" id="pSave"><i class="fas fa-check"></i> Зберегти</button>
<button class="btn-out" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Вийти</button>
</div>
</div>
</div>

<div class="mo" id="allUsersM">
<div class="md" style="padding:0">
<div class="md-top" style="padding:20px; border-bottom:1px solid var(--brd); margin:0">
<h3><i class="fas fa-users"></i> Всі користувачі</h3>
<button class="ib" id="allUsersX"><i class="fas fa-times"></i></button>
</div>
<div id="allUsersList" class="cl" style="padding:10px; overflow-y:auto; flex:1"></div>
</div>
</div>

<div id="callUi">
    <div style="position:absolute; top:20px; left:20px; color:#fff; font-size:18px; font-weight:600; z-index:10" id="callStatus">З'єднання...</div>
    <div class="call-vids">
        <video id="remVid" autoplay playsinline></video>
        <video id="locVid" autoplay playsinline muted></video>
    </div>
    <div class="call-ctls">
        <button class="btn-call red" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<div id="incCall">
    <div style="font-size:16px; font-weight:600; margin-bottom:5px" id="incName">Вхідний дзвінок</div>
    <div style="display:flex; gap:15px; margin-top:15px; justify-content:center">
        <button class="btn-call grn" id="ansCallBtn" style="width:45px; height:45px; font-size:18px"><i class="fas fa-phone"></i></button>
        <button class="btn-call red" id="rejCallBtn" style="width:45px; height:45px; font-size:18px"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<div class="rpop" id="rPop">
<button data-r="❤️">❤️</button><button data-r="💔">💔</button><button data-r="❤️‍🔥">❤️‍🔥</button>
</div>

<div class="fscr" id="fscr">
<button class="x" id="fsX"><i class="fas fa-times"></i></button>
<img id="fsI" style="display:none"><video id="fsV" style="display:none" controls></video>
</div>

<div class="tt" id="toast"></div>
<input type="file" id="fPh" accept="image/*" style="display:none">
<input type="file" id="fVi" accept="video/*" style="display:none">

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getDatabase,ref,set,get,push,onValue,onDisconnect,remove,update,off}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

let db;
try{
const fb=initializeApp({apiKey:"AIzaSyCuo7GtLDVE6ERb8MOke97mFa08M3oZoV8",authDomain:"dove-7ea6d.firebaseapp.com",databaseURL:"https://dove-7ea6d-default-rtdb.firebaseio.com",projectId:"dove-7ea6d",storageBucket:"dove-7ea6d.appspot.com",appId:"1:747559004808:web:f80e792795e5b3b4758d3d"});
db=getDatabase(fb);
}catch(e){document.body.innerHTML='<div style="padding:40px;text-align:center;color:#e05555">Firebase помилка: '+e.message+'</div>'}

const S={user:null,chat:null,media:null,mediaType:null,tyTO:null,listeners:[],tab:'all',mob:innerWidth<=768};
const $=id=>document.getElementById(id);
const esc=s=>{if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const trn=(s,n)=>s&&s.length>n?s.slice(0,n)+'…':s||'';
const cid=(a,b)=>[a,b].sort().join('_');
const avC=['c1','c2','c3','c4','c5','c6','c7'];
const getC=s=>{let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return avC[Math.abs(h)%avC.length]};
const fmtT=ts=>{if(!ts)return'';const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')};
const fmtD=ts=>{const d=new Date(ts),t=new Date;if(d.toDateString()===t.toDateString())return'Сьогодні';const y=new Date(t);y.setDate(y.getDate()-1);if(d.toDateString()===y.toDateString())return'Вчора';return d.toLocaleDateString('ru')};
const fmtAgo=ts=>{const d=Date.now()-ts;if(d<60000)return'щойно';if(d<3600000)return Math.floor(d/60000)+' хв тому';if(d<86400000)return Math.floor(d/3600000)+' год тому';return new Date(ts).toLocaleDateString('ru')};
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function autoH(){const t=$('mIn');if(!t)return;t.style.height='auto';t.style.height=Math.min(t.scrollHeight,120)+'px'}
function showScr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('act'));$(id).classList.add('act')}

(function init(){
const saved=localStorage.getItem('dg_user');
if(saved){try{const u=JSON.parse(saved);if(u&&u.uid){S.user=u;showScr('app');startApp();return}}catch(e){}}
showScr('auth');
})();

$('aBtn').addEventListener('click',()=>{
const id=$('aId').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
const nm=$('aNm').value.trim();
if(!id||id.length<2){$('aErr').textContent='Мінімум 2 символи';return}
get(ref(db,'users/'+id)).then(snap=>{
if(snap.exists()){S.user=snap.val();update(ref(db,'users/'+id),{online:true,lastSeen:Date.now()})}
else{S.user={uid:id,name:nm||id,phone:'',bio:'',id:'@'+id};set(ref(db,'users/'+id),{...S.user,online:true,joined:Date.now(),lastSeen:Date.now()})}
localStorage.setItem('dg_user',JSON.stringify(S.user));showScr('app');startApp();
});
});

$('aId').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();$('aNm').focus()}});
$('aNm').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();$('aBtn').click()}});

let usersC={},msgsC={};

function startApp(){
if(!S.user)return;

const myConnRef=ref(db,'users/'+S.user.uid+'/online');
const myLastRef=ref(db,'users/'+S.user.uid+'/lastSeen');
onValue(ref(db,'.info/connected'),snap=>{
if(snap.val()===true){
$('offBanner').style.display='none';
onDisconnect(myConnRef).set(false);
onDisconnect(myLastRef).set(Date.now());
set(myConnRef,true);
}else{$('offBanner').style.display='block'}
});

setInterval(()=>{update(ref(db,'users/'+S.user.uid),{lastSeen:Date.now()}).catch(()=>{})},25000);

onValue(ref(db,'users'),s=>{usersC=s.val()||{};renderCL()});
onValue(ref(db,'msgs'),s=>{msgsC=s.val()||{};renderCL()});

listenCalls();

if(S.mob){$('sidebar').classList.remove('hid');$('chatArea').classList.add('hid')}
bindAll();
}

document.querySelectorAll('.tab').forEach(t=>{
t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('act'));t.classList.add('act');S.tab=t.dataset.tab;renderCL()});
});

function renderCL(){
if(!S.user)return;
const q=$('searchIn').value.toLowerCase();
let h='';
if(S.tab==='all'||S.tab==='global'){
const gm=msgsC.global?Object.values(msgsC.global):[];
const gl=gm.length?gm[gm.length-1]:null;
if(!q||'общий global глобал'.includes(q)){
let unread=0;
if(gl&&gl.sender!==S.user.uid&&!gl.readBy?.[S.user.uid])unread=1;
h+=mkCI('global','<i class="fas fa-globe-americas"></i>','Глобальний чат',gl?esc(trn((gl.senderName||'')+': '+(gl.text||'📷'),30)):'Почати спілкування',gl?fmtT(gl.time):'','gl',false,unread);
}}
if(S.tab==='all'||S.tab==='private'){
const uids=Object.keys(usersC).filter(u=>u!==S.user.uid);
const items=uids.map(uid=>{
const u=usersC[uid];const ch=cid(S.user.uid,uid);
const mm=msgsC[ch]?Object.values(msgsC[ch]):[];
const last=mm.length?mm[mm.length-1]:null;
let unread=0;
mm.forEach(m=>{if(m.sender!==S.user.uid&&!m.read)unread++});
return{uid,u,last,unread};
}).sort((a,b)=>{if(a.last&&b.last)return(b.last.time||0)-(a.last.time||0);if(a.last)return-1;if(b.last)return 1;return 0});
items.forEach(({uid,u,last,unread})=>{
const match=!q||(u.name||'').toLowerCase().includes(q)||(u.id||'').toLowerCase().includes(q);
if(!match)return;if(!last&&!q)return;
const prev=last?(last.image&&!last.text?'📷 Фото':last.video&&!last.text?'🎬 Відео':esc(trn(last.text,30))):'Почати чат';
h+=mkCI(uid,`<i class="fas fa-user"></i>`,esc(u.name||uid),prev,last?fmtT(last.time):'',getC(uid),u.online,unread);
});}
$('chatList').innerHTML=h||'<div style="padding:40px;text-align:center;color:var(--txt3)"><i class="fas fa-search" style="font-size:28px;display:block;margin-bottom:8px;opacity:.2"></i>Нічого не знайдено</div>';
$('chatList').querySelectorAll('.ci').forEach(el=>el.addEventListener('click',()=>openChat(el.dataset.id)));
}

function mkCI(id,icon,name,msg,time,cls,online,unread){
const act=S.chat===id?' active':'';
return`<div class="ci${act}" data-id="${id}"><div class="av ${cls}">${icon}${online?'<div class="dot"></div>':''}</div><div class="ci-body"><div class="ci-top"><span class="ci-name">${name}</span><span class="ci-time">${time}</span></div><div class="ci-msg" style="${unread?'color:var(--txt);font-weight:600':''}">${msg}</div></div>${unread?`<div style="background:var(--acc);color:#fff;border-radius:10px;padding:2px 6px;font-size:11px">${unread}</div>`:''}</div>`;
}

window.openChat=(id)=>{
cleanL();S.chat=id;
const isG=id==='global';
if(S.mob){$('sidebar').classList.add('hid');$('chatArea').classList.remove('hid')}
$('chatArea').classList.remove('hid');$('inBar').style.display='flex';$('attM').classList.remove('show');clearPrev();renderCL();
if(isG){
$('hAv').innerHTML='<i class="fas fa-globe-americas"></i>';$('hAv').className='ch-av av gl';
$('hNm').textContent='Глобальний чат';$('hSt').textContent=Object.keys(usersC).length+' учасників';$('hSt').className='ch-st';
$('ciCall').style.display='none';
}else{
const u=usersC[id]||{};
$('hAv').innerHTML=`<i class="fas fa-user"></i>`;$('hAv').className='ch-av av '+getC(id);
$('hNm').textContent=u.name||id;updSt(id);
$('ciCall').style.display='block';
}

const path=isG?'msgs/global':'msgs/'+cid(S.user.uid,id);
let lastDate='';

const l1=onValue(ref(db,path),snap=>{
$('msgs').innerHTML='';
const data=snap.val();
if(!data){$('msgs').innerHTML='<div class="empty"><i class="fas fa-paper-plane"></i><p>Тут поки пусто</p></div>';return}

let needsUpd=false;const updates={};
Object.entries(data).forEach(([k,v])=>{
const dd=fmtD(v.time);if(dd!==lastDate){lastDate=dd;addDS(dd)}
addM(k,v,isG);
if(!isG&&v.sender!==S.user.uid&&!v.read){updates[k+'/read']=true;needsUpd=true;}
if(isG&&v.sender!==S.user.uid&&(!v.readBy||!v.readBy[S.user.uid])){updates[k+'/readBy/'+S.user.uid]=true;needsUpd=true;}
});
if(needsUpd){update(ref(db,path),updates).catch(()=>{})}
scrollE();
});
S.listeners.push(()=>off(ref(db,path),'value',l1));

if(!isG){
const tp='typing/'+cid(S.user.uid,id);
const l4=onValue(ref(db,tp),s=>{
const d=s.val()||{};
if(Object.entries(d).some(([u,v])=>u!==S.user.uid&&v)){$('hSt').innerHTML='<span class="tdot"><span></span><span></span><span></span></span> друкує...';$('hSt').className='ch-st tp'}else updSt(id);
});
S.listeners.push(()=>off(ref(db,tp),'value',l4));
}
};

function cleanL(){S.listeners.forEach(fn=>{try{fn()}catch(e){}});S.listeners=[]}
function updSt(uid){const u=usersC[uid]||{};if(u.online){$('hSt').textContent='в мережі';$('hSt').className='ch-st on'}else{$('hSt').textContent=u.lastSeen?'був(ла) '+fmtAgo(u.lastSeen):'офлайн';$('hSt').className='ch-st'}}
function addDS(d){const el=document.createElement('div');el.className='dsep';el.textContent=d;$('msgs').appendChild(el)}

function addM(key,msg,isG){
const emptyEl=document.querySelector('.empty');if(emptyEl)emptyEl.remove();
const mine=msg.sender===S.user.uid;
const d=document.createElement('div');
d.className='mg '+(mine?'s':'r')+(isG&&!mine?' g':'');d.dataset.k=key;
let h='';
if(!mine&&isG)h+=`<div class="mg-sn">${esc(msg.senderName||msg.sender)}</div>`;
h+='<div class="bbl">';
if(msg.image)h+=`<img class="mi" src="${msg.image}" onclick="window.DG.fs('i',this.src)" loading="lazy">`;
if(msg.video)h+=`<video src="${msg.video}" onclick="window.DG.fs('v',this.src)" style="max-width:280px;border-radius:8px;display:block;margin-bottom:4px;cursor:pointer" preload="metadata" muted playsinline></video>`;
if(msg.text)h+=`<div class="mg-t">${esc(msg.text).replace(/\n/g,'<br>')}</div>`;

let ck='';
if(mine&&!isG)ck=`<span class="mg-ck ${msg.read?'read':''}"><i class="fas ${msg.read?'fa-check-double':'fa-check'}"></i></span>`;
h+=`<div class="mg-f"><span class="mg-ti">${fmtT(msg.time)}</span>${ck}</div></div>`;
h+=`<div class="mg-rx">${rxHTML(key,msg.reactions)}</div>`;
d.innerHTML=h;
let pt;
d.addEventListener('touchstart',e=>{pt=setTimeout(()=>showRP(e.touches[0],key),400)},{passive:true});
d.addEventListener('touchend',()=>clearTimeout(pt));d.addEventListener('touchmove',()=>clearTimeout(pt));
d.addEventListener('dblclick',e=>showRP(e,key));
$('msgs').appendChild(d);
}

function rxHTML(key,rx){
if(!rx)return'';const map={},myR={};
Object.entries(rx).forEach(([rk,rv])=>{if(!rv?.emoji)return;map[rv.emoji]=(map[rv.emoji]||0)+1;if(rv.by===S.user.uid)myR[rv.emoji]=rk});
return Object.entries(map).map(([em,c])=>`<span class="rxb ${myR[em]?'my':''}" onclick="window.DG.tr('${key}','${em}','${myR[em]||''}')">${em}<span class="rxc">${c>1?c:''}</span></span>`).join('');
}

function scrollE(){setTimeout(()=>{const m=$('msgs');m.scrollTop=m.scrollHeight},40)}

function sendMsg(){
const text=$('mIn').value.trim();const media=S.media;const mt=S.mediaType;
if(!text&&!media)return;
const isG=S.chat==='global';const path=isG?'msgs/global':'msgs/'+cid(S.user.uid,S.chat);
const data={sender:S.user.uid,senderName:S.user.name||S.user.uid,text:text||'',time:Date.now(),read:false};
if(media&&mt==='image')data.image=media;
if(media&&mt==='video')data.video=media;
$('mIn').value='';clearPrev();autoH();$('attM').classList.remove('show');
push(ref(db,path),data).catch(e=>toast('Помилка: '+e.message));
if(!isG)set(ref(db,'typing/'+cid(S.user.uid,S.chat)+'/'+S.user.uid),false).catch(()=>{});
}

function handleFile(f,type){
const max=type==='video'?2000000:800000;
if(f.size>max){toast(type==='video'?'Макс 2MB':'Макс 800KB');return}
const r=new FileReader();
r.onload=ev=>{
S.media=ev.target.result;S.mediaType=type;
if(type==='video'){$('prvV').src=ev.target.result;$('prvV').style.display='block';$('prvI').style.display='none'}
else{$('prvI').src=ev.target.result;$('prvI').style.display='block';$('prvV').style.display='none'}
$('prvN').textContent=f.name;$('prev').style.display='flex';$('attM').classList.remove('show');
};r.readAsDataURL(f);
}
function clearPrev(){S.media=null;S.mediaType=null;$('prev').style.display='none';$('prvI').style.display='none';$('prvV').style.display='none'}
$('fPh').addEventListener('change',e=>{const f=e.target.files[0];if(f)handleFile(f,'image');e.target.value=''});
$('fVi').addEventListener('change',e=>{const f=e.target.files[0];if(f)handleFile(f,'video');e.target.value=''});

let isTyping=false;
function onTyping(){
if(!S.chat||S.chat==='global')return;
const p='typing/'+cid(S.user.uid,S.chat)+'/'+S.user.uid;
if(!isTyping){isTyping=true;set(ref(db,p),true).catch(()=>{})}
clearTimeout(S.tyTO);
S.tyTO=setTimeout(()=>{isTyping=false;set(ref(db,p),false).catch(()=>{})},2000);
}

let rKey=null;
function showRP(e,key){rKey=key;const rp=$('rPop');rp.classList.add('show');rp.style.left=Math.min((e.clientX||e.pageX||200)-70,innerWidth-170)+'px';rp.style.top=Math.max((e.clientY||e.pageY||200)-60,10)+'px'}
async function addR(emoji){
$('rPop').classList.remove('show');if(!rKey||!S.chat)return;
const path=(S.chat==='global'?'msgs/global':'msgs/'+cid(S.user.uid,S.chat))+'/'+rKey+'/reactions';
const snap=await get(ref(db,path));const data=snap.val()||{};
const ex=Object.entries(data).find(([k,v])=>v.by===S.user.uid&&v.emoji===emoji);
if(ex){remove(ref(db,path+'/'+ex[0]))}
else{const my=Object.entries(data).find(([k,v])=>v.by===S.user.uid);if(my)remove(ref(db,path+'/'+my[0]));push(ref(db,path),{emoji,by:S.user.uid})}
}
async function togR(key,emoji,ek){
const path=(S.chat==='global'?'msgs/global':'msgs/'+cid(S.user.uid,S.chat))+'/'+key+'/reactions';
if(ek){remove(ref(db,path+'/'+ek))}
else{const snap=await get(ref(db,path));const data=snap.val()||{};const my=Object.entries(data).find(([k,v])=>v.by===S.user.uid);if(my)remove(ref(db,path+'/'+my[0]));push(ref(db,path),{emoji,by:S.user.uid})}
}

function openFS(type,src){
if(type==='v'){$('fsV').src=src;$('fsV').style.display='block';$('fsI').style.display='none'}
else{$('fsI').src=src;$('fsI').style.display='block';$('fsV').style.display='none'}
$('fscr').classList.add('show');
}
$('fsX').addEventListener('click',e=>{e.stopPropagation();$('fscr').classList.remove('show');$('fsV').pause();$('fsV').src=''});
$('fscr').addEventListener('click',e=>{if(e.target===$('fscr')){$('fscr').classList.remove('show');$('fsV').pause();$('fsV').src=''}});

function openProf(){$('pId').value='@'+S.user.uid;$('pNm').value=S.user.name||'';$('pPh').value=S.user.phone||'';$('pBio').value=S.user.bio||'';$('profM').classList.add('show')}
function saveProf(){
const d={name:$('pNm').value.trim()||S.user.uid,phone:$('pPh').value.trim(),bio:$('pBio').value.trim()};
Object.assign(S.user,d);localStorage.setItem('dg_user',JSON.stringify(S.user));toast('Збережено ✓');$('profM').classList.remove('show');
update(ref(db,'users/'+S.user.uid),d).catch(()=>{});
}
function logout(){try{update(ref(db,'users/'+S.user.uid),{online:false,lastSeen:Date.now()})}catch(e){}localStorage.removeItem('dg_user');S.user=null;S.chat=null;cleanL();showScr('auth');$('aId').value='';$('aNm').value='';$('aErr').textContent=''}

$('chInfo').addEventListener('click',()=>{
if(S.chat==='global'){
let h='';
Object.values(usersC).forEach(u=>{
h+=`<div class="ci" onclick="$('allUsersM').classList.remove('show');openChat('${u.uid}')"><div class="av ${getC(u.uid)}"><i class="fas fa-user"></i>${u.online?'<div class="dot"></div>':''}</div><div class="ci-body"><div class="ci-name">${esc(u.name)}</div><div class="ci-msg">@${u.uid}</div></div></div>`;
});
$('allUsersList').innerHTML=h;$('allUsersM').classList.add('show');
}
});
$('allUsersX').addEventListener('click',()=>$('allUsersM').classList.remove('show'));

/* ===== CALLS (WebRTC MOCK / SIGNALING) ===== */
let pc, locStr;
const servers={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};

function listenCalls(){
onValue(ref(db,'calls/'+S.user.uid),snap=>{
const d=snap.val();
if(d&&d.type==='offer'&&!pc){
$('incName').textContent=`Дзвінок від ${d.name}`;
$('incCall').style.display='block';
$('ansCallBtn').onclick=()=>acceptCall(d);
$('rejCallBtn').onclick=()=>endCall();
}
});
}

$('ciCall').onclick=async()=>{
$('callUi').classList.add('show');
$('callStatus').textContent="Дзвінок...";
try{
locStr=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
$('locVid').srcObject=locStr;
pc=new RTCPeerConnection(servers);
locStr.getTracks().forEach(t=>pc.addTrack(t,locStr));
pc.ontrack=e=>{$('remVid').srcObject=e.streams[0]};
pc.onicecandidate=e=>{if(e.candidate)push(ref(db,'calls/'+S.chat+'/candidates'),e.candidate.toJSON())};
const offer=await pc.createOffer();
await pc.setLocalDescription(offer);
set(ref(db,'calls/'+S.chat),{type:'offer',sdp:offer.sdp,from:S.user.uid,name:S.user.name});

onValue(ref(db,'calls/'+S.user.uid),snap=>{
const d=snap.val();if(d&&d.type==='answer')pc.setRemoteDescription(new RTCSessionDescription(d));
});
onChildAdded(ref(db,'calls/'+S.user.uid+'/candidates'),snap=>{if(pc)pc.addIceCandidate(new RTCIceCandidate(snap.val()))});
}catch(e){toast("Помилка камери/мікрофона");$('callUi').classList.remove('show')}
};

async function acceptCall(d){
$('incCall').style.display='none';$('callUi').classList.add('show');$('callStatus').textContent="З'єднано";
try{
locStr=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
$('locVid').srcObject=locStr;
pc=new RTCPeerConnection(servers);
locStr.getTracks().forEach(t=>pc.addTrack(t,locStr));
pc.ontrack=e=>{$('remVid').srcObject=e.streams[0]};
pc.onicecandidate=e=>{if(e.candidate)push(ref(db,'calls/'+d.from+'/candidates'),e.candidate.toJSON())};
await pc.setRemoteDescription(new RTCSessionDescription({type:'offer',sdp:d.sdp}));
const answer=await pc.createAnswer();
await pc.setLocalDescription(answer);
set(ref(db,'calls/'+d.from),{type:'answer',sdp:answer.sdp});
onChildAdded(ref(db,'calls/'+S.user.uid+'/candidates'),snap=>{if(pc)pc.addIceCandidate(new RTCIceCandidate(snap.val()))});
}catch(e){endCall()}
}

function endCall(){
if(pc){pc.close();pc=null}
if(locStr){locStr.getTracks().forEach(t=>t.stop());locStr=null}
$('callUi').classList.remove('show');$('incCall').style.display='none';
remove(ref(db,'calls/'+S.user.uid));
if(S.chat)remove(ref(db,'calls/'+S.chat));
}
$('endCallBtn').onclick=endCall;

function bindAll(){
$('sndBtn').addEventListener('click',sendMsg);
$('mIn').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}});
$('mIn').addEventListener('input',()=>{autoH();onTyping()});
$('attBtn').addEventListener('click',()=>$('attM').classList.toggle('show'));
$('attPh').addEventListener('click',()=>$('fPh').click());
$('attVi').addEventListener('click',()=>$('fVi').click());
$('prvD').addEventListener('click',clearPrev);
$('backBtn').addEventListener('click',()=>{if(S.mob){$('sidebar').classList.remove('hid');$('chatArea').classList.add('hid')}S.chat=null;renderCL()});
$('searchIn').addEventListener('input',renderCL);
$('menuBtn').addEventListener('click',openProf);
$('profX').addEventListener('click',()=>$('profM').classList.remove('show'));
$('pSave').addEventListener('click',saveProf);
$('logoutBtn').addEventListener('click',logout);
$('ciBtn').addEventListener('click',e=>{e.stopPropagation();$('chMenu').classList.toggle('show')});
$('cmClear').addEventListener('click',()=>{
if(!confirm('Очистити історію чату?'))return;
const path=S.chat==='global'?'msgs/global':'msgs/'+cid(S.user.uid,S.chat);
remove(ref(db,path)).then(()=>{
$('msgs').innerHTML='<div class="empty"><i class="fas fa-paper-plane"></i><p>Тут поки пусто</p></div>';
$('chMenu').classList.remove('show');
}).catch(e=>toast("Помилка: "+e.message));
});
$('rPop').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>addR(b.dataset.r)));
document.addEventListener('click',e=>{if(!e.target.closest('.rpop')&&!e.target.closest('.mg'))$('rPop').classList.remove('show');if(!e.target.closest('.att-m')&&!e.target.closest('#attBtn'))$('attM').classList.remove('show');if(!e.target.closest('#chMenu')&&!e.target.closest('#ciBtn'))$('chMenu').classList.remove('show')});
addEventListener('resize',()=>{S.mob=innerWidth<=768});
}

window.DG={fs:openFS,tr:togR};
</script>
</body>
</html>
